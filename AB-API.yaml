        Shipments:
          description: "Liste der Sendungen (Versandstatus)\nBesonderheit beim PUT:\
            \ Wenn Shipments nicht gefüllt ist, werden keine Veränderungen am\nVersandstatus\
            \ vorgenommen. Wenn Shipments gefüllt ist, werden alle nicht enthaltenen\
            \ \nSendungen aus dem Beleg entfernt. Neue Sendungen werden gemäß der\
            \ Reihenfolge eingefügt, \nkönnen also auch vor oder zwischen vorhandenen\
            \ Sendungen eingefügt werden.\n\n**English version:**\nList of shipments\
            \ (shipping status)\nSpecial feature for PUT: If Shipments is not filled,\
            \ no changes are made to the\nshipping status. If Shipments is filled,\
            \ all shipments not included are removed from the document.\nNew shipments\
            \ are inserted according to the order, so they can also be inserted before\
            \ or between existing shipments.\n"
          items:
            $ref: '#/components/schemas/Shipment'
          nullable: true
          type: array
        BusinessTransaction:
          description: |
            Geschäftsvorfall
            - DomesticPurchaseWithInputVat -> Einkauf Inland mit Vorsteuer
            - ReverseCharge -> Leistungsempfänger als Steuerschuldner (§ 13b UStG)
            - PurchaseAsFirstPurchaserInIntraUnionTriangularTransaction-> Erwerb als erster Abnehmer in einem innergemeinschaftlichen Dreiecksgeschäft (§ 25b Abs. 3 UStG)
            - PurchaseAsFinalCustomerInIntraUnionTriangularTransaction -> Erwerb als letzter Abnehmer in einem innergemeinschaftlichen Dreiecksgeschäft (§ 25b Abs. 2 UStG)
            - IntraCommunityAcquisitionOfGoodsOrServices -> Innergemeinschaftlicher Erwerb oder sonstige EU-Leistung
            - PurchaseWithoutVat -> Einkaufsbeleg ohne Steuer

            **English version:**
            Business transaction
            - DomesticPurchaseWithInputVat -> Domestic purchase with input VAT
            - ReverseCharge -> Service recipient as tax debtor (§ 13b UStG)
            - PurchaseAsFirstPurchaserInIntraUnionTriangularTransaction-> Acquisition as first purchaser in an intra-Community triangular transaction (§ 25b para. 3 UStG)
            - PurchaseAsFinalCustomerInIntraUnionTriangularTransaction -> Acquisition as final customer in an intra-Community triangular transaction (§ 25b para. 2 UStG)
            - IntraCommunityAcquisitionOfGoodsOrServices -> Intra-Community acquisition or other EU service
            - PurchaseWithoutVat -> Purchase document without tax
          enum:
          - DomesticPurchaseWithInputVat
          - ReverseCharge
          - PurchaseAsFirstPurchaserInIntraUnionTriangularTransaction
          - PurchaseAsFinalCustomerInIntraUnionTriangularTransaction
          - IntraCommunityAcquisitionOfGoodsOrServices
          - PurchaseWithoutVat
          nullable: true
          type: string
        IsLockedForPayment:
          description: |
            Legt fest, ob der Beleg für den Zahlungsvorschlag gesperrt ist. Steht nur bei angeschlossenem DATEV-Rechnungswesen zur Verfügung.

            **English version:**
            Specifies whether the document is locked for the payment proposal. Only available with connected DATEV accounting.
          nullable: true
          type: boolean
        CalculationFieldTotals:
          description: |
            Summen der Rechenfeldwerte inkl. Definition der Rechenfelder.

            **English version:**
            Totals of calculation field values including definition of the calculation fields.
          items:
            $ref: '#/components/schemas/CalculationFieldTotalWithDefinition'
          nullable: true
          readOnly: true
          type: array
        CostCenter:
          description: |
            Kostenstelle (Ordnungsbegriff)

            **English version:**
            Cost center (classification term)
          nullable: true
          type: string
        CostUnit:
          description: |
