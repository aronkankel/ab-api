  /v1/dms-documents-metadata:
    get:
      description: |
        Metadaten zu den DMS-Dokumenten im gesamten Dokumentenbereich suchen und abrufen.
        Es muss ein Filter angegeben werden.

        **English version:**
        Search and retrieve metadata for DMS documents in the entire document area.
        A filter must be specified.
      operationId: getDmsDocumentsMetadata
      parameters:
      - description: |
          Filter für die Ergebnismenge anhand von Schlagworten.<br>
          Die Syntax für die Filter orientiert sich an der Filter-Syntax von OData.<br>
          Es kann auf die Schlagwort-Namen im DMS gefiltert werden.<br>
          Folgende Vergleichsoperatoren stehen zur Verfügung: eq (gleich), ne (ungleich), lt (kleiner als), gt (größer als), le (kleiner gleich), ge (größer gleich)<br>
          Beispiel: ...filter=Belegnummer eq 400001...<br>
          Mehrere Filter können durch "and" getrennt werden. <br>
          Beispiel: ...filter=Belegnummer eq 400001 and Auftragsnummer eq 'A12345'...<br>
          Datumsangaben (Tagesdatum) müssen im internationalen Format YYYY-MM-DD angegeben werden.<br>
          Beispiel: ...filter=Eingangsdatum eq 2023-03-28...<br><br>
          Um Metadaten zu einem DMS-Dokument mit dem DocumentKey abzurufen folgenden Filter verwenden:<br>
          Beispiel: ...filter=DocumentKey eq 'Beispieldaten_AB$NOTSET$3163$2$NOTSET'... <br>

          **English version:**
          Filter for the result set based on keywords.<br>
          The syntax for the filters is based on the OData filter syntax.<br>
          Filtering can be done on keyword names in DMS.<br>
          The following comparison operators are available: eq (equal), ne (not equal), lt (less than), gt (greater than), le (less than or equal), ge (greater than or equal)<br>
          Example: ...filter=Belegnummer eq 400001...<br>
          Multiple filters can be separated by "and". <br>
          Example: ...filter=Belegnummer eq 400001 and Auftragsnummer eq 'A12345'...<br>
          Date values (day date) must be specified in international format YYYY-MM-DD.<br>
          Example: ...filter=Eingangsdatum eq 2023-03-28...<br><br>
          To retrieve metadata for a DMS document with the DocumentKey, use the following filter:<br>
          Example: ...filter=DocumentKey eq 'Beispieldaten_AB$NOTSET$3163$2$NOTSET'... <br>
        examples:
          filterSimple:
            summary: |
              Einfacher Filter im Format <Schlagwort> <Vergleichsoperator> <Wert>

              **English version:**
              Simple filter in format <Keyword> <ComparisonOperator> <Value>
            value: filter=Belegnummer eq 400001
          filterWithAnd:
            summary: |
              Filter mit 2 Bedingungen, die durch "and" verknüpft sind.

              **English version:**
              Filter with 2 conditions linked by "and".
            value: filter=Belegnummer eq 400001 and Auftragsnummer eq 'A12345'
        in: query
        name: filter
        required: true
        schema:
          nullable: false
          type: string
      - description: |
          Angabe von relevanten Attributen, auf die die Ergebnismenge beschränkt
          werden soll.
          Beispiel: ...select=SampleProperty1, SampleProperty2...

          **English version:**
          Specification of relevant attributes to which the result set should be restricted.
          Example: ...select=SampleProperty1, SampleProperty2...
        examples:
          selectOneProperty:
            summary: |
              Auswahl einer einzelnen Property

              **English version:**
              Selection of a single property
            value: Number
          selectTwoProperties:
            summary: |
              Auswahl von 2 Properties

              **English version:**
              Selection of 2 properties
            value: "Number,Description"
        in: query
        name: select
        required: false
        schema:
          nullable: true
          type: string
      - description: |
          Gibt die Anzahl der Elemente an, die maximal in der Ergebnismenge
          enthalten sein sollen.
          Beispiel: ...top=10...

          **English version:**
          Specifies the maximum number of elements that should be contained in the result set.
          Example: ...top=10...
        examples:
          top10:
            summary: |
              Auswahl von 10 Elementen

              **English version:**
              Selection of 10 elements
            value: 10
          top50:
            summary: |
              Auswahl von 50 Elementen

              **English version:**
              Selection of 50 elements
            value: 50
        in: query
        name: top
        required: false
        schema:
          nullable: true
          type: integer
      - description: "Gibt an, wie viele Elemente der Gesamtmenge übersprungen werden\
          \ sollen. \nBeispiel: ...skip=10...\n\n**English version:**\nSpecifies how\
          \ many elements of the total set should be skipped.\nExample: ...skip=10...\n"
        examples:
          skip10:
            summary: |
              Überspringen der ersten 10 Elemente

              **English version:**
              Skipping the first 10 elements
            value: 10
          skip50:
            summary: |
              Überspringen der ersten 50 Elemente

              **English version:**
              Skipping the first 50 elements
            value: 50
        in: query
        name: skip
        required: false
        schema:
          nullable: true
          type: integer
      responses:
        "200":
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: '#/components/schemas/DmsMetadata'
                type: array
          description: |
            Erfolgreicher Abruf der Ressource.

            **English version:**
            Successful retrieval of the resource.
        "400":
          description: |
            Es liegt ein fehlerhafter Clientaufruf vor. Eine mögliche Ursache kann
            sein, dass ein fehlerhafter Wert übergeben wurde. Weitere Informationen
            sind in der Response-Nachricht als HttpError enthalten.

            **English version:**
            There is a faulty client call. One possible cause could be
            that an incorrect value was passed. Further information
            is contained in the response message as HttpError.
        "401":
          description: |
            Die Authentifizierungs-Information fehlt oder ist ungültig. Weitere
            Informationen sind in der Response-Nachricht als HttpError enthalten.

            **English version:**
            The authentication information is missing or invalid. Further
            information is contained in the response message as HttpError.
          headers:
            WWW_Authenticate:
              schema:
                type: string
        "403":
          description: |
            Es fehlt die Berechtigung zum Zugriff auf die Ressource.

            **English version:**
            Permission to access the resource is missing.
        "404":
          description: |
            Die angeforderte Ressource ist dauerhaft oder temporär nicht verfügbar.
            Eine mögliche Ursache kann sein, dass die URI fehlerhaft ist.

            **English version:**
            The requested resource is permanently or temporarily unavailable.
