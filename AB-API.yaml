  responses:
    BadRequest:
      description: |
        Es liegt ein fehlerhafter Clientaufruf vor. Eine mögliche Ursache kann
        sein, dass ein fehlerhafter Wert übergeben wurde. Weitere Informationen
        sind in der Response-Nachricht als HttpError enthalten.

        **English version:**
        There is a faulty client call. One possible cause could be
        that an incorrect value was passed. Further information
        is contained in the response message as HttpError.
    Forbidden:
      description: |
        Es fehlt die Berechtigung zum Zugriff auf die Ressource.

        **English version:**
        Permission to access the resource is missing.
    Unauthorized:
      description: |
        Die Authentifizierungs-Information fehlt oder ist ungültig. Weitere
        Informationen sind in der Response-Nachricht als HttpError enthalten.

        **English version:**
        The authentication information is missing or invalid. Further
        information is contained in the response message as HttpError.
      headers:
        WWW_Authenticate:
          schema:
            type: string
    NotFound:
      description: |
        Die angeforderte Ressource ist dauerhaft oder temporär nicht verfügbar.
        Eine mögliche Ursache kann sein, dass die URI fehlerhaft ist.

        **English version:**
        The requested resource is permanently or temporarily unavailable.
        One possible cause could be that the URI is incorrect.
    Locked:
      description: |
        Die Ressource ist aufgrund einer exklusiven Verarbeitung temporär gesperrt.

        **English version:**
        The resource is temporarily locked due to exclusive processing.
    Conflict:
      description: |
        Die Ressource wurde zwischenzeitlich durch Dritte verändert.

        **English version:**
        The resource has been modified by third parties in the meantime.
  schemas:
    TokenResponse:
      description: |
        Enthält das Token zur Authentifizierung sowie weitere Informationen zur Gültigkeit des Tokens.

        **English version:**
        Contains the token for authentication as well as additional information about the token's validity.
      example:
        access_token: access_token
        refresh_token: refresh_token
        roles: roles
        ".expires": 2000-01-23T04:56:07.000+00:00
        token_type: bearer
        userName: userName
        expires_in: 14399
        ".issued": 2000-01-23T04:56:07.000+00:00
      properties:
        access_token:
          description: |
            Token, das in einem Request zur Authentifizierung mitgegeben werden muss.

            **English version:**
            Token that must be included in a request for authentication.
          type: string
        token_type:
          description: |
            Typ des Tokens (hat immer den Wert "bearer").

            **English version:**
            Type of the token (always has the value "bearer").
          enum:
          - bearer
          type: string
        expires_in:
          description: |
            Anzahl Sekunden nach der das Token ungültig wird.

            **English version:**
            Number of seconds after which the token becomes invalid.
          example: 14399
          type: integer
        refresh_token:
          description: |
            Token, mit dem vor Ablauf der Gültigkeit ein neues access_token angefordert werden kann.

            **English version:**
            Token with which a new access_token can be requested before expiration.
          format: guid
          type: string
        userName:
          description: |
            Name des Benutzers, für den das Token angefordert wurde.

            **English version:**
            Name of the user for whom the token was requested.
          type: string
        roles:
          description: |
            Rollen des Benutzers, für den das Token angefordert wurde (Komma separierte Liste als String).

            **English version:**
            Roles of the user for whom the token was requested (comma-separated list as string).
          type: string
        ".issued":
          description: |
            Uhrzeit der Token-Erzeugung.

            **English version:**
            Time of token generation.
          format: date-time
          type: string
        ".expires":
          description: |
            Uhrzeit des Gültigkeitsendes des Tokens.

            **English version:**
            Time of token expiration.
          format: date-time
          type: string
      required:
      - .expires
      - .issued
      - access_token
      - expires_in
      - refresh_token
      - roles
      - token_type
      - userName
      title: TokenResponse
      type: object
