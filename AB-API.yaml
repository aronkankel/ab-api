    get:
      description: "Abfragen des Status eines Elements in der E-Mail-Warteschlange.\n\
        Solange die E-Mail noch nicht gesendet wurde, liefert die Anfrage den StatusCode\
        \ 200 und \nim Body \"Pending\".\nWurde die E-Mail erfolgreich gesendet, liefert\
        \ die Anfrage einmalig den StatusCode 200 und\nim Body \"Sent\".\nWenn es\
        \ einen Fehler beim Senden gab, dann liefert die Anfrage einmalig den StatusCode\
        \ 200\nund im Body den Status \"Error\". Außerdem sind im Body in \"ErrorDetails\"\
        \ genauere Informationen\nzum Fehler enthalten.\nWurde der Status mit \"Sent\"\
        \ oder \"Error\" abgefragt, wird er aus der Queue gelöscht und Beim\nerneuten\
        \ Aufruf liefert die Anfrage StatusCode 404.\n\n**English version:**\nQuery\
        \ the status of an item in the email queue.\nAs long as the email has not\
        \ yet been sent, the request returns StatusCode 200 and\n\"Pending\" in the\
        \ body.\nIf the email was sent successfully, the request returns StatusCode\
        \ 200 once and\n\"Sent\" in the body.\nIf there was an error during sending,\
        \ the request returns StatusCode 200 once\nand the status \"Error\" in the\
        \ body. In addition, more detailed information about the error\nis contained\
        \ in \"ErrorDetails\" in the body.\nOnce the status has been queried with\
        \ \"Sent\" or \"Error\", it is deleted from the queue and\non subsequent calls\
        \ the request returns StatusCode 404.\n"
