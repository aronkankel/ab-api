            Besonderheit beim PUT: Artikelnummer kann nicht verändert werden.

            **English version:**
            Product number (classification term) of the manufactured item
            Special note for PUT: Product number cannot be changed.
          nullable: true
          type: string
        ProductId:
          description: |
            Id des Artikels (technischer Schlüssel)

            **English version:**
            ID of the product (technical key)
          nullable: true
          readOnly: true
          type: integer
        StockNumber:
          description: |
            Lagernummer des Fertigungsteils

            **English version:**
            Stock number of the manufactured item
          nullable: true
          type: integer
        StockId:
          description: |
            Id des Lagers (technischer Schlüssel)

            **English version:**
            ID of the stock (technical key)
          nullable: true
          readOnly: true
          type: integer
        ScheduledQuantity:
          description: |
            Soll-Menge.
            Nur in Fertigungsaufträgen verfügbar.

            **English version:**
            Target quantity.
            Only available in production orders.
          nullable: true
          type: number
        RemainingQuantity:
          description: |
            Ausstehende Menge.
            Nur in Fertigungsaufträgen verfügbar.

            **English version:**
            Outstanding quantity.
            Only available in production orders.
          nullable: true
          type: number
        ManufacturedQuantity:
          description: |
            Gefertigte Menge.
            Nur in Fertigmeldungen verfügbar.

            **English version:**
            Manufactured quantity.
            Only available in completion reports.
          nullable: true
          type: number
        SumManufacturedQuantity:
          description: |
            Summe der gefertigten Menge für einen Fertigungsauftrag.
            Nur in Fertigungsaufträgen verfügbar.
            Read-Only. Wert kann nicht direkt geändert werden, sondern wird automatisch berechnet.

            **English version:**
            Sum of manufactured quantity for a production order.
            Only available in production orders.
            Read-Only. Value cannot be changed directly but is calculated automatically.
          nullable: true
          type: number
        QuantityUnitIndicator:
          description: |
            Mengenangabe in Preis- oder Liefereinheiten

            **English version:**
            Quantity indication in price or delivery units
