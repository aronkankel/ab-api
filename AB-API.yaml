    ManufactureFromSalesDocument:
      description: "Enthält die Daten zur Erstellung eines Fertigungsauftrags aus\
        \ einem\nKundenauftrag (Verkaufsbeleg).\nDie Daten werden aus der Belegposition\
        \ des Kundenauftrags vorbesetzt (SalesDocumentLineItemId). \nBestimmte Daten\
        \ (z.B. Menge) können direkt beim der Erzeugung angepasst werden. \nAndere\
        \ Daten (z.B. Arbeitsplan, Positionsliste) können erst nach der Erzeugung\
        \ verändert werden. \nDazu muss dann ein PUT auf dem Endpunkt /v1/manufacture-documents/{manufactureDocumentId}/\
        \ erfolgen.\n\n**English version:**\nContains the data for creating a production\
        \ order from a\ncustomer order (sales document).\nThe data is preset from\
        \ the line item of the customer order (SalesDocumentLineItemId).\nCertain\
        \ data (e.g. quantity) can be adjusted directly during creation.\nOther data\
        \ (e.g. working plan, line item list) can only be changed after creation.\n\
        For this, a PUT must then be made on the endpoint /v1/manufacture-documents/{manufactureDocumentId}/.\n"
