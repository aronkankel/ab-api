      properties:
        LineNumber:
          description: |
            Positionsnummer

            **English version:**
            Line item number
          example: "1"
          nullable: true
          type: string
        ProductId:
          description: |
            Id des Artikels (technischer Schlüssel) bei einer Artikelposition

            **English version:**
            ID of the product (technical key) for a product line item
          nullable: true
          type: integer
        ProductNumber:
          description: |
            Artikelnummer (Ordnungsbegriff)
            Besonderheit beim PUT: Artikelnummer vorhandener Artikelpositionen kann nicht verändert werden.

            **English version:**
            Product number (classification term)
            Special note for PUT: Product number of existing product line items cannot be changed.
          example: DBER1
          nullable: true
          type: string
        ReferencedProductNumber:
          description: |
            Fremdartikelnummer

            **English version:**
            External product number
          example: F12345
          nullable: true
          readOnly: true
          type: string
        IsForAssembly:
          description: |
            Gibt an, ob der Artikel produziert werden soll.
            Nur verfügbar in Verkaufsbelegen, wenn das Erweiterungsmodul "Fertigung" deaktiviert ist
            und das Erweiterungsmodul "Stückliste" im Einsatz ist.
            Bei Verwendung muss auch das Produktionsdatum (AssemblyDate) gesetzt werden. Im Gegensatz
            zur Dialogeingabe wird das Produktionsdatum nicht automatisch mit dem Tagesdatum vorbesetzt.
            Besonderheit: Bei Gutschriften gibt dieses Flag an, ob der Artikel zerlegt werden soll.

            **English version:**
            Specifies whether the product should be produced.
            Only available in sales documents if the extension module "Production" is deactivated
            and the extension module "Bill of Material" is in use.
            When used, the production date (AssemblyDate) must also be set. In contrast
            to dialog input, the production date is not automatically preset with today's date.
            Special note: For credit notes, this flag specifies whether the product should be disassembled.
          example: false
          nullable: true
          type: boolean
        AssemblyDate:
          description: "Produktionsdatum im Format YYYY-MM-DD. \nZum Löschen des Datums\
            \ muss ein Leerstring übermittelt werden.\nNur verfügbar in Verkaufsbelegen,\
            \ wenn das Erweiterungsmodul \"Fertigung\" deaktiviert ist\nund das Erweiterungsmodul\
            \ \"Stückliste\" im Einsatz ist.\nBesonderheit: Bei Gutschriften wird\
            \ diese Property für das Zerlegedatum verwendet.\n\n**English version:**\n\
            Production date in format YYYY-MM-DD.\nTo delete the date, an empty string\
            \ must be provided.\nOnly available in sales documents if the extension\
            \ module \"Production\" is deactivated\nand the extension module \"Bill\
            \ of Material\" is in use.\nSpecial note: For credit notes, this property\
            \ is used for the disassembly date.\n"
          example: ""
          nullable: true
          type: string
        StockNumber:
          description: |
            Lagernummer der Position

            **English version:**
            Stock number of the line item
          example: 1
          nullable: true
          type: integer
        StockId:
          description: |
            Id des Lagers der Position (technischer Schlüssel)

            **English version:**
            ID of the stock of the line item (technical key)
          nullable: true
          readOnly: true
          type: integer
        Quantity:
          description: |
            Menge (in der Einheit bezogen auf den QuantityUnitIndicator)

            **English version:**
            Quantity (in the unit based on QuantityUnitIndicator)
          example: 2
          nullable: true
          type: number
        QuantityUnit:
          description: |
            Mengeneinheit (bezogen auf den QuantityUnitIndicator)

            **English version:**
            Quantity unit (based on QuantityUnitIndicator)
          example: Manntage
          nullable: true
          type: string
        QuantityFactor1:
          description: |
            Mengenfaktor 1

            **English version:**
            Quantity factor 1
          example: 8
          nullable: true
          type: number
        QuantityFactor2:
          description: |
            Mengenfaktor 2

            **English version:**
            Quantity factor 2
          nullable: true
          type: number
          example: null
        QuantityFactor3:
          description: |
            Mengenfaktor 3

            **English version:**
            Quantity factor 3
          nullable: true
          type: number
          example: null
        QuantityFactor4:
          description: |
            Mengenfaktor 4

            **English version:**
            Quantity factor 4
          nullable: true
          type: number
          example: null
        QuantityUnitIndicator:
          description: |
            Mengenangabe in Preis- oder Liefereinheiten

            **English version:**
            Quantity specification in price or delivery units
          enum:
          - PriceUnit
          - DeliveryUnit
          example: DeliveryUnit
          nullable: true
          type: string
        QuantityInPriceUnits:
          description: |
            Menge in Preiseinheiten.
            Dieses Feld ist read-only. Wenn die Menge der Position geändert werden soll, muss das Feld "Quantity" besetzt werden.

            **English version:**
            Quantity in price units.
            This field is read-only. If the quantity of the line item should be changed, the field "Quantity" must be filled.
          example: 16
          nullable: true
          readOnly: true
          type: number
        QuantityUnitForPriceUnits:
          description: |
            Mengeneinheit für die Menge in Preiseinheiten

            **English version:**
            Quantity unit for the quantity in price units
          example: Stunden
          nullable: true
          type: string
        QuantityInDeliveryUnits:
          description: |
            Menge in Liefereinheiten.
            Dieses Feld ist read-only. Wenn die Menge der Position geändert werden soll, muss das Feld "Quantity" besetzt werden.

            **English version:**
            Quantity in delivery units.
            This field is read-only. If the quantity of the line item should be changed, the field "Quantity" must be filled.
          example: 2
          nullable: true
          readOnly: true
          type: number
        QuantityUnitForDeliveryUnits:
          description: |
            Mengeneinheit für die Menge in Liefereinheiten

            **English version:**
            Quantity unit for the quantity in delivery units
          example: Manntage
          nullable: true
          type: string
        IsUnitPriceAndRebateFixed:
          description: |
            Preis und Rabatt sind fixiert, d.h. sie werden bei Folgeverarbeitungen nicht mehr gändert.

            **English version:**
            Price and rebate are fixed, i.e. they are no longer changed during subsequent processing.
          example: false
          nullable: true
          type: boolean
        UnitPrice:
          description: |
            Preis des Artikels

            **English version:**
            Price of the product
          example: 100
          nullable: true
          type: number
        PriceQuantity:
          description: |
            Preis per Angabe, d.h. auf diese Menge (in Preiseinheiten)
            beziehen sich alle Preisangaben
            Beispiel: Preis per 1 Flasche.

            **English version:**
            Price per specification, i.e. all price specifications
            refer to this quantity (in price units)
            Example: Price per 1 bottle.
          example: 1
          nullable: true
          readOnly: true
          type: number
        RebatePercentage:
          description: |
            Positionsrabatt in Prozent

            **English version:**
            Line item rebate in percent
          example: 0
          nullable: true
          type: number
        PriceList:
          description: |
            Nummer der Preisliste

            **English version:**
            Number of the price list
          example: 1
          nullable: true
          type: integer
        GrossOrNetIndicator:
          description: |
            Gibt an, ob die Position in brutto oder netto erfasst ist.

            **English version:**
            Specifies whether the line item is recorded as gross or net.
          enum:
          - Gross
          - Net
          example: Net
          nullable: true
          type: string
        GrossAmount:
          description: |
            Bruttobetrag

            **English version:**
            Gross amount
          example: 1904
          nullable: true
          readOnly: true
          type: number
        NetAmount:
          description: |
            Nettobetrag

            **English version:**
            Net amount
          example: 1600
          nullable: true
          readOnly: true
          type: number
        IsAmountFixed:
          description: |
            Betrag ist fixiert, d.h. Preis und Rabatt können nicht angegeben werden und werden automatisch berechnet.

            **English version:**
            Amount is fixed, i.e. price and rebate cannot be specified and are calculated automatically.
          example: false
          nullable: true
          type: boolean
        Amount:
          description: |
            Betrag (berücksichtigt brutto/netto der Position)

            **English version:**
            Amount (considers gross/net of the line item)
          example: 1600
          nullable: true
          type: number
        IsPurchasePriceFixed:
          description: |
            Beleg-Einstandspreis ist fixiert, d.h. er wird bei bei Folgeverarbeitungen nicht mehr geändert (nur zulässig in Verkaufsbeleg).

            **English version:**
            Document purchase price is fixed, i.e. it is no longer changed during subsequent processing (only allowed in sales document).
          example: false
          nullable: true
          type: boolean
        PurchasePrice:
          description: |
            Beleg-Einstandspreis (nur zulässig in Verkaufsbeleg)

            **English version:**
            Document purchase price (only allowed in sales document)
          nullable: true
          type: number
          example: null
        DeliveryDate:
          description: "Liefer-/Leistungsdatum im Format YYYY-MM-DD. \nZum Löschen\
            \ des Datums muss ein Leerstring übermittelt werden.\n\n**English version:**\n\
            Delivery/service date in format YYYY-MM-DD.\nTo delete the date, an empty\
            \ string must be provided.\n"
          nullable: true
          type: string
        CustomerDeliveryDate:
          description: "Kundenliefertermin (nur für Einkaufsbelege) im Format YYYY-MM-DD.\
            \ \nZum Löschen des Datums muss ein Leerstring übermittelt werden.\n\n\
            **English version:**\nCustomer delivery date (only for purchase documents)\
            \ in format YYYY-MM-DD.\nTo delete the date, an empty string must be provided.\n"
          nullable: true
          type: string
        RemainingQuantity:
          description: |
            Restmenge (der Ursprungsposition als Ausweis im Zielbeleg)

            **English version:**
            Remaining quantity (of the source line item as shown in the target document)
          nullable: true
          type: number
          example: null
        QuantityAlreadyProcessed:
          description: |
            Bereits verarbeitend abgerufene Menge (z.B. nach Teilabruf).

            **English version:**
            Quantity already processed during call-off (e.g. after partial call-off).
          nullable: true
          readOnly: true
          type: number
          example: null
        QuantityToProcess:
          description: |
            Noch abzurufende Menge (z.B. nach Teilabruf).

            **English version:**
            Quantity still to be called off (e.g. after partial call-off).
          nullable: true
          readOnly: true
          type: number
        IsDocumentLevelSurcharge:
          description: |
            Artikelposition als Zuschlag auf Rechnungsebene in eine E-Rechnung einsteuern.
            Der Zuschlag wird in BG-21 eingesteuert. Der Betrag der Position muss positiv sein und
            wird in BT-99 eingesteuert.

            **English version:**
            Control product line item as surcharge at invoice level in an electronic invoice.
            The surcharge is filled into BG-21. The amount of the line item must be positive and is
            filled into BT-99.
          example: false
          nullable: true
          type: boolean
        ReasonCode:
          description: |
            Internationaler Begründungscode (Reason Code) gemäß UNTDID 5189, wenn die
            Artikelposition als Zuschlag auf Rechnungsebene in eine E-Rechnung eingesteuert wird.
            Der Begründungscode wird in BT-105 eingesteuert.

            **English version:**
            International reason code according to UNTDID 5189, when the product line item is
            controlled as surcharge at invoice level in an electronic invoice.
            The reason code is filled into BT-105.
          maxLength: 3
          nullable: true
          type: string
          example: null
        Remark:
          description: |
            Anmerkung

            **English version:**
            Remark
          example: Anmerkung
          nullable: true
          type: string
        Text:
          description: |
            Positionstext

            **English version:**
            Line item text
          example: Organisationsberatung
          nullable: true
          type: string
        OrderReference:
          description: |
            Bestellnummer (Auftragsreferenz)
            Wird nur gefüllt, wenn abweichend von der Angabe im Belegkopf.

            **English version:**
            Order number (order reference)
            Only filled if different from the specification in the document header.
          nullable: true
          type: string
        OrderReferenceLineNumber:
          description: |
            Bestellnummer der Position (Auftragsreferenz-Positionsnummer)
            Nur für Verkaufsbelege.

            **English version:**
            Order number of the line item (order reference line number)
            Only for sales documents.
          example: "5566-01, 5566-02"
          nullable: true
          type: string
        ObjectNumber:
          description: |
            Objektnummer (z.B. Zählernummer, Kfz-Kennzeichen, versicherte Person, Abonnement-Nummer).
            Nur für Verkaufsbelege.

            **English version:**
            Object number (e.g. meter number, vehicle registration, insured person, subscription number).
            Only for sales documents.
          nullable: true
          type: string
        OrderDate:
          description: |
            Auftragsdatum im Format YYYY-MM-DD.
            Wird nur gefüllt, wenn abweichend von der Angabe im Belegkopf.
            Zum Löschen des Datums muss ein Leerstring übermittelt werden.

            **English version:**
            Order date in format YYYY-MM-DD.
            Only filled if different from the specification in the document header.
            To delete the date, an empty string must be provided.
          nullable: true
          type: string
