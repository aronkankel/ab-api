        Endpunkt zum Abrufen der Schnittstellendefinition als YAML-Datei.

        **English version:**
        Endpoint to retrieve the interface definition as a YAML file.
      operationId: getDefinitionYaml
      responses:
        "200":
          content:
            application/yaml;charset=utf-8:
              schema:
                type: string
          description: |
