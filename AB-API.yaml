    PurchaseDocumentTypeBase:
      description: |
        Basis-Model für Belegart Einkauf.

        **English version:**
        Base model for purchase document type.
      properties:
        MissingExternalDocumentNumberAction:
          description: |
            Maßnahme, wenn im Beleg keine Fremdbelegnummer angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.

            **English version:**
            Action when no external document number is specified in the document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving of the document.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          nullable: true
          type: string
        ShouldPresetOrderDateWithDocumentDate:
          description: |
            Gibt an, ob das Auftragsdatum des Belegs mit dem Belegdatum vorbesetzt werden soll.

            **English version:**
            Indicates whether the order date of the document should be preset with the document date.
          nullable: true
          type: boolean
        MissingOrderNumberAction:
          description: |
            Maßnahme, wenn im Beleg keine Auftragsnummer angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when no order number is specified in the document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving of the document.
            - **AsDefinedInSettings** -> As defined in the company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        OrderNumberPreset:
          description: |
            Gibt an, wie die Auftragsnummer vergeben wird.

            Mögliche Ausprägungen:
            - **None** -> Keine automatische Vergabe, Benutzer muss neue Auftragsnummer selbst erfassen.
            - **ByDocumentType** -> Automatische Vorbesetzung der Auftragsnummer durch die Belegart.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Indicates how the order number is assigned.

            Possible values:
            - **None** -> No automatic assignment, user must enter new order number manually.
            - **ByDocumentType** -> Automatic presetting of the order number by the document type.
            - **AsDefinedInSettings** -> As defined in the company settings.
          enum:
          - None
          - ByDocumentType
          - AsDefinedInSettings
          nullable: true
          type: string
        DuplicateOrderNumberAction:
          description: |
            Maßnahme, wenn die im Beleg vergebene Auftragsnummer bereits für einen anderen Beleg verwendet wird.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when the order number assigned in the document is already used for another document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving of the document.
            - **AsDefinedInSettings** -> As defined in the company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        PrintDescription:
          description: |
            Bezeichnung der Belegart für den Druck.

            **English version:**
            Description of the document type for printing.
          nullable: true
          type: string
        OriginOfPrintAddress1:
          description: |
            Angabe zur Herkunft der Druckadresse 1.

            Mögliche Ausprägungen:
            - **Empty** -> Leer.
            - **DeliveryAddress** -> Anlieferungsadresse.
            - **DocumentAddress** -> Belegadresse.

            **English version:**
            Specification of the origin of print address 1.

            Possible values:
            - **Empty** -> Empty.
            - **DeliveryAddress** -> Delivery address.
            - **DocumentAddress** -> Document address.
          enum:
          - Empty
          - DeliveryAddress
          - DocumentAddress
          nullable: true
          type: string
        OriginOfPrintAddress2:
          description: |
            Angabe zur Herkunft der Druckadresse 2.

            Mögliche Ausprägungen:
            - **Empty** -> Leer.
            - **DeliveryAddress** -> Anlieferungsadresse.
            - **DocumentAddress** -> Belegadresse.

            **English version:**
            Specification of the origin of print address 2.

            Possible values:
            - **Empty** -> Empty.
            - **DeliveryAddress** -> Delivery address.
            - **DocumentAddress** -> Document address.
          enum:
          - Empty
          - DeliveryAddress
          - DocumentAddress
          nullable: true
          type: string
        DefaultDocumentPublishingTarget:
          description: |
            Vorbesetzung für die Belegausgabe über Datei/Drucken.

            Mögliche Ausprägungen:
            - **EMailIfPreferred** -> Ausgabe per E-Mail, wenn vom Lieferanten bevorzugt, sonst Druck.
            - **Print** -> Ausgabe per Druck.

            **English version:**
            Default setting for document output via file/print.

            Possible values:
            - **EMailIfPreferred** -> Output via email if preferred by the supplier, otherwise print.
            - **Print** -> Output via print.
          enum:
          - EMailIfPreferred
          - Print
          nullable: true
          type: string
        AutoPublishOnEditAndProcess:
          description: |
            Nach Belegbearbeitung und Abruf automatisch drucken/senden.

            Mögliche Ausprägungen:
            - **None** -> Keine automatische Belegausgabe.
            - **EMailIfPreferred** -> E-Mail, wenn vom Lieferanten bevorzugt, sonst Druck.
            - **PrintOnly** -> Ausgabe per Druck.
            - **EMailOnly** -> Ausgabe per E-Mail.
            - **PrintAndEMail** -> Ausgabe per Druck und E-Mail.

            **English version:**
            Automatically print/send after document editing and processing.

            Possible values:
            - **None** -> No automatic document output.
            - **EMailIfPreferred** -> Email if preferred by the supplier, otherwise print.
            - **PrintOnly** -> Output via print.
            - **EMailOnly** -> Output via email.
            - **PrintAndEMail** -> Output via print and email.
          enum:
          - None
          - EMailIfPreferred
          - PrintOnly
          - EMailOnly
          - PrintAndEMail
          nullable: true
          type: string
        AutoPublishOnImport:
          description: |
            Nach Datenimport automatisch drucken/senden.

            Mögliche Ausprägungen:
            - **None** -> Keine automatische Belegausgabe.
            - **EMailIfPreferred** -> E-Mail, wenn vom Lieferanten bevorzugt, sonst Druck.
            - **PrintOnly** -> Ausgabe per Druck.
            - **EMailOnly** -> Ausgabe per E-Mail.
            - **PrintAndEMail** -> Ausgabe per Druck und E-Mail.

            **English version:**
            Automatically print/send after data import.

            Possible values:
            - **None** -> No automatic document output.
            - **EMailIfPreferred** -> Email if preferred by the supplier, otherwise print.
            - **PrintOnly** -> Output via print.
            - **EMailOnly** -> Output via email.
            - **PrintAndEMail** -> Output via print and email.
          enum:
          - None
          - EMailIfPreferred
          - PrintOnly
          - EMailOnly
          - PrintAndEMail
          nullable: true
          type: string
        TaxText:
          description: |
            Steuertext.

            **English version:**
            Tax text.
          nullable: true
          type: string
        BillOfMaterialUsage:
          description: |
            Angabe, ob und wie Stücklisten in Belegen dieser Belegart aufgelöst werden sollen.

            Mögliche Ausprägungen:
            - **AsIs** -> Nicht auflösen.
            - **ExplodeFirstLevelOnly** -> Statt des Artikels die Stücklistenpositionen einfügen, keine Baugruppen auflösen.
            - **ExplodeAllLevels** -> Statt des Artikels die Stücklistenpositionen einfügen und ggf. enthaltene Baugruppen auflösen.

            **English version:**
            Specification whether and how bills of material should be exploded in documents of this document type.

            Possible values:
            - **AsIs** -> Do not explode.
            - **ExplodeFirstLevelOnly** -> Insert bill of material line items instead of the product, do not explode assemblies.
            - **ExplodeAllLevels** -> Insert bill of material line items instead of the product and explode contained assemblies if applicable.
          enum:
          - AsIs
          - ExplodeFirstLevelOnly
          - ExplodeAllLevels
          nullable: true
          type: string
        PrintSettingsForBomParts:
          description: |
            Druckeinstellung für den Positionsdruck bei Bestandteilen einer Stückliste.

            Mögliche Ausprägungen:
            - **PrintAsDefinedInBom** -> Einstellung aus den Stammdaten der Stückliste verwenden.
            - **PrintNone** -> Bestandteile einer Stückliste nicht drucken.
            - **PrintAll** -> Alle Bestandteile einer Stückliste drucken.

            **English version:**
            Print setting for line item printing of bill of material components.

            Possible values:
            - **PrintAsDefinedInBom** -> Use setting from the bill of material master data.
            - **PrintNone** -> Do not print bill of material components.
            - **PrintAll** -> Print all bill of material components.
          enum:
          - PrintAsDefinedInBom
          - PrintNone
          - PrintAll
          nullable: true
          type: string
        PrintSettingsForPricesOfBomParts:
          description: |
            Druckeinstellung für den Druck von Positionspreisen bei Bestandteilen einer Stückliste.

            Mögliche Ausprägungen:
            - **PrintAsDefinedInBom** -> Einstellung aus den Stammdaten der Stückliste verwenden.
            - **PrintNone** -> Preise für Bestandteile einer Stückliste nicht drucken.
            - **PrintAll** -> Preise für alle Bestandteile einer Stückliste drucken.

            **English version:**
            Print setting for printing line item prices of bill of material components.

            Possible values:
            - **PrintAsDefinedInBom** -> Use setting from the bill of material master data.
            - **PrintNone** -> Do not print prices for bill of material components.
            - **PrintAll** -> Print prices for all bill of material components.
          enum:
          - PrintAsDefinedInBom
          - PrintNone
          - PrintAll
          nullable: true
          type: string
        ShouldAttachmentsOfItemsBeInsertedWithBom:
          description: |
            Gibt an, ob Dokumentanhänge der Bestandteile beim Einfügen des Artikels
            mit Stückliste in den Beleg eingefügt werden sollen.

            **English version:**
            Indicates whether document attachments of the components should be inserted
            when inserting the product with bill of material into the document.
          nullable: true
          type: boolean
        SalesDocumentTypesToProcess:
          description: |
            Gibt an, von welchen Belegarten Verkauf der Abruf in diese Belegart möglich ist.

            **English version:**
            Indicates from which sales document types processing into this document type is possible.
          items:
            $ref: '#/components/schemas/DocumentTypeCoreProperties'
          nullable: true
          type: array
        PurchaseDocumentTypesToProcess:
          description: |
            Gibt an, von welchen Belegarten Einkauf der Abruf in diese Belegart möglich ist.

            **English version:**
            Indicates from which purchase document types processing into this document type is possible.
          items:
            $ref: '#/components/schemas/DocumentTypeCoreProperties'
          nullable: true
          type: array
      title: PurchaseDocumentTypeBase
      type: object
    PurchaseDocumentTypeExtendedProperties:
      description: |
        Zusätzliche Properties einer Belegart Einkauf.

        **English version:**
        Additional properties of a purchase document type.
      properties:
        InventoryManagement:
          description: |
            Gibt die Bestandsführung der Belegart an.

            Mögliche Ausprägungen:
            - **None** -> Keine Bestandführung, Lagerbestand und -wert ändern sich nicht.
            - **ChangeOfOrderedQuantity** -> Menge erhöht oder vermindert den bestellten Bestand.
            - **ChangeOfInventoryQuantity** -> Menge erhöht oder vermindert den Lagerbestand.
            - **ChangeOfInventoryValue** -> Erhöht oder vermindert den Lagerwert, Bestand wird nicht verändert.

            **English version:**
            Indicates the inventory management of the document type.

            Possible values:
            - **None** -> No inventory management, stock quantity and value do not change.
            - **ChangeOfOrderedQuantity** -> Quantity increases or decreases the ordered stock.
            - **ChangeOfInventoryQuantity** -> Quantity increases or decreases the inventory stock.
            - **ChangeOfInventoryValue** -> Increases or decreases the inventory value, stock is not changed.
          enum:
          - None
          - ChangeOfOrderedQuantity
          - ChangeOfInventoryQuantity
          - ChangeOfInventoryValue
          nullable: true
          type: string
        IsStockRequired:
          description: |
            Gibt an, ob die Eingabe eines Lagers erforderlich ist.

            **English version:**
            Indicates whether entering a stock is required.
          nullable: true
          type: boolean
        IsCreditNote:
          description: |
            Gibt an, ob Belege der Belegart Gutschriften oder Stornobelege sind.

            **English version:**
            Indicates whether documents of this document type are credit notes or cancellation documents.
          nullable: true
          type: boolean
        PresetLastAcquisitionPrice:
          description: |
            Gibt an, ob bei Belegen der Belegart der letzte Einstandspreis (LEK) besetzt wird.

            **English version:**
            Indicates whether the last acquisition price (LEK) is populated in documents of this document type.
          nullable: true
          type: boolean
        IsForInternalInvoice:
          description: |
            Gibt an, ob Belege der Belegart Eigenrechnungen (Gutschriften gemäß § 14 Abs. 2 UStG) sind.

            **English version:**
            Indicates whether documents of this document type are self-billing invoices (credit notes according to § 14 para. 2 UStG).
          nullable: true
          type: boolean
        CanEditExistingDocument:
          description: |
            Gibt an, ob es möglich ist einen vorhandenen Beleg der Belegart zu ändern.

            **English version:**
            Indicates whether it is possible to edit an existing document of this document type.
          nullable: true
          type: boolean
        IsCashInvoice:
          description: |
            Gibt an, ob ein Beleg der Belegart eine Barrechnung ist.

            **English version:**
            Indicates whether a document of this document type is a cash invoice.
          nullable: true
          type: boolean
        MissingTermsOfPaymentAction:
          description: |
            Maßnahme, wenn im Beleg keine Zahlungsbedingung angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when no terms of payment are specified in the document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving of the document.
            - **AsDefinedInSettings** -> As defined in the company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        MissingDeliveryConditionAction:
          description: |
            Maßnahme, wenn im Beleg keine Lieferbedingung angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when no delivery condition is specified in the document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving of the document.
            - **AsDefinedInSettings** -> As defined in the company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        IsProcessPermittedForLockedSupplier:
          description: |
            Gibt an, ob der Abruf aus dieser Belegart zugelassen ist,
            wenn für den Lieferant Belegsperre gesetzt ist.

            **English version:**
            Indicates whether processing from this document type is permitted
            when a document lock is set for the supplier.
          nullable: true
          type: boolean
        IsProcessPermittedForLockedProduct:
          description: |
            Gibt an, ob der Abruf aus dieser Belegart für einen Artikel zugelassen ist,
            wenn dieser für die Belegbearbeitung gesperrt ist.

            **English version:**
            Indicates whether processing from this document type is permitted for a product
            when it is locked for document editing.
          nullable: true
          type: boolean
        IsForOrderProposal:
          description: |
            Gibt an, ob die Belegart für Bestellvorschläge verwendet wird.

            **English version:**
            Indicates whether the document type is used for order proposals.
          nullable: true
          type: boolean
        ShouldTransferOrderDeliveryDateToCustomerDeliveryDate:
          description: |
            Gibt an, ob bei einem auftragsbezogenen Bestellvorschlag das Lieferdatum des
            Auftrags als Kundenliefertermin übernommen werden soll.

            **English version:**
            Indicates whether the delivery date of the order should be transferred
            as customer delivery date in an order-related order proposal.
          nullable: true
          type: boolean
        HintText:
          description: |
            Hinweistext, der in Belegen dieser Belegart vorbesetzt wird.

            **English version:**
            Hint text that is preset in documents of this document type.
          nullable: true
          type: string
        AdditionalText:
          description: |
            Zusätzlicher Text, der in Belegen dieser Belegart vorbesetzt wird.

            **English version:**
            Additional text that is preset in documents of this document type.
          nullable: true
          type: string
      title: PurchaseDocumentTypeExtendedProperties
      type: object
