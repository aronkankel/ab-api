    VatIdCheckResult:
      example:
        Zip: "12345"
        CheckedVatId: ATU12345678
        ResultForCompanyName: A
        ResultForZip: A
        City: musterort
        EVatStatusCode: evatr-0004
        Timestamp: 2000-01-23T04:56:07.000+00:00
        ResultForCity: A
        RawResult: RawResult
        CompanyName: Musterhaus GmbH & Co KG
        CheckType: Qualified
        ValidTo: 2000-01-23
        Street: Musterstrasse 22
        ValidFrom: 2000-01-23
        Id: 1
        RequesterVatId: DE123456789
        ResultForStreet: A
        IsValid: true
      properties:
        Id:
          description: |
            Id der USt-IdNr. Prüfung (technischer Schlüssel)

            **English version:**
            Id of the VAT ID check (technical key)
          example: 1
          nullable: true
          type: integer
        CheckType:
          description: |
            Art der durchgeführten Prüfung

            Mögliche Ausprägungen:
            - **Simple** -> Einfache Prüfung ohne Rückmeldung des Namens und der Anschrift
            - **Qualified** -> Qualifizierte Prüfung mit Rückmeldung des Namens und der Anschrift
            - **Manual** -> Manuelle Prüfung via Webbrowser

            **English version:**
            Type of check performed

            Possible values:
            - **Simple** -> Simple check without feedback of name and address
            - **Qualified** -> Qualified check with feedback of name and address
            - **Manual** -> Manual check via web browser
          enum:
          - Simple
          - Qualified
          - Manual
          example: Qualified
          nullable: true
          type: string
        CheckedVatId:
          description: |
            USt-IdNr. die geprüft wurde.

            **English version:**
            VAT ID that was checked.
          example: ATU12345678
          nullable: true
          type: string
        RequesterVatId:
          description: |
            USt-IdNr. des Anfragenden.

            **English version:**
            VAT ID of the requester.
          example: DE123456789
          nullable: true
          type: string
        CompanyName:
          description: |
            Firmenname bei qualifizierter Prüfung.

            **English version:**
            Company name in qualified check.
          example: Musterhaus GmbH & Co KG
          nullable: true
          type: string
        ResultForCompanyName:
          $ref: '#/components/schemas/VatIdFieldCheckResult'
        Street:
          description: |
            Straße bei qualifizierter Prüfung.

            **English version:**
            Street in qualified check.
          example: Musterstrasse 22
          nullable: true
          type: string
        ResultForStreet:
          $ref: '#/components/schemas/VatIdFieldCheckResult'
        City:
          description: |
            Ort bei qualifizierter Prüfung.

            **English version:**
            City in qualified check.
          example: musterort
          nullable: true
          type: string
        ResultForCity:
          $ref: '#/components/schemas/VatIdFieldCheckResult'
        Zip:
          description: |
            Postleitzahl bei qualifizierter Prüfung.

            **English version:**
            Postal code in qualified check.
          example: "12345"
          nullable: true
          type: string
        ResultForZip:
          $ref: '#/components/schemas/VatIdFieldCheckResult'
        EVatStatusCode:
          description: |
            Erweiterter Statuscode der USt-IdNr.-Prüfung.
            Nur bei einem "Simple" oder "Qualified" Check besetzt.

            Weitere Informationen zum EVatStatusCode finden Sie in der Schnittstellenbeschreibung des BZSt.
            https://api.evatr.vies.bzst.de/api-docs

            **English version:**
            Extended status code of the VAT ID check.
            Only populated for a "Simple" or "Qualified" check.

            Further information about the EVatStatusCode can be found in the interface description of the BZSt.
            https://api.evatr.vies.bzst.de/api-docs
          example: evatr-0004
          nullable: true
          type: string
        IsValid:
          description: |
            Gibt an, ob die zu prüfende USt-IdNr. gültig ist.

            **English version:**
            Specifies whether the VAT ID to be checked is valid.
          example: true
          nullable: true
          type: boolean
        ValidFrom:
          description: |
            Gibt an, ab welchem Datum die zu prüfende USt-IdNr. gültig ist.

            **English version:**
            Specifies from which date the VAT ID to be checked is valid.
          format: date
          nullable: true
          type: string
        ValidTo:
          description: |
            Gibt an, ab welchem Datum die zu prüfende USt-IdNr. gültig ist.

            **English version:**
            Specifies from which date the VAT ID to be checked is valid.
          format: date
          nullable: true
          type: string
        RawResult:
          description: |
            Rohergebnis der USt-IdNr. Prüfung.

            **English version:**
            Raw result of the VAT ID check.
          nullable: true
          type: string
        Timestamp:
          description: |
            Zeitstempel der USt-IdNr. Prüfung.

            **English version:**
            Timestamp of the VAT ID check.
          format: date-time
          nullable: true
          type: string
      type: object
    VatIdFieldCheckResult:
      description: |
        Gibt das Ergebnis der qualifizierten Prüfung an.

        Ausprägungen:
        - A -> Die Angaben zur geprüften USt-IdNr. stimmen mit den registrierten Daten überein.
        - B -> Die Angaben zur geprüften USt-IdNr. stimmen mit den registrierten Daten nicht überein.
        - C -> Die Angaben zur geprüften USt-IdNr. wurden nicht angefragt.
        - D -> Die Angaben zur geprüften USt-IdNr. wurden vom EU-Mitgliedstaat nicht übermittelt.

        **English version:**
        Indicates the result of the qualified check.

        Values:
        - A -> The information about the checked VAT ID matches the registered data.
        - B -> The information about the checked VAT ID does not match the registered data.
        - C -> The information about the checked VAT ID was not requested.
        - D -> The information about the checked VAT ID was not transmitted by the EU member state.
      enum:
      - A
      - B
      - C
      - D
      example: A
      nullable: true
      type: string
    VatIdCheckRequest:
      example:
        VatIdToCheck: VatIdToCheck
        CheckType: Simple
        RequesterVatId: RequesterVatId
      properties:
        CheckType:
          description: |
            Art der durchzuführenden Prüfung.

            Mögliche Ausprägungen:
            - **Simple** -> Einfache Prüfung ohne Rückmeldung des Namens und der Anschrift
            - **Qualified** -> Qualifizierte Prüfung mit Rückmeldung des Namens und der Anschrift

            **English version:**
            Type of check to be performed.

            Possible values:
            - **Simple** -> Simple check without feedback of name and address
            - **Qualified** -> Qualified check with feedback of name and address
          enum:
          - Simple
          - Qualified
          type: string
        VatIdToCheck:
          description: |
            Abweichende USt-IdNr. des Geschäftspartners,
            die anstelle der in den Stammdaten des Kunden/Lieferanten hinterlegten USt-IdNr.
            für die Prüfanfrage an das BZSt verwendet werden soll. *(Optional)*

            **English version:**
            Alternative VAT ID of the business partner,
            which should be used instead of the VAT ID stored in the master data of the customer/supplier
            for the check request to the BZSt. *(Optional)*
          nullable: true
          type: string
        RequesterVatId:
          description: |
            Abweichende USt-IdNr. des prüfenden Unternehmens,
            die anstelle der in den Stammdaten der Firma hinterlegten USt-IdNr.
            für die Prüfanfrage an das BZSt verwendet werden soll. *(Optional)*

            **English version:**
            Alternative VAT ID of the checking company,
            which should be used instead of the VAT ID stored in the master data of the company
            for the check request to the BZSt. *(Optional)*
          nullable: true
          type: string
      required:
      - CheckType
      type: object
