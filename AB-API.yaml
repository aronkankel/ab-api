            Mengenangabe in Preis- oder Liefereinheiten

            **English version:**
            Quantity specification in price or delivery units
          enum:
          - PriceUnit
          - DeliveryUnit
          nullable: true
          type: string
        Amount:
          description: |
            Betrag, der abgerufen werden soll (für Konditionspositionen)

            **English version:**
            Amount that should be processed (for condition line items)
          nullable: true
          type: number
        RemainingAmount:
          description: |
            Betrag, der im Ursprungsbeleg verbleiben soll (für
            Konditionspositionen)

            **English version:**
            Amount that should remain in the source document (for
            condition line items)
          nullable: true
          type: number
        SerialOrLotNumbers:
          description: |
            Serien-/Chargennummern, die aus dem Ursprungsbeleg übernommen werden
            sollen.

            **English version:**
            Serial/lot numbers that should be transferred from the source document.
          items:
            $ref: '#/components/schemas/ProcessSerialOrLotLineItem'
          nullable: true
          type: array
        BillOfMaterialItems:
          description: |
            Angaben zur Stückliste der Ursprungsposition für den Abruf, z.B. zu abzurufenden und
            verbleibenden Serien-/Chargennummern.

            **English version:**
            Information about the bill of material of the source line item for processing, e.g. for serial/lot numbers to be processed and
            remaining serial/lot numbers.
          items:
            $ref: '#/components/schemas/SourceBillOfMaterialItem'
          nullable: true
          type: array
      required:
      - DoProcess
      - DoRemain
      - Id
      - SourceDocumentId
      title: SourceLineItemData
      type: object
    ProcessSerialOrLotLineItem:
      description: |
        Enthält die für den Belegabruf erforderlichen Daten zu einer
        Serien-/Chargennummer aus einer Ursprungsposition.

        **English version:**
        Contains the data required for document processing of a
        serial/lot number from a source line item.
      example:
        DoProcess: true
        DoRemain: true
        RemainingQuantity: 7.386281948385884
        Quantity: 4.145608029883936
        SerialOrLotNumber: SerialOrLotNumber
      properties:
        SerialOrLotNumber:
          description: |
            Serien-/Chargennummer

            **English version:**
            Serial/lot number
          type: string
        DoProcess:
          description: |
            Gibt an, ob die Serien-/Chargennummer abgerufen werden soll.
            Nur für Chargen: Ist die Property "Quantity" gefüllt, wird die Chargennummer abgerufen.

            **English version:**
            Indicates whether the serial/lot number should be processed.
            Only for lots: If the property "Quantity" is filled, the lot number is processed.
          type: boolean
        DoRemain:
          description: |
            Gibt an, ob die Serien-/Chargennummer im Ursprungsbeleg verbleiben
            soll.
            Nur für Chargen: Ist die Property "RemainingQuantity" gefüllt, verbleibt die Chargennummer im Ursprungsbeleg.

            **English version:**
            Indicates whether the serial/lot number should remain
            in the source document.
            Only for lots: If the property "RemainingQuantity" is filled, the lot number remains in the source document.
          type: boolean
        Quantity:
          description: |
            Abrufmenge (nur für Chargen)

            **English version:**
            Processing quantity (only for lots)
          nullable: true
          type: number
        RemainingQuantity:
          description: |
            Verbleibmenge (nur für Chargen)

            **English version:**
            Remaining quantity (only for lots)
          nullable: true
          type: number
      required:
      - DoProcess
      - DoRemain
      - SerialOrLotNumber
      title: ProcessSerialOrLotLineItem
      type: object
    SourceBillOfMaterialItem:
      description: |
        Angaben zum Abruf einer Stücklistenposition aus dem Ursprungsbeleg.
        Die Stückliste wird nicht als Baum (mit verschiedenen Ebenen) erwartet, sondern es wird
        eine Zuordnung zum Bestandteil der Ursprungsposition über die Id vorgenommen. So sind auch
        Bestandteile adressierbar, die auf tieferen Stücklisten-Ebenen liegen.

        **English version:**
        Information for processing a bill of material line item from the source document.
        The bill of material is not expected as a tree (with different levels), but rather
        an assignment to the component of the source line item is made via the ID. This also makes
        components addressable that are on deeper bill of material levels.
      example:
        Id: 1
        SerialOrLotNumbers:
        - DoProcess: true
          DoRemain: true
          RemainingQuantity: 7.386281948385884
          Quantity: 4.145608029883936
          SerialOrLotNumber: SerialOrLotNumber
        - DoProcess: true
          DoRemain: true
          RemainingQuantity: 7.386281948385884
          Quantity: 4.145608029883936
          SerialOrLotNumber: SerialOrLotNumber
      properties:
        Id:
          description: |
            Identifikator des Stücklistenbestandteils in der Ursprungsposition (Technischer Schlüssel).
            z.B. SalesDocument/LineItems[x]/ProductLineItemData/BillOfMaterial/Items[y]/Id (BillOfMaterialItem/Id)

            **English version:**
            Identifier of the bill of material component in the source line item (technical key).
            e.g. SalesDocument/LineItems[x]/ProductLineItemData/BillOfMaterial/Items[y]/Id (BillOfMaterialItem/Id)
          type: integer
        SerialOrLotNumbers:
          description: |
            Serien-/Chargennummern, die aus dem Ursprungsbeleg übernommen werden
            sollen.

            **English version:**
            Serial/lot numbers that should be transferred from the source document.
          items:
            $ref: '#/components/schemas/ProcessSerialOrLotLineItem'
          nullable: true
          type: array
      required:
      - Id
      title: SourceBillOfMaterialItem
      type: object
    TargetBillOfMaterialItem:
      description: |
        Angaben zu einer Stücklistenposition im Zielbeleg.
        Die Stückliste wird nicht als Baum (mit verschiedenen Ebenen) erwartet, sondern es wird
        eine Zuordnung zum Bestandteil der Ursprungsposition über die SourceBillOfMaterialItemId
        vorgenommen. So sind auch Bestandteile adressierbar, die auf tieferen Stücklisten-Ebenen
        liegen.

        **English version:**
        Information about a bill of material line item in the target document.
        The bill of material is not expected as a tree (with different levels), but rather
        an assignment to the component of the source line item is made via the SourceBillOfMaterialItemId.
        This also makes components addressable that are on deeper bill of material levels.
      example:
        SourceBillOfMaterialItemId: 1
        SerialOrLotNumbers:
        - SerialOrLotId: 7
          Quantity: 3.0205796992916243
          UserDefinedFields:
          - DefinitionId: 1
            Type: Alphanumeric
            Number: 1
            AlphanumericValue: D
            DateValue: DateValue
            NumericValue: NumericValue
            Name: Verkaufsgebiet
          - DefinitionId: 1
            Type: Alphanumeric
            Number: 1
            AlphanumericValue: D
            DateValue: DateValue
            NumericValue: NumericValue
            Name: Verkaufsgebiet
          SerialOrLotNumber: SerialOrLotNumber
          DateOfManufacture: DateOfManufacture
          DateOfExpiry: DateOfExpiry
          Notes: Notes
        - SerialOrLotId: 7
          Quantity: 3.0205796992916243
          UserDefinedFields:
          - DefinitionId: 1
            Type: Alphanumeric
            Number: 1
            AlphanumericValue: D
            DateValue: DateValue
            NumericValue: NumericValue
            Name: Verkaufsgebiet
          - DefinitionId: 1
            Type: Alphanumeric
            Number: 1
            AlphanumericValue: D
            DateValue: DateValue
            NumericValue: NumericValue
            Name: Verkaufsgebiet
          SerialOrLotNumber: SerialOrLotNumber
          DateOfManufacture: DateOfManufacture
          DateOfExpiry: DateOfExpiry
          Notes: Notes
      properties:
        SourceBillOfMaterialItemId:
          description: |
            Identifikator des Stücklistenbestandteils in der Ursprungsposition (Technischer Schlüssel).
            z.B. SalesDocument/LineItems[x]/ProductLineItemData/BillOfMaterial/Items[y]/Id (BillOfMaterialItem/Id)

            **English version:**
            Identifier of the bill of material component in the source line item (technical key).
            e.g. SalesDocument/LineItems[x]/ProductLineItemData/BillOfMaterial/Items[y]/Id (BillOfMaterialItem/Id)
          type: integer
        SerialOrLotNumbers:
          description: |
            Serien-/Chargennummern, die im Zielbeleg zusätzlich verwendet werden
            sollen (und nicht aus den Ursprungsbelegen übernommen werden).

            **English version:**
            Serial/lot numbers that should additionally be used in the target document
            (and are not transferred from the source documents).
          items:
            $ref: '#/components/schemas/SerialOrLotLineItem'
          nullable: true
          type: array
      required:
      - SourceBillOfMaterialItemId
      title: TargetBillOfMaterialItem
      type: object
    SourceDocumentData:
      description: |
        Enthält die Daten eines Ursprungsbelegs für den Belegabruf.

        **English version:**
        Contains the data of a source document for document processing.
      example:
        Id: 4
      properties:
        Id:
          description: |
            Identifikator des Ursprungsbelegs (Technischer Schlüssel)

            **English version:**
            Identifier of the source document (technical key)
          type: integer
      required:
      - Id
      title: SourceDocumentData
      type: object
    DocumentAction:
      description: |
        (Veraltet) Enthält die Aktion für die Belegverarbeitung.

        **English version:**
        (Deprecated) Contains the action for document processing.
      example:
        Action: SetCompletelyContinued
      properties:
        Action:
          description: "Veraltet -> anstelle der DocumentAction sollte\n/v1/sales-document/<id>/set-completely-continued\
            \ verwendet werden.\nAktion, die auf dem Beleg ausgeführt werden soll.\
            \                 \nSetCompletelyContinued -> Teilabgerufenen Beleg auf\
            \ vollständig verarbeitet setzen und alle noch abzurufenden Mengen auf\
            \ 0 setzen.\n\n**English version:**\nDeprecated -> instead of DocumentAction,\
            \ use\n/v1/sales-document/<id>/set-completely-continued.\nAction to be\
            \ performed on the document.\nSetCompletelyContinued -> Set partially\
            \ called-off document to completely processed and set all remaining quantities\
            \ to be called off to 0.\n"
          enum:
          - SetCompletelyContinued
          type: string
      required:
      - Action
      title: DocumentAction
      type: object
    SetLockForThirdPartyApplication:
      description: |
        Information zum Beleg in der Fremdanwendung

        **English version:**
        Information about the document in the third-party application
      example:
        IdInThirdPartyApplication: IdInThirdPartyApplication
      properties:
        IdInThirdPartyApplication:
          description: |
            Id des Belegs in der Fremdanwendung

            **English version:**
            ID of the document in the third-party application
          nullable: true
          type: string
      title: SetLockForThirdPartyApplication
      type: object
    SendMailSettings:
      description: "Enthält die Daten zum E-Mail-Versand.\nAlle Angaben sind optional.\
        \ Die Auftragsbearbeitung ermittelt aus Belegadressen und \nBenutzereinstellungen\
        \ alle Daten selbstständig. Werden hier Daten besetzt, dann ersetzen sie\n\
        die von der Auftragsbearbeitung ermittelten Daten.\n\n**English version:**\n\
        Contains the data for email sending.\nAll entries are optional. Auftragsbearbeitung\
        \ determines all data independently from document addresses and\nuser settings.\
        \ If data is provided here, it replaces the data determined by Auftragsbearbeitung.\n"
      example:
        To: receiver@example.com
        Cc: null
        Bcc: null
        Subject: RECHNUNG Nr. 4000001 vom 11.08.2022
        Message: Öffnen Sie die PDF-Datei im Anhang.
        FormatSettings:
          TemplateType: UseCustomLayout
          CustomTemplateId: null
          CustomLayoutPath: Vorgänge\beleg_ohne_preise.rpt
      properties:
        To:
          description: "E-Mail-Adresse des Empfängers. Nur erforderlich, wenn im Beleg\
            \ selbst keine E-Mail-Adresse \nhinterlegt ist oder der Beleg an eine\
            \ abweichende E-Mail-Adresse gesendet werden soll.\nWird diese Property\
            \ gefüllt, ersetzt sie die durch die Auftragsbearbeitung ermittelte \n\
            Empfänger-E-Mail-Adresse.\n\n**English version:**\nEmail address of the\
            \ recipient. Only required if no email address is stored in the document\
            \ itself\nor if the document should be sent to a different email address.\n\
            If this property is filled, it replaces the recipient email address determined\
            \ by Auftragsbearbeitung.\n"
          nullable: true
          type: string
        Cc:
          description: |
            E-Mail-Adresse des Kopie-Empfängers.

            **English version:**
            Email address of the copy recipient.
          nullable: true
          type: string
        Bcc:
          description: "E-Mail-Adresse des Blindkopie-Empfängers.\nWird diese Property\
            \ gefüllt, ersetzt sie die durch die Auftragsbearbeitung ermittelte \n\
            Blindkopie-E-Mail-Adresse.\n\n**English version:**\nEmail address of the\
            \ blind copy recipient.\nIf this property is filled, it replaces the blind\
            \ copy email address determined by Auftragsbearbeitung.\n"
          nullable: true
          type: string
        Subject:
          description: |
            Betreff der E-Mail.
            Wird diese Property gefüllt, ersetzt sie den durch die Auftragsbearbeitung ermittelten Betreff.

            **English version:**
            Subject of the email.
            If this property is filled, it replaces the subject determined by Auftragsbearbeitung.
          nullable: true
          type: string
        Message:
          description: |
            Nachricht der E-Mail.
            Wird diese Property gefüllt, ersetzt sie den durch die Auftragsbearbeitung ermittelten Nachrichtentext.

            **English version:**
            Message of the email.
            If this property is filled, it replaces the message text determined by Auftragsbearbeitung.
          nullable: true
          type: string
        FormatSettings:
          $ref: '#/components/schemas/DocumentFormatSettings'
      title: SendMailSettings
      type: object
