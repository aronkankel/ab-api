            **English version:**
            Indicates whether the document introduction text from the target document type populates the document introduction text in the periodical document.
            Is only populated during processing and when the document introduction text in the periodical document is empty.
          nullable: true
          type: boolean
        InsertLineItemIntroductionTextOnProcess:
          description: |
            Gibt an, ob der Positionseinleitungstext aus der Zielbelegart in den Positionseinleitungstext im wiederkehrenden Beleg eingefügt wird.
            Wird nur beim Abruf eingefügt.

            **English version:**
            Indicates whether the line item introduction text from the target document type is inserted into the line item introduction text in the periodical document.
            Is only inserted during processing.
          nullable: true
          type: boolean
        InsertHintTextOnProcess:
          description: |
            Gibt an, ob der Hinweis aus der Zielbelegart den Hinweis im wiederkehrenden Beleg besetzt.
            Wird nur beim Abruf und wenn der Hinweis im wiederkehrenden Beleg leer ist, besetzt.

            **English version:**
            Indicates whether the hint from the target document type populates the hint in the periodical document.
            Is only populated during processing and when the hint in the periodical document is empty.
          nullable: true
          type: boolean
        ShouldTransferExternalDocumentNumberToTargetDocument:
          description: |
            Gibt an, ob die Fremdbelegnummer beim Abruf aus dieser Belegart
            in den Zielbeleg übernommen werden soll.

            **English version:**
            Indicates whether the external document number should be transferred
            to the target document when processing from this document type.
          nullable: true
          type: boolean
