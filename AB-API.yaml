          - Discount2DueDate:
              DayOfMonth: 28
              RelatedMonth: CurrentMonth
            InvoiceDayOfMonth: 7
            Discount1DueDate:
              DayOfMonth: 28
              RelatedMonth: CurrentMonth
        DueType: DueInDays
        Discount1: 60.26853437452096
        DueAsDate:
        - Discount2DueDate:
            DayOfMonth: 28
            RelatedMonth: CurrentMonth
          NetDueDate:
            DayOfMonth: 28
            RelatedMonth: CurrentMonth
          InvoiceDayOfMonth: 22
          Discount1DueDate:
            DayOfMonth: 28
            RelatedMonth: CurrentMonth
        - Discount2DueDate:
            DayOfMonth: 28
            RelatedMonth: CurrentMonth
          NetDueDate:
            DayOfMonth: 28
            RelatedMonth: CurrentMonth
          InvoiceDayOfMonth: 22
          Discount1DueDate:
            DayOfMonth: 28
            RelatedMonth: CurrentMonth
        Discount2: 14.656663992048948
        Id: 0
        DueInDays:
          Discount1Days: 595
          NetDays: 229
          Discount2Days: 563
        Key: Key
      properties:
        Id:
          description: |
            Id der Zahlungsbedingung (technischer Schlüssel)

            **English version:**
            Id of the terms of payment (technical key)
          nullable: true
          type: integer
        Key:
          description: |
            Ordnungsbegriff der Zahlungsbedingung, maximal 3-stellig

            **English version:**
            Reference term of the terms of payment, maximum 3 digits
          maxLength: 3
          nullable: true
          type: string
        Description:
          description: |
            Bezeichnung

            **English version:**
            Description
          nullable: true
          type: string
        DueType:
          description: |
            Fälligkeitstyp der Zahlungsbedingung (z.B. Fälligkeit nach Tagen
            oder nach Datum)

            **English version:**
            Due type of the terms of payment (e.g. due in days
            or due as date)
          enum:
          - DueInDays
          - DueAsDate
          - NetInDaysAndDiscountDate
          nullable: true
          type: string
        Discount1:
          description: |
            Skonto 1 (Prozentsatz)

            **English version:**
            Discount 1 (percentage)
          maximum: 99.99
          minimum: 0
          nullable: true
          type: number
        Discount2:
          description: |
            Skonto 2 (Prozentsatz)

            **English version:**
            Discount 2 (percentage)
          maximum: 99.99
          minimum: 0
          nullable: true
          type: number
        DueInDays:
          $ref: '#/components/schemas/PaymentDueInDays'
        DueAsDate:
          description: |
            Liste von Fälligkeiten nach Datum.
            Besonderheit beim PUT: Wenn DueAsDate nicht gefüllt ist, werden keine Veränderungen an den Fälligkeiten nach Datum vorgenommen. Wenn DueAsDate gefüllt ist, werden alle nicht enthaltenen Fälligkeiten aus der Zahlungsbedingung entfernt. Neue Fälligkeiten werden gemäß der Reihenfolge eingefügt, können also auch vor oder zwischen vorhandenen Fälligkeiten eingefügt werden.

            **English version:**
            List of due dates.
            Special feature for PUT: If DueAsDate is not filled, no changes are made to the due dates. If DueAsDate is filled, all due dates not included are removed from the terms of payment. New due dates are inserted according to the order, so they can also be inserted before or between existing due dates.
          items:
            $ref: '#/components/schemas/PaymentDate'
          nullable: true
          type: array
        NetInDaysAndDiscountDate:
          $ref: '#/components/schemas/PaymentNetInDaysAndDiscountDate'
