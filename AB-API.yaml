          description: |
            Neue Werte für benutzerdefinierte Felder des Zielbelegs

            **English version:**
            New values for user-defined fields of the target document
          items:
            $ref: '#/components/schemas/UserDefinedFieldValue'
          nullable: true
          type: array
        LineItems:
          description: |
            Daten der Zielbelegpositionen.
            Ist diese Property gefüllt, dann werden genau diese Zielpositionen aus den Ursprungspositionen abgerufen.
            Ist diese Property nicht gefüllt, dann werden die Positionen aus den Ursprungsbelegen gemäß Belegart-Abruf-Beziehung abgerufen.

            **English version:**
            Data of the target document line items.
            If this property is filled, exactly these target line items are processed from the source line items.
            If this property is not filled, the line items from the source documents are processed according to the document type processing relationship.
          items:
            $ref: '#/components/schemas/TargetLineItem'
          nullable: true
          type: array
        UseCustomersDeliveryAddress:
          description: |
            Flag, das angibt, ob beim Querabruf aus Verkaufsbeleg in Einkaufsbeleg die Lieferadresse
            des Kunden als Anlieferungsadresse übernommen werden soll.
            Wenn ein Sammelabruf aus Belegen mit unterschiedlichen Lieferadressen erfolgt und diese
            Property mit true übergeben wird, gibt es einen Fehler.

            **English version:**
            Flag indicating whether during cross-processing from sales document to purchase document the delivery address
            of the customer should be adopted as delivery address.
            If a batch processing from documents with different delivery addresses occurs and this
            property is passed with true, an error occurs.
          nullable: true
          type: boolean
