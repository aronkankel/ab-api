            \ gefüllt, verbleibt die Position im Ursprungsbeleg.\n\n**English version:**\n\
            Indicates whether the source line item should remain\nin the source document.\n\
            If the property \"RemainingQuantity\" or \"RemainingAmount\" is filled,\
            \ the line item remains in the source document.\n"
          type: boolean
        Quantity:
          description: |
            Abrufmenge (für Artikelpositionen)

            **English version:**
            Processing quantity (for product line items)
          nullable: true
          type: number
        RemainingQuantity:
