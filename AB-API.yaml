    get:
      operationId: getRefreshExchangeRatesQueueItem
      parameters:
      - description: |
          Id eines Elements einer Warteschlange

          **English version:**
          ID of a queue item
        in: path
        name: queueItemId
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/QueueItemStatus'
          description: |
            Die Anfrage war erfolgreich. Das zurückgegebene Objekt beschreibt den aktuellen Status
            der Aufgabe in der Warteschlange. Clients sollen dieselbe URL wiederholt abfragen (Polling).
            Solange das Feld `Status` den Wert `Pending` enthält, ist die Verarbeitung noch nicht
            abgeschlossen.
            Sobald das Feld `Status` den Wert `Finished` hat, ist die Verarbeitung beendet und
            die Währungskurse wurden aktualisiert.

            **English version:**
            The request was successful. The returned object describes the current status
            of the task in the queue. Clients should repeatedly query the same URL (polling).
            As long as the `Status` field contains the value `Pending`, processing is not yet
            complete.
            Once the `Status` field has the value `Finished`, processing is complete and
            the exchange rates have been updated.
