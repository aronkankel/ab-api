        Enthält die Daten einer Serien-/Chargennummer einer Belegposition.

        **English version:**
        Contains the data of a serial/lot number of a document line item.
      example:
        SerialOrLotId: 7
        Quantity: 3.0205796992916243
        UserDefinedFields:
        - DefinitionId: 1
          Type: Alphanumeric
          Number: 1
          AlphanumericValue: D
          DateValue: DateValue
          NumericValue: NumericValue
          Name: Verkaufsgebiet
        - DefinitionId: 1
          Type: Alphanumeric
          Number: 1
          AlphanumericValue: D
          DateValue: DateValue
          NumericValue: NumericValue
          Name: Verkaufsgebiet
        SerialOrLotNumber: SerialOrLotNumber
        DateOfManufacture: DateOfManufacture
        DateOfExpiry: DateOfExpiry
        Notes: Notes
      properties:
        SerialOrLotId:
          description: |
            Technischer Schlüssel

            **English version:**
            Technical key
          nullable: true
          readOnly: true
          type: integer
        SerialOrLotNumber:
          description: |
            Serien-/Chargennummer

            **English version:**
            Serial/lot number
          nullable: true
          type: string
        Quantity:
          description: |
            Menge (nur bei Chargennummern).

            **English version:**
            Quantity (only for lot numbers).
          nullable: true
          type: number
        DateOfManufacture:
          description: "Herstelldatum im Format YYYY-MM-DD. \nZum Löschen des Datums\
            \ muss ein Leerstring übermittelt werden.\n\n**English version:**\nDate\
            \ of manufacture in format YYYY-MM-DD.\nTo delete the date, an empty string\
            \ must be provided.\n"
          nullable: true
          type: string
        DateOfExpiry:
          description: "Ablaufdatum im Format YYYY-MM-DD. \nZum Löschen des Datums\
            \ muss ein Leerstring übermittelt werden.\n\n**English version:**\nExpiry\
            \ date in format YYYY-MM-DD.\nTo delete the date, an empty string must\
            \ be provided.\n"
          nullable: true
          type: string
        Notes:
          description: |
            Notiz

            **English version:**
            Note
          nullable: true
          type: string
        UserDefinedFields:
          description: |
            Benutzerdefinierte Felder

            **English version:**
            User-defined fields
          items:
            $ref: '#/components/schemas/UserDefinedFieldValue'
          nullable: true
          type: array
      title: SerialOrLotLineItem
      type: object
    Accounting:
      description: |
        Enthält die Buchungsangaben.

        **English version:**
        Contains accounting information.
      example:
        Account: 6.778324963048013
        CostCenter: CostCenter
        DiscountAccount: 6.878052220127876
        Tax: Tax
        CostUnit: CostUnit
      properties:
        Account:
          description: |
            Konto

            **English version:**
            Account
          nullable: true
          type: number
        DiscountAccount:
          description: |
            Skontokonto

            **English version:**
            Discount account
          nullable: true
          type: number
        CostCenter:
          description: |
            Kostenstelle

            **English version:**
            Cost center
          nullable: true
          type: string
        CostUnit:
          description: |
            Kostenträger

            **English version:**
            Cost unit
          nullable: true
          type: string
        Tax:
