            Id der Fremdanwendung (read-only)
            Zum Setzen der Id in der Fremdanwendung muss der Endpunkt /v1/manufacture-documents/<id>/set-lock-for-third-party-application verwendet werden und die Id im Body mitgegeben werden.

            **English version:**
            ID of the third-party application (read-only)
            To set the ID in the third-party application, the endpoint /v1/manufacture-documents/<id>/set-lock-for-third-party-application must be used and the ID must be provided in the body.
          nullable: true
          readOnly: true
          type: string
