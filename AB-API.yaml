    DocumentTypeBase:
      allOf:
      - $ref: '#/components/schemas/DocumentTypeCoreProperties'
      description: |
        Enthält alle gemeinsamen Properties einer Belegart.

        **English version:**
        Contains all common properties of a document type.
      properties:
        DocumentNumberPreset:
          description: |
            Gibt an, die Belegnummervergabe an.

            Mögliche Ausprägungen:
            - **None** -> Keine automatische Vergabe, Benutzer muss neue Belegnummer selbst erfassen.
            - **AutomaticForDocumentType** -> Automatische Vorbesetzung der Belegnummer durch die Belegart.
            - **AutomaticForDocumentTypeGroup** -> Automatische Vorbesetzung der Belegnummer durch die Belegartgruppe.

            **English version:**
            Specifies the document number assignment.

            Possible values:
            - **None** -> No automatic assignment, user must enter new document number manually.
            - **AutomaticForDocumentType** -> Automatic preset of the document number by the document type.
            - **AutomaticForDocumentTypeGroup** -> Automatic preset of the document number by the document type group.
          enum:
          - None
          - AutomaticForDocumentType
          - AutomaticForDocumentTypeGroup
          nullable: true
          type: string
        IsDocumentNumberEditable:
          description: |
            Gibt an, ob die vorbesetzte Belegnummer änderbar ist.

            **English version:**
            Specifies whether the preset document number can be changed.
          nullable: true
          type: boolean
        LastModified:
          description: |
            Datum der letzten Änderung.

            **English version:**
            Date of last modification.
          format: date-time
          nullable: true
          type: string
      title: DocumentTypeBase
      type: object
    DocumentTypeCoreProperties:
      description: |
        Enthält nur die Id, Ob, Gruppe und Bezeichnung einer Belegart.
        Für alle gemeinsamen Properties der Belegarten, siehe DocumentTypeBase.

        **English version:**
        Contains only the ID, key, group and name of a document type.
        For all common properties of document types, see DocumentTypeBase.
      properties:
        Id:
          description: |
            Id (technischer Schlüssel) der Belegart.

            **English version:**
            ID (technical key) of the document type.
          nullable: true
          type: integer
        DocumentType:
          description: |
            Ordnungsbegriff der Belegart.

            **English version:**
            Key of the document type (classification term).
          nullable: true
          type: string
        DocumentTypeGroup:
          description: |
            Belegartgruppe.

            **English version:**
            Document type group.
          nullable: true
          type: string
        Description:
          description: |
            Bezeichnung.

            **English version:**
            Name.
          nullable: true
          type: string
      title: DocumentTypeCoreProperties
      type: object
