            **English version:**
            Type of calculation field condition (factor or graduation)
          enum:
          - Factor
          - Graduation
          nullable: true
          type: string
        CalculationFieldConditionValues:
          description: |
            Staffelwerte der Rechenfeldkondition

            **English version:**
            Graduated values of the calculation field condition
          items:
            $ref: '#/components/schemas/CalculationFieldConditionValue'
          nullable: true
          type: array
        Text:
          description: |
            Positionstext

            **English version:**
            Line item text
          nullable: true
          type: string
        OrderReference:
          description: |
            Bestellnummer (Auftragsreferenz)
