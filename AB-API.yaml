        IngredientsForQuantity:
          description: |
            Menge in Preiseinheiten, für die der Aufbau der Materialliste gilt,
            z.B. Zutaten für 100 Liter.

            **English version:**
            Quantity in price units for which the material list structure applies,
            e.g. ingredients for 100 liters.
          nullable: true
          type: number
        LineItems:
          description: |
            Materialpositionen für das Fertigungsteil
            Besonderheit beim POST: Bei der Belegneuanlage wird die Liste aus der Stückliste des Artikels vorbesetzt. Wird LineItems nicht übermittelt, dann behält der Fertigungsbeleg die Materialliste aus der Vorbesetzung. Wird LineItems übermittelt, dann ersetzt diese übermittelte Materialliste die vorbesetzte Materialliste komplett.
            Besonderheit beim PUT: Bei der Belegänderung kann angegeben werden, dass die Materialliste nicht geändert werden soll, indem LineItems nicht übermittelt wird. Soll die Materialliste verändert werden, dann muss die komplette Materialliste in LineItems übermittelt werden. Eine Änderung der Materialliste ist nicht immer möglich, z.B. dann nicht, wenn aus dem Fertigungsauftrag bereits Folgebelege erstellt wurden (Materialentnahme, Fertigmeldung).

            **English version:**
            Material line items for the manufactured item
            Special note for POST: When creating a new document, the list is preset from the bill of material of the product. If LineItems is not transmitted, the manufacture document retains the material list from the preset. If LineItems is transmitted, this transmitted material list completely replaces the preset material list.
            Special note for PUT: When changing the document, it can be specified that the material list should not be changed by not transmitting LineItems. If the material list should be changed, the complete material list must be transmitted in LineItems. A change of the material list is not always possible, e.g. not if follow-up documents have already been created from the production order (material withdrawal, completion report).
          items:
            $ref: '#/components/schemas/ManufactureLineItem'
          nullable: true
          type: array
