            \ is a user-defined field of type date, in format YYYY-MM-DD.\nTo delete\
            \ the date, an empty string must be provided.\n"
          nullable: true
          type: string
          example: null
      required:
      - Type
      title: UserDefinedFieldValue
      type: object
