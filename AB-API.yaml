          description: |
            Id der Belegart (technischer Schlüssel)

            **English version:**
            ID of the document type (technical key)
          nullable: true
          type: integer
        DocumentType:
          description: |
            Belegart (Ordnungsbegriff)

            **English version:**
            Document type (classification term)
          nullable: true
          type: string
