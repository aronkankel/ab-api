  /v1/suppliers/{supplierId}/vatid-check:
    get:
      description: |
        Die Historie der USt-IdNr. Prüfungen des Lieferanten abrufen.
        Liefert eine Liste der bisherigen USt-IdNr. Prüfungen des Lieferanten.

        **English version:**
        Retrieve the history of VAT ID checks for the supplier.
        Returns a list of previous VAT ID checks for the supplier.
      operationId: getSupplierVatIdCheckHistory
      parameters:
      - description: |
          Id eines Lieferanten (technischer Schlüssel)

          **English version:**
          Id of a supplier (technical key)
        in: path
        name: supplierId
        required: true
        schema:
          type: integer
      - description: |
          Filter für die Ergebnismenge<br>
          Die Syntax für die Filter orientiert sich an der Filter-Syntax von OData.<br>
          Es kann auf die Property-Namen der Models gefiltert werden, siehe '#/components/schemas'.<br>
          Folgende Vergleichsoperatoren stehen zur Verfügung: eq (gleich), ne (ungleich), lt (kleiner als), gt (größer als), le (kleiner gleich), ge (größer gleich)<br>
          Beispiel: ...filter=StockNumber eq 5...<br>
          Mehrere Filter können durch "and" getrennt werden. <br>
          Beispiel: ...filter=StockNumber ge 5 and StockNumber le 10...<br>
          Es ist möglich, auf NULL oder NOT NULL zu prüfen. Dafür steht das Schlüsselwort "null" für die Operatoren "eq" und "ne" bereit.<br>
          Beispiel: ...filter=DefaultStockNumber eq null...<br>
          Beispiel: ...filter=DefaultStockNumber ne null...<br>
          Strings müssen in einfache Hochkommata eingeschlossen werden, wenn sie ein Minus, Schrägstrich, Komma Punkt oder Leerzeichen enthalten.<br>
          Wenn im Suchstring ein Hochkomma enthalten ist, muss dieses verdoppelt werden.<br>
          Beispiel: ...filter=Description eq 'Dampf- u. Trockenbügelautomat'...<br>
          Beispiel: ...filter=Description eq 'Merry''s Pub'...<br>
          Datumsangaben (Tagesdatum) müssen im internationalen Format YYYY-MM-DD angegeben werden.<br>
          Beispiel: ...filter=InspectionDate eq 2023-02-23...<br>
          Datum-/Zeitangaben müssen im Format ISO 8601 angegeben werden, d.h. sie müssen den Trenner "T" <br>
          zwischen Datum und Zeit und einen Offset (+00:00) oder ein "Z" (für UTC) an Ende haben. <br>
          Die Fraction ist optional.<br>
          Die Auftragsbearbeitung wertet nur den Datum-/Zeit-String aus, nicht den Offset oder die UTC-Angabe.<br>
          Beispiel: ...filter=LastModified ge 2023-02-23T09:01:56.335476+00:00...<br>
          Beispiel: ...filter=LastModified ge 2023-02-23T09:01:56.335476Z...<br>
          Beispiel: ...filter=LastModified ge 2023-02-23T09:01:56+00:00...<br>
          Wird ein ungültiger Filter-String übermittelt, wird der Request mit StatusCode 400 abgewiesen.<br>

          **English version:**
          Filter for the result set<br>
          The syntax for filters is based on the OData filter syntax.<br>
          Filtering can be done on the property names of the models, see '#/components/schemas'.<br>
          The following comparison operators are available: eq (equals), ne (not equals), lt (less than), gt (greater than), le (less than or equal), ge (greater than or equal)<br>
          Example: ...filter=StockNumber eq 5...<br>
          Multiple filters can be separated by "and". <br>
          Example: ...filter=StockNumber ge 5 and StockNumber le 10...<br>
          It is possible to check for NULL or NOT NULL. The keyword "null" is available for the operators "eq" and "ne".<br>
          Example: ...filter=DefaultStockNumber eq null...<br>
          Example: ...filter=DefaultStockNumber ne null...<br>
          Strings must be enclosed in single quotes if they contain a minus, slash, comma, period or space.<br>
          If the search string contains a quote, it must be doubled.<br>
          Example: ...filter=Description eq 'Dampf- u. Trockenbügelautomat'...<br>
          Example: ...filter=Description eq 'Merry''s Pub'...<br>
          Date specifications (calendar date) must be specified in international format YYYY-MM-DD.<br>
          Example: ...filter=InspectionDate eq 2023-02-23...<br>
          Date/time specifications must be specified in ISO 8601 format, i.e. they must have the separator "T" <br>
          between date and time and an offset (+00:00) or a "Z" (for UTC) at the end. <br>
          The fraction is optional.<br>
          Order processing only evaluates the date/time string, not the offset or UTC specification.<br>
          Example: ...filter=LastModified ge 2023-02-23T09:01:56.335476+00:00...<br>
          Example: ...filter=LastModified ge 2023-02-23T09:01:56.335476Z...<br>
          Example: ...filter=LastModified ge 2023-02-23T09:01:56+00:00...<br>
          If an invalid filter string is transmitted, the request will be rejected with StatusCode 400.<br>
        examples:
          filterSimple:
            summary: |
              Einfacher Filter im Format <PropertyName> <Vergleichsoperator> <Wert>

              **English version:**
              Simple filter in format <PropertyName> <ComparisonOperator> <Value>
            value: StockNumber eq 5
          filterWithAnd:
            summary: |
              Filter mit 2 Bedingungen, die durch "and" verknüpft sind.

              **English version:**
              Filter with 2 conditions connected by "and".
            value: StockNumber ge 5 and StockNumber le 10
          filterNull:
            summary: |
              Filter zur Prüfung auf NULL.

              **English version:**
              Filter for checking NULL.
            value: DefaultStockNumber eq null
          filterNotNull:
            summary: |
              Filter zur Prüfung auf NOT NULL.

              **English version:**
              Filter for checking NOT NULL.
            value: DefaultStockNumber ne null
          filterString:
            summary: |
              Filter für einen String, bei dem der Wert in Hochkommata eingeschlossen ist.

              **English version:**
              Filter for a string where the value is enclosed in quotes.
            value: Description eq 'Dampf- u. Trockenbügelautomat'
          filterStringWithQuote:
            summary: |
              Filter für einen String, bei dem der Wert ein Hochkomma enthält.

              **English version:**
              Filter for a string where the value contains a quote.
            value: Description eq 'Merry''s Pub'
          filterDate:
            summary: |
              Filter auf ein Tagesdatum.

              **English version:**
              Filter on a calendar date.
            value: InspectionDate eq 2023-02-23
          filterDateTimeWithOffset:
            summary: |
              Filter auf einen Datum-/Zeitwert mit Offset.

              **English version:**
              Filter on a date/time value with offset.
            value: LastModified ge 2023-02-23T09:01:56.335476+00:00
          filterDateTimeWithTimezone:
            summary: |
              Filter auf einen Datum-/Zeitwert mit Zeitzone.

              **English version:**
              Filter on a date/time value with timezone.
            value: LastModified ge 2023-02-23T09:01:56.335476Z
          filterDateTimeWithoutFraction:
            summary: |
              Filter auf einen Datum-/Zeitwert ohne Fraction.

              **English version:**
              Filter on a date/time value without fraction.
            value: LastModified ge 2023-02-23T09:01:56+00:00
        in: query
        name: filter
        required: false
        schema:
          nullable: true
          type: string
