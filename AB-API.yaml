        ElectronicInvoiceFormat:
          description: |
            Format der E-Rechnung (für Eigenrechnung)
            None -> Kein Format
            Zugferd10 -> ZUGFeRD 1.0
            Zugferd21 -> Alle ZUGFeRD 2.x-Versionen (EN16931 (COMFORT)) (aus Rückwärtskompatibilität bleibt die enum-Ausprägung auf Zugferd21)
            Zugferd2Extended -> ZUGFeRD 2.x EXTENDED
            XRechnung -> XRechnung (CII-Syntax)
            XRechnungUbl -> XRechnung (UBL-Syntax)
            EbInterface -> ebInterface (für E-Rechnung Bund Österreich)

            **English version:**
            Format of the e-invoice (for internal invoice)
            None -> No format
            Zugferd10 -> ZUGFeRD 1.0
            Zugferd21 -> All ZUGFeRD 2.x versions (EN16931 (COMFORT)) (for backward compatibility, the enum value remains Zugferd21)
            Zugferd2Extended -> ZUGFeRD 2.x EXTENDED
            XRechnung -> XRechnung (CII syntax)
            XRechnungUbl -> XRechnung (UBL syntax)
            EbInterface -> ebInterface (for e-invoice Federal Austria)
          enum:
          - None
          - Zugferd10
          - Zugferd21
          - Zugferd2Extended
          - XRechnung
          - XRechnungUbl
          - EbInferface
          nullable: true
          type: string
        BuyerReference:
          description: |
            Käuferreferenz für ZUGFeRD 2.x und XRechnung (z.B. Leitweg-ID) für Eigenrechnung

            **English version:**
            Buyer reference for ZUGFeRD 2.x and XRechnung (e.g. Leitweg-ID) for internal invoice
          nullable: true
          type: string
        ElectronicAddressType:
          description: |
            Wert, der als elektronische Adresse des Käufers für ZUGFeRD 2.x und XRechnung verwendet werden soll (für Eigenrechnung).

            **English version:**
            Value that should be used as electronic address of the buyer for ZUGFeRD 2.x and XRechnung (for internal invoice).
          enum:
          - None
          - Gln
          - VatId
          - EMail
          - BuyerReference
          example: VatId
          nullable: true
          type: string
      title: PurchaseDocument
      type: object
    DmsDocumentAssignmentData:
      description: |
        Enthält Informationen zum Zuordnen eines Lieferantenbelegs im DMS zu einem Beleg.

        **English version:**
        Contains information for assigning a supplier document in DMS to a document.
      example:
        DocumentKey: Beispieldaten_12345
        MovementAction: None
      properties:
        DocumentKey:
          description: |
            Schlüssel des Dokuments im DMS

            **English version:**
            Key of the document in DMS
          example: Beispieldaten_12345
          nullable: false
          type: string
        MovementAction:
          description: |
            Legt fest, ob das Dokument im Rahmen der Zuordnung innerhalb des DMS verschoben werden soll.
            Wird die Property nicht gefüllt oder null übermittelt, wird keine Aktion durchgeführt.
            - `None`: Keine Aktion. Das Dokument verbleibt im aktuellen DMS-Ordner.
            - `MoveToHomeFolder`: Dokument wird in den Stammordner des Lieferanten verschoben und
                                  dort gemäß der Ablage-Definition für die Belegart platziert.

            **English version:**
            Specifies whether the document should be moved within DMS as part of the assignment.
            If the property is not filled or null is provided, no action is performed.
            - `None`: No action. The document remains in the current DMS folder.
            - `MoveToHomeFolder`: Document is moved to the supplier's root folder and
                                  placed there according to the filing definition for the document type.
          enum:
          - None
          - MoveToHomeFolder
          nullable: true
          type: string
          example: null
      required:
      - DocumentKey
      title: DmsDocumentAssignmentData
      type: object
    ManufactureDocumentType:
      allOf:
      - $ref: '#/components/schemas/DocumentTypeBase'
      - $ref: '#/components/schemas/ManufactureDocumentTypeExtendedProperties'
      description: |
        Alle Properties einer Belegart Fertigung.

        **English version:**
        All properties of a manufacture document type.
      example:
        Id: 24
        DocumentType: FA
        DocumentTypeGroup: FA
        Description: Fertigungsauftrag
        DocumentNumberPreset: AutomaticForDocumentTypeGroup
        IsDocumentNumberEditable: false
        LastModified: 2017-07-31T00:00:00.000+01:00
        InventoryManagementMaterial: ChangeOfReservedQuantity
        BehavesLikeAPurchase: false
        PrintDescription: Fertigungsauftrag
        OriginOfPrintAddress1: DocumentAddress
        OriginOfPrintAddress2: Empty
        DefaultDocumentPublishingTarget: Print
        HintText: Beispiel
        AdditionalText: Beispiel
        ManufactureLevel: 1
        DaysToSubtractFromDeliveryDate: 10
        DaysToAddToCurrentDate: 7
        InsertDocumentAttachmentsOfMaterialsIntoDocument: false
        BaseMaterialStockId: 5
        BaseMaterialStockNumber: 10
        ManufacturedItemStockId: 6
        ManufacturedItemStockNumber: 11
      title: ManufactureDocumentType
      type: object
    ManufactureDocumentTypeExtendedProperties:
      description: |
        Zusätzliche Properties einer Belegart Fertigung.

        **English version:**
        Additional properties of a manufacture document type.
      properties:
        InventoryManagementMaterial:
          description: |
            Gibt die Bestandsführung für das Material an.

            Mögliche Ausprägungen:
            - **ChangeOfReservedQuantity** -> Menge erhöht oder vermindert den reservierten Bestand.
            - **ChangeOfInventoryQuantity** -> Menge erhöht oder vermindert den Lagerbestand.

            **English version:**
            Specifies the inventory management for the material.

            Possible values:
            - **ChangeOfReservedQuantity** -> Quantity increases or decreases the reserved inventory.
            - **ChangeOfInventoryQuantity** -> Quantity increases or decreases the inventory level.
          enum:
          - ChangeOfReservedQuantity
          - ChangeOfInventoryQuantity
          nullable: true
          type: string
        BehavesLikeAPurchase:
          description: |
            Gibt an, wenn Belege der Belegart den letzen Einstandspreis besetzen und so
            den Durschnittspeis beeinflussen.

            **English version:**
            Specifies when documents of the document type set the last purchase price and thus
            influence the average cost.
          nullable: true
          type: boolean
        PrintDescription:
          description: |
            Bezeichnung der Belegart für den Druck.

            **English version:**
            Name of the document type for printing.
          nullable: true
          type: string
        OriginOfPrintAddress1:
          description: |
            Angabe zur Herkunft der Druckadresse 1.

            Mögliche Ausprägungen:
            - **Empty** -> Leer.
            - **DeliveryAddress** -> Lieferadresse.
            - **DocumentAddress** -> Belegadresse.

            **English version:**
            Specification of the origin of print address 1.

            Possible values:
            - **Empty** -> Empty.
            - **DeliveryAddress** -> Delivery address.
            - **DocumentAddress** -> Document address.
          enum:
          - Empty
          - DeliveryAddress
          - DocumentAddress
          nullable: true
          type: string
        OriginOfPrintAddress2:
          description: |
            Angabe zur Herkunft der Druckadresse 2.

            Mögliche Ausprägungen:
            - **Empty** -> Leer.
            - **DeliveryAddress** -> Lieferadresse.
            - **DocumentAddress** -> Belegadresse.

            **English version:**
            Specification of the origin of print address 2.

            Possible values:
            - **Empty** -> Empty.
            - **DeliveryAddress** -> Delivery address.
            - **DocumentAddress** -> Document address.
            enum:
            - Empty
            - DeliveryAddress
            - DocumentAddress
          nullable: true
          type: string
        DefaultDocumentPublishingTarget:
          description: |
            Vorbesetzung für die Belegausgabe über Datei/Drucken.

            Mögliche Ausprägungen:
            - **EMail** -> Ausgabe per E-Mail.
            - **Print** -> Ausgabe per Druck.

            **English version:**
            Preset for document output via file/print.

            Possible values:
            - **EMail** -> Output via e-mail.
            - **Print** -> Output via print.
          enum:
          - EMail
          - Print
          nullable: true
          type: string
        HintText:
          description: |
            Hinweistext, der in Belegen dieser Belegart vorbesetzt wird.

            **English version:**
            Hint text that is preset in documents of this document type.
          nullable: true
          type: string
        AdditionalText:
          description: |
            Zusätzlicher Text, der in Belegen dieser Belegart vorbesetzt wird.

            **English version:**
            Additional text that is preset in documents of this document type.
          nullable: true
          type: string
        ManufactureLevel:
          description: |
            Vorbesetzung für die Fertigungsebene für einen Fertigungsbeleg.
            Nur in Fertigungsaufträgen verfügbar.

            **English version:**
            Preset for the production level for a manufacture document.
            Only available in production orders.
          nullable: true
          type: integer
        DaysToSubtractFromDeliveryDate:
          description: |
            Anzahl der Tage, die bei einem auftragsbezogenen Fertigungsauftrag vom
            Lieferdatum abgezogen werden soll, um das Fertigungsende-Soll-Datum vorzubesetzen.
            Nur für Fertigungsauftrag aus einem vorhandenen Beleg.

            **English version:**
            Number of days to be subtracted from the delivery date for an order-related production order
            to preset the target production end date.
            Only for production order from an existing document.
          nullable: true
          type: integer
        DaysToAddToCurrentDate:
          description: |
            Anzahl der Tage, die bei einem bestandsbezogenen Fertigungsauftrag zum
            aktuellen Datum addiert werden soll, um das Fertigungsende-Soll-Datum vorzubesetzen.
            Nur für manuellen Fertigungsauftrag für einen Artikel.

            **English version:**
            Number of days to be added to the current date for an inventory-related production order
            to preset the target production end date.
            Only for manual production order for a product.
          nullable: true
          type: integer
        InsertDocumentAttachmentsOfMaterialsIntoDocument:
          description: |
            Gibt an, wenn Dokumentanhänge des Materials in den Beleg eingefügt werden sollen.
            Nur in Fertigungsaufträgen verfügbar.

            **English version:**
            Specifies when document attachments of the material should be inserted into the document.
            Only available in production orders.
          type: boolean
        BaseMaterialStockId:
          description: |
            Id des Lagers für das Material (technischer Schlüssel), das im Beleg vorbesetzt wird.
            Nur in Fertigungsaufträgen verfügbar.

            **English version:**
            ID of the stock for the material (technical key) that is preset in the document.
            Only available in production orders.
          nullable: true
          type: integer
        BaseMaterialStockNumber:
          description: |
            Nummer des Lagers für das Material (Ordnungsbegriff), das im Beleg vorbesetzt wird.
            Nur in Fertigungsaufträgen verfügbar.

            **English version:**
            Number of the stock for the material (classification term) that is preset in the document.
            Only available in production orders.
          nullable: true
          type: integer
        ManufacturedItemStockId:
          description: |
