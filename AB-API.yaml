      tags:
      - Einkaufsbelege
      - E-Rechnung
  /v1/purchase-documents/{purchaseDocumentId}/validate:
    post:
      description: |
        Erzeugt eine Aufgabe zur Validierung der Daten des Einkaufsbeleg bezogen auf Konformität zur
        E-Rechnung. Dabei werden Formatkonformität, Pflichtfelder und Geschäftsregeln geprüft.

        Voraussetzung ist, dass der Beleg als E-Rechnung gekennzeichnet ist.

        Das Ergebnis wird als HTML-Prüfbericht aufbereitet, der strukturiert alle Prüfhinweise,
        Warnungen und Fehler enthält.

        Die Aufgabe wird asynchron ausgeführt.
        Der Status der Aufgabe kann über den Endpunkt
        `/v1/e-invoicing/validate/queue/{queueItemId}` abgefragt werden.

        **Hinweis:** Für die Verwendung des Endpunktes ist eine Internetverbindung erforderlich.

        **English version:**
        Creates a task for validating the purchase document data regarding e-invoice conformity.
        Format conformity, mandatory fields and business rules are checked.

        Prerequisite is that the document is marked as e-invoice.

        The result is prepared as an HTML validation report that contains all validation hints,
        warnings and errors in a structured manner.

