            **English version:**
            Number of the customer/supplier
          nullable: true
          type: number
        PriceList:
          description: |
            Nummer der Preisliste

            **English version:**
            Number of the price list
          nullable: true
          type: integer
        CurrencyId:
          description: |
            Id der Währung (technischer Schlüssel)

            **English version:**
            ID of the currency (technical key)
          example: 4
          type: integer
        CurrencyKey:
          description: |
            Währung (Ordnungsbegriff)

            **English version:**
            Currency (classification term)
          example: EUR
          type: string
        QuantityFrom:
          description: |
            Menge ab der der Preis gültig ist (in Preiseinheiten)

            **English version:**
            Quantity from which the price is valid (in price units)
          nullable: true
          type: number
        UnitPrice:
          description: |
            Preis des Artikels (Verkaufspreis für Kunden oder Einstandspreis für Lieferanten)

            **English version:**
            Price of the product (sales price for customers or acquisition price for suppliers)
          nullable: true
          type: number
        PriceQuantity:
          description: |
            Preis per Angabe in EUR, d.h. auf diese Menge (in Preiseinheiten)
            beziehen sich alle Preisangaben.

            **English version:**
            Price per specification in EUR, i.e. all price specifications
            refer to this quantity (in price units).
          type: number
        RebatePercentage:
          description: |
            Positionsrabatt in Prozent

            **English version:**
            Line item discount in percent
          nullable: true
          type: number
        GrossOrNetIndicator:
          description: |
            Gibt an, ob der Preis brutto oder netto ist.

            **English version:**
            Indicates whether the price is gross or net.
          enum:
          - Gross
          - Net
          nullable: true
          type: string
        PriceOrigin:
          description: |
            Gibt an, woher der Preis stammt
            - None -> Keine Angabe
            - Product -> Preis aus Artikel
            - Relation -> Preis aus Kunde/Lieferant-Artikel-Beziehung

            **English version:**
            Indicates where the price originates from
            - None -> No specification
            - Product -> Price from product
            - Relation -> Price from customer/supplier-product relation
          enum:
          - None
          - Product
          - Relation
          nullable: true
          type: string
        RebateOrigin:
          description: |
            Gibt an, woher der Rabatt stammt
            - None -> Keine Angabe
            - Product -> Rabatt aus Artikel
            - Relation -> Rabatt aus Kunde/Lieferant-Artikel-Beziehung
            - ProducttypeRelation -> Rabatt aus Kunde-Artikelart-Beziehung
            - StandardRebate -> Standardrabatt aus Artikelart

            **English version:**
            Indicates where the discount originates from
            - None -> No specification
            - Product -> Discount from product
            - Relation -> Discount from customer/supplier-product relation
            - ProducttypeRelation -> Discount from customer-product type relation
            - StandardRebate -> Standard discount from product type
          enum:
          - None
          - Product
          - Relation
          - ProducttypeRelation
          - StandardRebate
          nullable: true
          type: string
      title: SpecificPrice
      type: object
    SpecificPriceRequestBody:
      description: |
        Enthält Angaben zur Ermittlung eines Artikelpreises

        **English version:**
        Contains information for determining a product price
      example:
        CustomerSupplierId: 0
        Quantity: 5.962133916683182
        ProductNumber: ProductNumber
        CustomerSupplierNumber: 6.027456183070403
        PriceList: 1
        CurrencyId: 4
        CurrencyKey: EUR
        EffectiveDate: 2000-01-23
      properties:
        ProductNumber:
          description: |
            Artikelnummer (Ordnungsbegriff)

            **English version:**
            Product number (classification term)
          nullable: true
          type: string
        CustomerSupplierId:
          description: |
            Id des Kunden/Lieferanten (technischer Schlüssel)

            **English version:**
            ID of the customer/supplier (technical key)
          nullable: true
          type: integer
        CustomerSupplierNumber:
          description: |
            Nummer des Kunden/Lieferanten

            **English version:**
            Number of the customer/supplier
          nullable: true
          type: number
        PriceList:
          description: |
            Nummer der Preisliste
            Wird keine Preisliste übergeben, so wird bei Angabe einer KundenId-/nummer der Preis für
            die in den Kundenstammdaten hinterlegte Preisliste ermittelt. Ansonsten wird der Preis der
            zum Gültigkeitsdatum geltenden Preisliste ermittelt.

            **English version:**
            Number of the price list
            If no price list is provided, the price for the price list stored in the customer master data
            is determined when a customer ID/number is specified. Otherwise, the price of the
            price list valid on the effective date is determined.
          nullable: true
          type: integer
        CurrencyId:
          description: |
            Id der Währung (technischer Schlüssel)
            Wird keine Währung übergeben, wird der Preis in Hauswährung ermittelt.

            **English version:**
            ID of the currency (technical key)
            If no currency is provided, the price is determined in home currency.
          example: 4
          type: integer
        CurrencyKey:
          description: |
            Währung (Ordnungsbegriff)
            Wird keine Währung übergeben, wird der Preis in Hauswährung ermittelt. Bei Angabe einer
            Währung muss zur Preisermittlung ein zum Gültigkeitsdatum geltender Kurs vorhanden sein.

            **English version:**
            Currency (classification term)
            If no currency is provided, the price is determined in home currency. If a currency is specified,
            an exchange rate valid on the effective date must be available for price determination.
          example: EUR
          type: string
        Quantity:
          description: |
            Menge (in Preiseinheiten)

            **English version:**
            Quantity (in price units)
          type: number
        EffectiveDate:
          description: |
            Gültigkeitsdatum des Preises. Wird kein Datum angegeben, gilt das Datum der Preisermittlung.

            **English version:**
            Effective date of the price. If no date is specified, the date of price determination applies.
          format: date
          nullable: true
          type: string
      title: SpecificPriceRequestBody
      type: object
    DmsMetadata:
      description: |
        Metadaten eines DMS-Dokuments

        **English version:**
        Metadata of a DMS document
      example:
        DocumentKey: Beispieldaten_12345
        DocumentClass: DK_Belegart_Angebote
        Filename: Angebot_4711.pdf
        CreatedBy: user01
        CreationDate: 2023-03-28T14:45:00Z
        ChangedBy: user02
        ChangingDate: 2023-03-29T10:15:00Z
        Version: 2
        Keywords:
        - Name: Belegart
          Value: AN
        - Name: Belegdatum
          Value: 2021-02-02
        - Name: Betrag
          Value: "12345.67"
      properties:
        DocumentKey:
          description: |
            Schlüssel des Dokuments im DMS

            **English version:**
            Key of the document in DMS
          nullable: true
          readOnly: true
          type: string
        DocumentClass:
          description: |
            Dokumentenklasse

            **English version:**
            Document class
          nullable: true
          readOnly: true
          type: string
        Filename:
          description: |
            Dateiname inkl. Dateiendung

            **English version:**
            Filename including file extension
          nullable: true
          type: string
        CreatedBy:
          description: |
            Ordnungsbegriff des Benutzers, der die Dokumentversion erstellt hat

            **English version:**
            Key of the user who created the document version (classification term)
          nullable: true
          readOnly: true
          type: string
        CreationDate:
          description: |
            Erstellungsdatum der Dokumentversion

            **English version:**
            Creation date of the document version
          format: date-time
          nullable: true
          readOnly: true
          type: string
        ChangedBy:
          description: |
            Ordnungsbegriff des Benutzer, der die Dokumentversion zuletzt geändert hat

            **English version:**
            Key of the user who last changed the document version (classification term)
          nullable: true
          readOnly: true
          type: string
        ChangingDate:
          description: |
            Datum der letzten Änderung der Dokumentversion

            **English version:**
            Date of the last change of the document version
          format: date-time
          nullable: true
          readOnly: true
          type: string
        Version:
          description: |
            Versionsnummer des Dokuments im DMS (Dokumentversion)

            **English version:**
            Version number of the document in DMS (document version)
          format: int32
          nullable: true
          readOnly: true
          type: integer
        Keywords:
          description: |
            Liste der Schlagworte (Name + Wert) des DMS-Dokuments.
            Besonderheit beim PUT: Es werden nur die übergebenen Schlagworte geändert. Schlagworte,
            die nicht übergeben werden, bleiben unverändert. Um den Wert eines Schlagworts zu löschen,
            muss dieses mit einem Leerstring übergeben werden. Wird "null" übergeben, wird das
            Schlagwort nicht geändert.

            **English version:**\n            List of keywords (name + value) of the DMS document.
            Special note for PUT: Only the provided keywords are changed. Keywords
            that are not provided remain unchanged. To delete the value of a keyword,
            it must be provided with an empty string. If "null" is provided, the
            keyword is not changed.
          items:
            $ref: '#/components/schemas/DmsKeyword'
          nullable: true
          type: array
      title: DmsMetadata
      type: object
    DmsKeyword:
      description: |
        Schlagwort (Name + Wert) für das DMS

        **English version:**
        Keyword (name + value) for DMS
      properties:
        Name:
          description: |
            Name des Schlagworts

            **English version:**
            Name of the keyword
          example: Belegdatum
          nullable: false
          type: string
        Value:
          description: |
            Wert des Schlagworts
            Zahlen- und Datumswerte werden international formatiert, z.B. 12345.67 und 2021-02-02

            **English version:**
            Value of the keyword
            Number and date values are formatted internationally, e.g. 12345.67 and 2021-02-02
          example: 2021-02-02
          nullable: false
          type: string
      title: DmsKeyword
      type: object
