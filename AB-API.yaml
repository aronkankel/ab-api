  /v1/products/price-change/queue/{queueItemId}:
    get:
      description: "Abfragen des Status eines Elements in der Preisberechnungs-Warteschlange.\n\
        Solange die Preisberechnung noch nicht beendet wurde, liefert die Anfrage\
        \ den StatusCode \n200 und im Body \"Pending\".\nWurde die Preisberechnung\
        \ erfolgreich beendet, liefert die Anfrage einmalig den StatusCode \n200 und\
        \ im Body \"Finished\".\nWurde die Preisberechnung mit Fehlern beendet, liefert\
        \ die Anfrage einmalig den StatusCode \n200 und im Body \"Error\" und \"ErrorDetails\"\
        .\nWurde der Status mit \"Finished\" oder \"Error\" abgefragt, wird er aus\
        \ der Queue gelöscht und \nbeim erneuten Aufruf liefert die Anfrage StatusCode\
        \ 404.\n\n**English version:**\nQuery the status of an item in the price calculation\
        \ queue.\nAs long as the price calculation has not yet finished, the request\
        \ returns the StatusCode\n200 and in the body \"Pending\".\nIf the price calculation\
        \ has finished successfully, the request returns the StatusCode\n200 once\
        \ and in the body \"Finished\".\nIf the price calculation has finished with\
