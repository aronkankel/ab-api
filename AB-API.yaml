        Alle Properties einer Belegart Lagerbuchung, die keine Umbuchung (InventoryRelocationType) ist.

        **English version:**
        All properties of an inventory transaction document type that is not a relocation (InventoryRelocationType).
      example:
        Id: 17
        DocumentType: A2
        DocumentTypeGroup: LA
        Description: Wert- und Bestandsabgang
        DocumentNumberPreset: AutomaticForDocumentTypeGroup
        IsDocumentNumberEditable: true
        LastModified: 2017-07-31T00:00:00.000+01:00
        MovementType: StockAndValue
        CanEditExistingDocument: true
        UseCostCenter: true
        UseCostUnit: false
        BehavesLikeAPurchase: true
        IsForStocktackingDiscrepancies: false
        StockId: 2
        StockNumber: 1
        MovementDirection: Outbound
        ValuationType: PurchasePrice
        IsValuationEditable: true
        PresetCostCenter: DocumentType
        CostCenterId: 3
        CostCenter: 2000
        PresetCostUnit: DocumentHeader
        CostUnitId: null
        CostUnit: null
      title: InventoryTransactionType
      type: object
    InventoryTransactionTypeBase:
      description: |
        Basis-Model für Belegart Lagerbuchungen.

        **English version:**
        Base model for inventory transaction document types.
      properties:
        MovementType:
          description: |
            Gibt die Bewegungsart der Belegart an.

            Mögliche Ausprägungen:
            - **StockAndValue** -> Änderung Bestand und Wert.
            - **Stock** -> Änderung Bestand.
            - **Value** -> Änderung Wert.
            - **StockTransfer** -> Umbuchung von einem Lager auf ein anderes (Lagerumbuchung).

            **English version:**
            Specifies the movement type of the document type.

            Possible values:
            - **StockAndValue** -> Change stock and value.
            - **Stock** -> Change stock.
            - **Value** -> Change value.
            - **StockTransfer** -> Transfer from one stock to another (inventory relocation).
          enum:
          - StockAndValue
          - Stock
          - Value
          - StockTransfer
          type: string
        CanEditExistingDocument:
          description: |
            Gibt an, ob es möglich ist, einen vorhandenen Beleg zu ändern.

            **English version:**
            Specifies whether it is possible to change an existing document.
          nullable: true
          type: boolean
        UseCostCenter:
          description: |
            Gibt an, ob in Belegen dieser Belegart Kostenstellen verwendet werden.

            **English version:**
            Specifies whether cost centers are used in documents of this document type.
          nullable: true
          type: boolean
        UseCostUnit:
          description: |
            Gibt an, ob in Belegen dieser Belegart Kostenträger verwendet werden.

            **English version:**
            Specifies whether cost units are used in documents of this document type.
          nullable: true
          type: boolean
      title: InventoryTransactionTypeBase
      type: object
    InventoryTransactionTypeExtendedProperties:
      description: |
        Zusätzliche Properties einer Belegart der Lagerbuchung.

        **English version:**
        Additional properties of an inventory transaction document type.
      properties:
        BehavesLikeAPurchase:
          description: |
            Gibt an, wenn Belege der Belegart den letzen Einstandspreis besetzen und somit
            den Durschnittspeis beeinflussen.

            **English version:**
            Specifies when documents of the document type set the last purchase price and thus
            influence the average cost.
          nullable: true
          type: boolean
        IsForStocktackingDiscrepancies:
          description: |
            Gibt an, ob die Belegart für das Buchen von Inventurdifferenzen benutzt werden.

            **English version:**
            Specifies whether the document type is used for posting stocktaking discrepancies.
          nullable: true
          type: boolean
        StockId:
          description: |
            Id des Lagers (technischer Schlüssel), das im Beleg vorbesetzt wird.

            **English version:**
            ID of the stock (technical key) that is preset in the document.
          nullable: true
          type: integer
        StockNumber:
          description: |
            Nummer des Lagers (Ordnungsbegriff), das im Beleg vorbesetzt wird.

            **English version:**
            Number of the stock (classification term) that is preset in the document.
          nullable: true
          type: integer
        MovementDirection:
          description: |
            Gibt an, ob es sich um einen Warenabgang oder -zugang handelt.

            Mögliche Ausprägungen:
            - **Inbound** -> Zugang.
            - **Outbound** -> Abgang.

            **English version:**
            Specifies whether it is a goods outbound or inbound.

            Possible values:
            - **Inbound** -> Inbound.
            - **Outbound** -> Outbound.
          enum:
          - Inbound
          - Outbound
          type: string
        ValuationType:
          description: |
            Gibt an, wie der Lagerwert ermittelt wird
            Nur verfügbar, wenn für Bewegungsart StockAndValue verwendet wird, sonst null.

            Mögliche Ausprägungen:
            - **WeightedAverageCost** -> Durchschnittlicher Einstandspreis (DEK).
            - **PurchasePrice** -> Definierter Einstandspreis.
            - **TransferPrice** -> Definierter Verrechnungspreis.
            - **LastPurchasePrice** -> Einstandspreis aus dem letzten Einkauf.

            **English version:**
            Specifies how the stock value is determined
            Only available if StockAndValue is used for movement type, otherwise null.

            Possible values:
            - **WeightedAverageCost** -> Weighted average cost.
            - **PurchasePrice** -> Defined purchase price.
            - **TransferPrice** -> Defined transfer price.
            - **LastPurchasePrice** -> Purchase price from the last purchase.
          enum:
          - WeightedAverageCost
          - PurchasePrice
          - TransferPrice
          - LastPurchasePrice
          nullable: true
          type: string
        IsValuationEditable:
          description: |
            Gibt an, ob die Bewertung änderbar ist.
            Die Angabe ist nur relevant, wenn für Bewegungsart StockAndValue verwendet wird.

            **English version:**
            Specifies whether the valuation can be changed.
            This specification is only relevant if StockAndValue is used for movement type.
          nullable: true
          type: boolean
        PresetCostCenter:
          description: |
            Angabe, woraus die Kostenstelle vorbesetzt wird.
            Die Angabe ist nur relevant, wenn UseCostCenter true ist.

            Mögliche Ausprägungen:
            - **DocumentHeader** -> Vorbesetzung aus Eingabe im Belegkopf.
            - **DocumentType** -> Vorbesetzung aus den Stammdaten der Belegart.
            - **Product** -> Vorbesetzung aus den Stammdaten des Artikels.

            **English version:**
            Specifies from where the cost center is preset.
            This specification is only relevant if UseCostCenter is true.

            Possible values:
            - **DocumentHeader** -> Preset from input in document header.
            - **DocumentType** -> Preset from master data of the document type.
            - **Product** -> Preset from master data of the product.
          enum:
          - DocumentHeader
          - DocumentType
          - Product
          nullable: true
          type: string
        CostCenterId:
          description: |
            Id der Kostenstelle (technischer Schlüssel), die vorbesetzt wird.
            Die Angabe ist nur relevant, wenn für PresetCostCenter DocumentType verwendet wird.

            **English version:**
            ID of the cost center (technical key) that is preset.
            This specification is only relevant if DocumentType is used for PresetCostCenter.
          nullable: true
          type: integer
        CostCenter:
          description: |
            Kostenstelle (Ordnungsbegriff), die vorbesetzt wird.
            Die Angabe ist nur relevant, wenn für PresetCostCenter DocumentType verwendet wird.

            **English version:**
            Cost center (classification term) that is preset.
            This specification is only relevant if DocumentType is used for PresetCostCenter.
          nullable: true
          type: string
        PresetCostUnit:
          description: |
            Angabe, woraus der Kostenträger vorbesetzt wird.
            Die Angabe ist nur relevant, wenn UseCostUnit true ist.

            Mögliche Ausprägungen:
            - **DocumentHeader** -> Vorbesetzung aus Eingabe im Belegkopf.
            - **DocumentType** -> Vorbesetzung aus den Stammdaten der Belegart.
            - **Product** -> Vorbesetzung aus den Stammdaten des Artikels.

            **English version:**
            Specifies from where the cost unit is preset.
            This specification is only relevant if UseCostUnit is true.

            Possible values:
            - **DocumentHeader** -> Preset from input in document header.
            - **DocumentType** -> Preset from master data of the document type.
            - **Product** -> Preset from master data of the product.
          enum:
          - DocumentHeader
          - DocumentType
          - Product
          nullable: true
          type: string
        CostUnitId:
          description: |
            Id des Kostenträger (technischer Schlüssel) der vorbesetzt wird.
            Die Angabe ist nur relevant, wenn für PresetCostUnit DocumentType verwendet wird.

            **English version:**
            ID of the cost unit (technical key) that is preset.
            This specification is only relevant if DocumentType is used for PresetCostUnit.
          nullable: true
          type: integer
        CostUnit:
          description: |
            Kostenträger (Ordnungsbegriff), der vorbesetzt wird.
            Die Angabe ist nur relevant, wenn für PresetCostUnit DocumentType verwendet wird.

            **English version:**
            Cost unit (classification term) that is preset.
            This specification is only relevant if DocumentType is used for PresetCostUnit.
          nullable: true
          type: string
      title: InventoryTransactionTypeExtendedProperties
      type: object
