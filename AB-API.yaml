        DoProcess:
          description: |
            Gibt an, ob die Ursprungsposition abgerufen werden soll.
            Ist die Property "Quantity" bzw. "Amount" gefüllt, wird die Position abgerufen.

            **English version:**
            Indicates whether the source line item should be processed.
            If the property "Quantity" or "Amount" is filled, the line item is processed.
          type: boolean
