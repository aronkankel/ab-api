        Check if the webservice and all subsystems are reachable.
        Returns status code 200 if the webservice is reachable.
        Status information about the subsystems is provided in the response.
      operationId: getSystemStatus
      responses:
        "200":
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/SystemStatus'
          description: |
            Erfolgreicher Abruf der Ressource.

            **English version:**
            Successful retrieval of the resource.
        "403":
          description: |
            Es fehlt die Berechtigung zum Zugriff auf die Ressource.

            **English version:**
            Permission to access the resource is missing.
      summary: |
        Prüfen, ob der Webservice und alle Subsysteme erreichbar sind.

        **English version:**
        Check if the webservice and all subsystems are reachable.
      tags:
      - AppInfo
  /definition:
