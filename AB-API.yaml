        OrderPlacement:
          description: |
            Gibt an, ob für den Lieferanten Belege erfasst werden dürfen.
            (Belegsperre)
            - Erlaubt
            - Erlaubt mit Warnung
            - Verboten

            **English version:**
            Specifies whether documents may be recorded for the supplier.
            (Document block)
            - Allowed
            - Allowed with warning
            - Forbidden
          enum:
          - Allowed
          - AllowedWithWarning
          - Forbidden
          example: Allowed
          nullable: true
          type: string
        Reliability:
          description: |
            Zuverlässigkeit

            **English version:**
            Reliability
          enum:
          - VeryBad
          - Bad
          - Average
          - Good
          - VeryGood
          example: Good
          nullable: true
          type: string
        Rebate:
          description: |
            Rechnungsrabatt

            **English version:**
            Invoice rebate
          example: 3
          nullable: true
          type: number
        PayeeId:
          description: |
            Id des Zahlungsempfängers (technischer Schlüssel)

            **English version:**
            Id of the payee (technical key)
          nullable: true
          type: integer
        PayeeNumber:
          description: |
            Nummer des Zahlungsempfängers

            **English version:**
            Number of the payee
          example: 70002
          multipleOf: 1
          nullable: true
          type: number
        PreferredEmailDispatch:
          description: |
            Belege bevorzugt per E-Mail senden

            **English version:**
            Preferably send documents by email
          enum:
          - All
          - AllExceptInvoices
          - None
          example: All
          nullable: true
          type: string
        ProcurementTime:
          description: |
            Beschaffungszeit in Tagen

            **English version:**
            Procurement time in days
          example: 3
          nullable: true
          type: integer
        UserDefinedFields:
          description: |
            Benutzerdefinierte Felder

            **English version:**
            User-defined fields
          items:
            $ref: '#/components/schemas/UserDefinedFieldValue'
          nullable: true
          type: array
        Addresses:
          description: |
            Beinhaltet eine Liste von Adressen.
            Der Lieferant kann eine Postadresse und eine Hausadresse besitzen.

            **English version:**
            Contains a list of addresses.
            The supplier can have a postal address and a house address.
          items:
            $ref: '#/components/schemas/Address'
          nullable: true
          type: array
        ContactPersons:
          description: |
            Daten der Ansprechpartner

            Hinweise zur Verwaltung der Ansprechpartner:

            - Um einen neuen Ansprechpartner anzulegen, muss die Id **nicht** angegeben werden.
              Zusätzlich müssen alle bestehenden Ansprechpartner ebenfalls mit **mindestens** der Id angegeben werden,
              damit diese nicht gelöscht werden.

            - Um einen bestehenden Ansprechpartner zu bearbeiten, muss die Id des Ansprechpartners,
              der bearbeitet werden soll, sowie die zu ändernden Properties angegeben werden.
              Zusätzlich müssen alle anderen bestehenden Ansprechpartner ebenfalls mit **mindestens** der Id angegeben werden,
              damit diese nicht gelöscht werden.

            - Um einen Ansprechpartner zu löschen, darf dieser **nicht** in der Liste der Ansprechpartner enthalten sein.
              Zusätzlich müssen alle verbleibenden Ansprechpartner ebenfalls mit **mindestens** der Id angegeben werden,
              damit diese nicht gelöscht werden.

            **English version:**
            Data of the contact persons

            Notes on managing contact persons:

            - To create a new contact person, the Id must **not** be specified.
              Additionally, all existing contact persons must also be specified with **at least** the Id,
              so that they are not deleted.

            - To edit an existing contact person, the Id of the contact person
              to be edited, as well as the properties to be changed must be specified.
              Additionally, all other existing contact persons must also be specified with **at least** the Id,
              so that they are not deleted.

            - To delete a contact person, it must **not** be included in the list of contact persons.
              Additionally, all remaining contact persons must also be specified with **at least** the Id,
              so that they are not deleted.
          items:
            $ref: '#/components/schemas/ContactPersonData'
          type: array
        BankAccounts:
          description: |
            Liste der Bankverbindungen des Lieferanten.

            Hinweise zur Änderung:
            - Die Bankverbindungen werden **nicht** über den Endpunkt `PUT /v1/suppliers/{supplierId}` verwaltet.
            - Zum Anlegen/Ändern/Löschen bitte die Bankaccount-Endpunkte verwenden:
              - `GET /v1/suppliers/{supplierId}/bank-accounts`
              - `POST /v1/suppliers/{supplierId}/bank-accounts`
              - `GET /v1/suppliers/{supplierId}/bank-accounts/{bankAccountId}`
              - `PUT /v1/suppliers/{supplierId}/bank-accounts/{bankAccountId}`
              - `DELETE /v1/suppliers/{supplierId}/bank-accounts/{bankAccountId}`

            **English version:**
            List of the supplier's bank accounts.

            Notes on updating:
            - Bank accounts are **not** managed via `PUT /v1/suppliers/{supplierId}`.
            - To create/update/delete bank accounts, use the bank account endpoints:
              - `GET /v1/suppliers/{supplierId}/bank-accounts`
              - `POST /v1/suppliers/{supplierId}/bank-accounts`
              - `GET /v1/suppliers/{supplierId}/bank-accounts/{bankAccountId}`
              - `PUT /v1/suppliers/{supplierId}/bank-accounts/{bankAccountId}`
              - `DELETE /v1/suppliers/{supplierId}/bank-accounts/{bankAccountId}`
          items:
            $ref: '#/components/schemas/BankAccountData'
          nullable: true
          type: array
        IsReverseCharge:
          description: |
            Lieferant kann Leistungen gemäß § 13b UStG erbringen (Steuerschuldnerschaft des Leistungsempfängers/Reverse Charge)

            **English version:**
            Supplier can provide services according to § 13b UStG (tax liability of the service recipient/reverse charge)
          example: false
          nullable: true
          type: boolean
        IsSelfBillingAllowed:
          description: |
            Gibt an, ob die Ausstellung einer Eigenrechnung (Gutschrift gemäß § 14 Abs. 2 UStG) im
            Namen des Lieferanten zulässig ist.

            **English version:**
            Specifies whether the issuance of a self-billing invoice (credit note according to § 14 para. 2 UStG) in
            the name of the supplier is permitted.
          example: false
          nullable: true
          type: boolean
        ElectronicInvoiceFormat:
          description: |
            Format der E-Rechnung (für Eigenrechnung)
            UsePresetFromSettings -> Einstellung aus Firma verwenden
            None -> Kein Format
            Zugferd10 -> ZUGFeRD 1.0
            Zugferd21 -> Alle ZUGFeRD 2.x-Versionen (EN16931 (COMFORT)) (aus Rückwärtskompatibilität bleibt die enum-Ausprägung auf Zugferd21)
            Zugferd2Extended -> ZUGFeRD 2.x EXTENDED
            XRechnung -> XRechnung (CII-Syntax)
            XRechnungUbl -> XRechnung (UBL-Syntax)
            EbInterface -> ebInterface (für E-Rechnung Bund Österreich)

            **English version:**
            Format of the electronic invoice (for self-billing)
            UsePresetFromSettings -> Use setting from company
            None -> No format
            Zugferd10 -> ZUGFeRD 1.0
            Zugferd21 -> All ZUGFeRD 2.x versions (EN16931 (COMFORT)) (for backward compatibility the enum value remains Zugferd21)
            Zugferd2Extended -> ZUGFeRD 2.x EXTENDED
            XRechnung -> XRechnung (CII syntax)
            XRechnungUbl -> XRechnung (UBL syntax)
            EbInterface -> ebInterface (for e-invoice federal government Austria)
          enum:
          - UsePresetFromSettings
          - None
          - Zugferd10
          - Zugferd21
          - Zugferd2Extended
          - XRechnung
          - XRechnungUbl
          - EbInferface
          example: XRechnung
          nullable: true
          type: string
        BuyerReference:
          description: |
            Käuferreferenz für ZUGFeRD 2.x und XRechnung (z.B. Leitweg-ID) für Eigenrechnung

            **English version:**
            Buyer reference for ZUGFeRD 2.x and XRechnung (e.g. routing ID) for self-billing
          example: X12345
          nullable: true
          type: string
        ElectronicAddressType:
          description: |
            Wert, der bei einer Eigenrechnung als elektronische Adresse des Käufers für ZUGFeRD 2.x
            und XRechnung verwendet werden soll.

            **English version:**
            Value to be used as the electronic address of the buyer for ZUGFeRD 2.x
            and XRechnung in a self-billing invoice.
          enum:
          - None
          - Gln
          - VatId
          - EMail
          - BuyerReference
          example: VatId
          nullable: true
          type: string
      title: Supplier
      type: object
    SalesDocumentType:
      allOf:
      - $ref: '#/components/schemas/DocumentTypeBase'
      - $ref: '#/components/schemas/SalesDocumentTypeBase'
      - $ref: '#/components/schemas/SalesDocumentTypeExtendedProperties'
      description: |
        Alle Properties einer Belegart Verkauf.

        **English version:**
        All properties of a sales document type.
      example:
        Id: 6
        DocumentType: GW
        DocumentTypeGroup: V4
        Description: Wertgutschrift
        DocumentNumberPreset: AutomaticForDocumentTypeGroup
        IsDocumentNumberEditable: false
        LastModified: 2017-07-31T00:00:00.000+01:00
        ShouldPresetOrderDateWithDocumentDate: true
        MissingOrderNumberAction: AsDefinedInSettings
        OrderNumberPreset: AsDefinedInSettings
        DuplicateOrderNumberAction: AsDefinedInSettings
        PrintDescription: WERTGUTSCHRIFT
        OriginOfPrintAddress1: BillingAddress
        OriginOfPrintAddress2: DeliveryAddress
        DefaultDocumentPublishingTarget: Print
        AutoPublishOnEditAndProcess: None
        AutoPublishOnImport: None
        UseCommission: true
        MissingSalesAgentAction: None
        TaxText: Beispiel
        BillOfMaterialUsage: AsIs
        PrintSettingsForBomParts: None
        PrintSettingsForPricesOfBomParts: None
        ShouldAttachmentsOfItemsBeInsertedWithBom: false
        InventoryManagement: ChangeOfInventoryValue
        IsPartialInvoice: false
        IsStockRequired: true
        IsCreditNote: true
        CanEditExistingDocument: true
        IsCashInvoice: false
        IsIntraCommunitySale: true
        MissingTermsOfPaymentAction: AsDefinedInSettings
        MissingDeliveryConditionAction: AsDefinedInSettings
        MissingSepaMandateAction: AsDefinedInSettings
        ExceedingCreditLimitAction: BlockCustomer
        UseMinimumOrderValue: false
        MinimumOrderValue: null
        MinimumOrderValueUnreachedAction: DisplayWarning
        MissingDeliveryDateOnProcessAction: SetOnProcess
        IsProcessPermittedForLockedCustomer: true
        IsProcessPermittedForLockedProduct: true
        ConsiderInOrderOrManufactureProposal: false
        HintText: Beispiel
        AdditionalText: Beispiel
        SalesDocumentTypesToProcess:
        - Id: 8
          DocumentType: RE
          DocumentTypeGroup: V4
          Description: Rechnung
        PurchaseDocumentTypesToProcess: null
      title: SalesDocumentType
      type: object
    SalesDocumentTypeBase:
      description: |
        Basis-Model für Belegart Verkauf.

        **English version:**
        Base model for sales document type.
      properties:
        ShouldPresetOrderDateWithDocumentDate:
          description: |
            Gibt an, ob das Auftragsdatum des Belegs mit dem Belegdatum vorbesetzt werden soll.

            **English version:**
            Specifies whether the order date of the document should be preset with the document date.
          nullable: true
          type: boolean
        MissingOrderNumberAction:
          description: |
            Maßnahme, wenn im Beleg keine Auftragsnummer angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when no order number is specified in the document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving the document.
            - **AsDefinedInSettings** -> As defined in company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        OrderNumberPreset:
          description: |
            Gibt an, wie die Auftragsnummer vergeben wird.

            Mögliche Ausprägungen:
            - **None** -> Keine automatische Vergabe, Benutzer muss neue Auftragsnummer selbst erfassen.
            - **ByDocumentType** -> Automatische Vorbesetzung der Auftragsnummer durch die Belegart.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Specifies how the order number is assigned.

            Possible values:
            - **None** -> No automatic assignment, user must enter new order number manually.
            - **ByDocumentType** -> Automatic presetting of order number by document type.
            - **AsDefinedInSettings** -> As defined in company settings.
          enum:
          - None
          - ByDocumentType
          - AsDefinedInSettings
          nullable: true
          type: string
        DuplicateOrderNumberAction:
          description: |
            Maßnahme, wenn die im Beleg vergebene Auftragsnummer bereits für einen anderen Beleg verwendet wird.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when the order number assigned in the document is already used for another document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving the document.
            - **AsDefinedInSettings** -> As defined in company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        PrintDescription:
          description: |
            Bezeichnung der Belegart für den Druck.

            **English version:**
            Description of the document type for printing.
          nullable: true
          type: string
        OriginOfPrintAddress1:
          description: |
            Angabe zur Herkunft der Druckadresse 1.

            Mögliche Ausprägungen:
            - **Empty** -> Leer.
            - **DeliveryAddress** -> Lieferungsadresse.
            - **BillingAddress** -> Rechungsadresse.
            - **DocumentAddress** -> Belegadresse.

            **English version:**
            Specification of the origin of print address 1.

            Possible values:
            - **Empty** -> Empty.
            - **DeliveryAddress** -> Delivery address.
            - **BillingAddress** -> Billing address.
            - **DocumentAddress** -> Document address.
          enum:
          - Empty
          - DeliveryAddress
          - BillingAddress
          - DocumentAddress
          nullable: true
          type: string
        OriginOfPrintAddress2:
          description: |
            Angabe zur Herkunft der Druckadresse 2.

            Mögliche Ausprägungen:
            - **Empty** -> Leer.
            - **DeliveryAddress** -> Lieferungsadresse.
            - **BillingAddress** -> Rechungsadresse.
            - **DocumentAddress** -> Belegadresse.

            **English version:**
            Specification of the origin of print address 2.

            Possible values:
            - **Empty** -> Empty.
            - **DeliveryAddress** -> Delivery address.
            - **BillingAddress** -> Billing address.
            - **DocumentAddress** -> Document address.
          enum:
          - Empty
          - DeliveryAddress
          - BillingAddress
          - DocumentAddress
          nullable: true
          type: string
        DefaultDocumentPublishingTarget:
          description: |
            Vorbesetzung für die Belegausgabe über Datei/Drucken.

            Mögliche Ausprägungen:
            - **EMailIfPreferred** -> Ausgabe per E-Mail, wenn vom Kunden bevorzugt, sonst Druck.
            - **Print** -> Ausgabe per Druck.

            **English version:**
            Default setting for document output via File/Print.

            Possible values:
            - **EMailIfPreferred** -> Output via email if preferred by customer, otherwise print.
            - **Print** -> Output via print.
          enum:
          - EMailIfPreferred
          - Print
          nullable: true
          type: string
        AutoPublishOnEditAndProcess:
          description: |
            Nach Belegbearbeitung und Abruf automatisch drucken/senden.

            Mögliche Ausprägungen:
            - **None** -> Keine automatische Belegausgabe.
            - **EMailIfPreferred** -> E-Mail, wenn vom Kunden bevorzugt, sonst Druck.
            - **PrintOnly** -> Ausgabe per Druck.
            - **EMailOnly** -> Ausgabe per E-Mail.
            - **PrintAndEMail** -> Ausgabe per Druck und E-Mail.

            **English version:**
            Automatically print/send after document editing and processing.

            Possible values:
            - **None** -> No automatic document output.
            - **EMailIfPreferred** -> Email if preferred by customer, otherwise print.
            - **PrintOnly** -> Output via print.
            - **EMailOnly** -> Output via email.
            - **PrintAndEMail** -> Output via print and email.
          enum:
          - None
          - EMailIfPreferred
          - PrintOnly
          - EMailOnly
          - PrintAndEMail
          nullable: true
          type: string
        AutoPublishOnImport:
          description: |
            Nach Datenimport automatisch drucken/senden.

            Mögliche Ausprägungen:
            - **None** -> Keine automatische Belegausgabe.
            - **EMailIfPreferred** -> E-Mail, wenn vom Kunden bevorzugt, sonst Druck.
            - **PrintOnly** -> Ausgabe per Druck.
            - **EMailOnly** -> Ausgabe per E-Mail.
            - **PrintAndEMail** -> Ausgabe per Druck und E-Mail.

            **English version:**
            Automatically print/send after data import.

            Possible values:
            - **None** -> No automatic document output.
            - **EMailIfPreferred** -> Email if preferred by customer, otherwise print.
            - **PrintOnly** -> Output via print.
            - **EMailOnly** -> Output via email.
            - **PrintAndEMail** -> Output via print and email.
          enum:
          - None
          - EMailIfPreferred
          - PrintOnly
          - EMailOnly
          - PrintAndEMail
          nullable: true
          type: string
        UseCommission:
          description: |
            Gibt an, wenn in Belegen der Belegart Provisionen möglich sind.

            **English version:**
            Specifies if commissions are possible in documents of this document type.
          nullable: true
          type: boolean
        MissingSalesAgentAction:
          description: |
            Maßnahme, wenn im Beleg kein Vertreter angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.

            **English version:**
            Action when no sales agent is specified in the document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving the document.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          nullable: true
          type: string
        TaxText:
          description: |
            Steuertext.

            **English version:**
            Tax text.
          nullable: true
          type: string
        BillOfMaterialUsage:
          description: |
            Angabe, ob und wie Stücklisten in Belegen dieser Belegart aufgelöst werden sollen.

            Mögliche Ausprägungen:
            - **AsIs** -> Nicht auflösen.
            - **ExplodeFirstLevelOnly** -> Statt des Artikels die Stücklistenpositionen einfügen, keine Baugruppen auflösen.
            - **ExplodeAllLevels** -> Statt des Artikels die Stücklistenpositionen einfügen und ggf. enthaltene Baugruppen auflösen.

            **English version:**
            Specification whether and how bills of material should be exploded in documents of this document type.

            Possible values:
            - **AsIs** -> Do not explode.
            - **ExplodeFirstLevelOnly** -> Insert bill of material positions instead of the item, do not explode assemblies.
            - **ExplodeAllLevels** -> Insert bill of material positions instead of the item and explode contained assemblies if applicable.
          enum:
          - AsIs
          - ExplodeFirstLevelOnly
          - ExplodeAllLevels
          nullable: true
          type: string
        PrintSettingsForBomParts:
          description: |
            Druckeinstellung für den Positionsdruck bei Bestandteilen einer Stückliste.

            Mögliche Ausprägungen:
            - **PrintAsDefinedInBom** -> Einstellung aus den Stammdaten der Stückliste verwenden.
            - **PrintNone** -> Bestandteile einer Stückliste nicht drucken.
            - **PrintAll** -> Alle Bestandteile einer Stückliste drucken.

            **English version:**
            Print setting for position printing of bill of material components.

            Possible values:
            - **PrintAsDefinedInBom** -> Use setting from bill of material master data.
            - **PrintNone** -> Do not print bill of material components.
            - **PrintAll** -> Print all bill of material components.
          enum:
          - PrintAsDefinedInBom
          - PrintNone
          - PrintAll
          nullable: true
          type: string
        PrintSettingsForPricesOfBomParts:
          description: |
            Druckeinstellung für den Druck von Positionspreisen bei Bestandteilen einer Stückliste.

            Mögliche Ausprägungen:
            - **PrintAsDefinedInBom** -> Einstellung aus den Stammdaten der Stückliste verwenden.
            - **PrintNone** -> Preise für Bestandteile einer Stückliste nicht drucken.
            - **PrintAll** -> Preise für alle Bestandteile einer Stückliste drucken.

            **English version:**
            Print setting for printing position prices of bill of material components.

            Possible values:
            - **PrintAsDefinedInBom** -> Use setting from bill of material master data.
            - **PrintNone** -> Do not print prices for bill of material components.
            - **PrintAll** -> Print prices for all bill of material components.
          enum:
          - PrintAsDefinedInBom
          - PrintNone
          - PrintAll
          nullable: true
          type: string
        ShouldAttachmentsOfItemsBeInsertedWithBom:
          description: |
            Gibt an, ob Dokumentanhänge der Bestandteile beim Einfügen des Artikels
            mit Stückliste in den Beleg eingefügt werden sollen.

            **English version:**
            Specifies whether document attachments of components should be inserted
            into the document when inserting an item with bill of material.
          nullable: true
          type: boolean
        SalesDocumentTypesToProcess:
          description: |
            Gibt an, von welchen Belegarten Verkauf der Abruf in diese Belegart möglich ist.

            **English version:**
            Specifies from which sales document types processing into this document type is possible.
          items:
            $ref: '#/components/schemas/DocumentTypeCoreProperties'
          nullable: true
          type: array
        PurchaseDocumentTypesToProcess:
          description: |
            Gibt an, von welchen Belegarten Einkauf der Abruf in diese Belegart möglich ist.

            **English version:**
            Specifies from which purchase document types processing into this document type is possible.
          items:
            $ref: '#/components/schemas/DocumentTypeCoreProperties'
          nullable: true
          type: array
      title: SalesDocumentTypeBase
      type: object
    SalesDocumentTypeExtendedProperties:
      description: |
        Zusätzliche Properties einer Belegart Verkauf.

        **English version:**
        Additional properties of a sales document type.
      properties:
        InventoryManagement:
          description: |
            Gibt die Bestandsführung der Belegart an.

            Mögliche Ausprägungen:
            - **None** -> Keine Bestandführung, Lagerbestand und -wert ändern sich nicht.
            - **ChangeOfReservedQuantity** -> Menge erhöht oder vermindert den reservierten Bestand.
            - **ChangeOfInventoryQuantity** -> Menge erhöht oder vermindert den Lagerbestand.
            - **ChangeOfInventoryValue** -> Erhöht oder vermindert den Lagerwert, Bestand wird nicht verändert.

            **English version:**
            Specifies the inventory management of the document type.

            Possible values:
            - **None** -> No inventory management, stock quantity and value do not change.
            - **ChangeOfReservedQuantity** -> Quantity increases or decreases reserved stock.
            - **ChangeOfInventoryQuantity** -> Quantity increases or decreases stock quantity.
            - **ChangeOfInventoryValue** -> Increases or decreases stock value, quantity is not changed.
          enum:
          - None
          - ChangeOfReservedQuantity
          - ChangeOfInventoryQuantity
          - ChangeOfInventoryValue
          nullable: true
          type: string
        IsPartialInvoice:
          description: |
            Gibt an, wenn die Belegart für Abschlagsrechnungen genutzt wird.

            **English version:**
            Specifies if the document type is used for partial invoices.
          nullable: true
          type: boolean
        IsStockRequired:
          description: |
            Gibt an, ob die Eingabe eines Lagers erforderlich ist.

            **English version:**
            Specifies whether the entry of a stock is required.
          nullable: true
          type: boolean
        IsCreditNote:
          description: |
            Gibt an, wenn Belege der Belegart Gutschriften oder Stornobelege sind.

            **English version:**
            Specifies if documents of this document type are credit notes or cancellation documents.
          nullable: true
          type: boolean
        CanEditExistingDocument:
          description: |
            Gibt an ob es möglich ist einen vorhandenen Beleg der Belegart zu ändern.

            **English version:**
            Specifies whether it is possible to change an existing document of this document type.
          nullable: true
          type: boolean
        IsCashInvoice:
          description: |
            Gibt an, ob ein Beleg der Belegart eine Barrechnung ist.

            **English version:**
            Specifies whether a document of this document type is a cash invoice.
          nullable: true
          type: boolean
        IsIntraCommunitySale:
          description: |
            Gibt an, ob mit Belegen der Belegart innergemeinschaftliche Fernverkäufe
            dargestellt werden.

            **English version:**
            Specifies whether documents of this document type represent intra-community distance sales.
          nullable: true
          type: boolean
        MissingTermsOfPaymentAction:
          description: |
            Maßnahme, wenn im Beleg keine Zahlungsbedingung angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when no terms of payment are specified in the document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving the document.
            - **AsDefinedInSettings** -> As defined in company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        MissingDeliveryConditionAction:
          description: |
            Maßnahme, wenn im Beleg keine Lieferbedingung angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when no delivery condition is specified in the document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving the document.
            - **AsDefinedInSettings** -> As defined in company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        MissingSepaMandateAction:
          description: |
            Maßnahme, wenn im Verkaufsbeleg kein SEPA-Mandat angegeben ist.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.

            **English version:**
            Action when no SEPA mandate is specified in the sales document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving the document.
            - **AsDefinedInSettings** -> As defined in company settings.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          nullable: true
          type: string
        ExceedingCreditLimitAction:
          description: |
            Maßnahme, wenn im Verkaufsbeleg das Kreditlimit überschritten wird.

            Mögliche Ausprägungen:
            - **None** -> Keine Maßnahme. Zulassen, ohne Warnung.
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.
            - **AsDefinedInSettings** -> Wie in den Firmeneinstellungen festgelegt.
            - **BlockCustomer** -> Kunde sperren.

            **English version:**
            Action when the credit limit is exceeded in the sales document.

            Possible values:
            - **None** -> No action. Allow without warning.
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving the document.
            - **AsDefinedInSettings** -> As defined in company settings.
            - **BlockCustomer** -> Block customer.
          enum:
          - None
          - DisplayWarning
          - PreventSaving
          - AsDefinedInSettings
          - BlockCustomer
          nullable: true
          type: string
        UseMinimumOrderValue:
          description: |
            Gibt an, ob ein Mindestauftragswert für Belege dieser Belegart berücksichtigt werden soll.

            **English version:**
            Specifies whether a minimum order value should be considered for documents of this document type.
          nullable: true
          type: boolean
        MinimumOrderValue:
          description: |
            Mindestauftragswert in Hauswährung

            **English version:**
            Minimum order value in home currency
          nullable: true
          type: number
        MinimumOrderValueUnreachedAction:
          description: |
            Maßnahme, wenn im Beleg der Mindestauftragswert unterschritten wird

            Mögliche Ausprägungen:
            - **DisplayWarning** -> Warnung anzeigen.
            - **PreventSaving** -> Erfassung des Belegs verhindern.

            **English version:**
            Action when the minimum order value is not reached in the document

            Possible values:
            - **DisplayWarning** -> Display warning.
            - **PreventSaving** -> Prevent saving the document.
          enum:
          - DisplayWarning
          - PreventSaving
          nullable: true
          type: string
        MissingDeliveryDateOnProcessAction:
          description: |
            Wie soll das Liefer-/Leistungsdatum beim Abruf vorbesetzt werden,
            wenn es nicht aus dem Ursprungsbeleg ermittelt werden kann und kein neues
            Liefer-/Leistungsdatum festgelegt wird.

            Mögliche Ausprägungen:
            - **None** -> Liefer-/Leistungsdatum nicht vorbesetzen (Zeitpunkt der Lieferung/Leistung wird z.B. als Text angegeben).
            - **FromDocumentDate** -> Liefer-/Leistungsdatum mit dem Belegdatum vorbesetzen.
            - **SetOnProcess** -> Liefer-/Leistungsdatum jeweils beim Abruf festlegen.

            **English version:**
            How should the delivery/service date be preset during processing
            when it cannot be determined from the source document and no new
            delivery/service date is specified.

            Possible values:
            - **None** -> Do not preset delivery/service date (time of delivery/service is specified as text, for example).
            - **FromDocumentDate** -> Preset delivery/service date with the document date.
            - **SetOnProcess** -> Specify delivery/service date during processing.
          enum:
          - None
          - FromDocumentDate
          - SetOnProcess
          nullable: true
          type: string
        IsProcessPermittedForLockedCustomer:
          description: |
            Gibt an, ob der Abruf aus dieser Belegart zugelassen ist,
            wenn für den Kunden eine Belegsperre gesetzt ist.

            **English version:**
            Specifies whether processing from this document type is allowed
            when a document block is set for the customer.
          nullable: true
          type: boolean
        IsProcessPermittedForLockedProduct:
          description: |
            Gibt an, ob der Abruf aus dieser Belegart für einen Artikel zugelassen ist,
            wenn dieser für die Belegbearbeitung gesperrt ist.

            **English version:**
            Specifies whether processing from this document type is allowed for an item
            when it is locked for document processing.
          nullable: true
          type: boolean
        ConsiderInOrderOrManufactureProposal:
          description: |
            Gibt an, wenn die Belegart bei einem auftragsbezogenen Bestell-/Fertigungsvorschlag
            berücksichtigt wird.

            **English version:**
            Specifies if the document type is considered in an order-related purchase/manufacture proposal.
          nullable: true
          type: boolean
        HintText:
          description: |
            Hinweistext, der in Belegen dieser Belegart vorbesetzt wird.

            **English version:**
            Hint text that is preset in documents of this document type.
          nullable: true
          type: string
        AdditionalText:
          description: |
            Zusätzlicher Text, der in Belegen dieser Belegart vorbesetzt wird.

            **English version:**
            Additional text that is preset in documents of this document type.
          nullable: true
          type: string
      title: SalesDocumentTypeExtendedProperties
      type: object
