          type: array
        Addresses:
          description: |
            Liste der Adressen eines Kunden.
            Ein Kunde kann folgende Adresstypen besitzen:
            - Rechnungsadresse
            - Standardadresse
            - bevorzugte Lieferadresse
            - weitere Lieferadressen

            Hinweise zur Verwendung beim Ändern (PUT):
            - Ist "Addresses" null oder nicht übermittelt, bleiben die Adressen unverändert.
            - Ist "Addresses" gefüllt, werden alle nicht enthaltenen Adressen gelöscht.
            - Die Reihenfolge der Lieferadressen ("PreferredDeliveryAddress", "DeliveryAddress") im Array
              muss der Reihenfolge des vorherigen GET-Requests entsprechen.

            Zum Löschen einer einzelnen Lieferadresse ("DeliveryAddress"):
            - Übermittle alle Properties der Adresse mit leeren Werten (Integer = 0, String = "").

            **English version:**
            List of addresses of a customer.
            A customer can have the following address types:
            - Billing address
            - Standard address
            - Preferred delivery address
            - Additional delivery addresses

            Notes on usage when updating (PUT):
            - If "Addresses" is null or not provided, the addresses remain unchanged.
            - If "Addresses" is filled, all addresses not included will be deleted.
            - The order of delivery addresses ("PreferredDeliveryAddress", "DeliveryAddress") in the array
              must match the order of the previous GET request.

            To delete a single delivery address ("DeliveryAddress"):
            - Provide all properties of the address with empty values (Integer = 0, String = "").
          items:
            $ref: '#/components/schemas/Address'
          nullable: true
          type: array
        ContactPersons:
          description: |
            Daten der Ansprechpartner

            Hinweise zur Verwaltung der Ansprechpartner:

            - Um einen neuen Ansprechpartner anzulegen, muss die Id **nicht** angegeben werden.
              Zusätzlich müssen alle bestehenden Ansprechpartner ebenfalls mit **mindestens** der Id angegeben werden,
              damit diese nicht gelöscht werden.

            - Um einen bestehenden Ansprechpartner zu bearbeiten, muss die Id des Ansprechpartners,
              der bearbeitet werden soll, sowie die zu ändernden Properties angegeben werden.
              Zusätzlich müssen alle anderen bestehenden Ansprechpartner ebenfalls mit **mindestens** der Id angegeben werden,
              damit diese nicht gelöscht werden.

            - Um einen Ansprechpartner zu löschen, darf dieser **nicht** in der Liste der Ansprechpartner enthalten sein.
              Zusätzlich müssen alle verbleibenden Ansprechpartner ebenfalls mit **mindestens** der Id angegeben werden,
              damit diese nicht gelöscht werden.

            **English version:**
            Contact person data

            Notes on managing contact persons:

            - To create a new contact person, the Id must **not** be specified.
              Additionally, all existing contact persons must also be specified with **at least** the Id,
              so they are not deleted.

            - To edit an existing contact person, the Id of the contact person
              to be edited, as well as the properties to be changed, must be specified.
              Additionally, all other existing contact persons must also be specified with **at least** the Id,
              so they are not deleted.

            - To delete a contact person, it must **not** be included in the list of contact persons.
              Additionally, all remaining contact persons must also be specified with **at least** the Id,
              so they are not deleted.
          items:
            $ref: '#/components/schemas/ContactPersonData'
          nullable: true
          type: array
        BankAccounts:
          description: |
            Liste der Bankverbindungen des Kunden.

            Hinweise zur Änderung:
            - Die Bankverbindungen werden **nicht** über den Endpunkt `POST oder PUT /v1/customers/{customerId}` verwaltet.
            - Zum Anlegen/Ändern/Löschen bitte die Bankaccount-Endpunkte verwenden:
              - `GET /v1/customers/{customerId}/bank-accounts`
              - `POST /v1/customers/{customerId}/bank-accounts`
              - `GET /v1/customers/{customerId}/bank-accounts/{bankAccountId}`
              - `PUT /v1/customers/{customerId}/bank-accounts/{bankAccountId}`
              - `DELETE /v1/customers/{customerId}/bank-accounts/{bankAccountId}`

            **English version:**
            List of the customer's bank accounts.

            Notes on updating:
            - Bank accounts are **not** managed via `POST or PUT /v1/customers/{customerId}`.
            - To create/update/delete bank accounts, use the bank account endpoints:
              - `GET /v1/customers/{customerId}/bank-accounts`
              - `POST /v1/customers/{customerId}/bank-accounts`
              - `GET /v1/customers/{customerId}/bank-accounts/{bankAccountId}`
              - `PUT /v1/customers/{customerId}/bank-accounts/{bankAccountId}`
              - `DELETE /v1/customers/{customerId}/bank-accounts/{bankAccountId}`
          items:
            $ref: '#/components/schemas/BankAccountData'
          nullable: true
          type: array
        ElectronicInvoiceFormat:
          description: |
            Format der E-Rechnung
            UsePresetFromSettings -> Einstellung aus Firma verwenden
            None -> Kein Format
            Zugferd10 -> ZUGFeRD 1.0
            Zugferd21 -> Alle ZUGFeRD 2.x-Versionen (EN16931 (COMFORT)) (aus Rückwärtskompatibilität bleibt die enum-Ausprägung auf Zugferd21)
            Zugferd2Extended -> ZUGFeRD 2.x EXTENDED
            XRechnung -> XRechnung (CII-Syntax)
            XRechnungUbl -> XRechnung (UBL-Syntax)
            EbInterface -> ebInterface (für E-Rechnung Bund Österreich)

            **English version:**
            Electronic invoice format
            UsePresetFromSettings -> Use setting from company
            None -> No format
            Zugferd10 -> ZUGFeRD 1.0
            Zugferd21 -> All ZUGFeRD 2.x versions (EN16931 (COMFORT)) (enum value remains Zugferd21 for backward compatibility)
            Zugferd2Extended -> ZUGFeRD 2.x EXTENDED
            XRechnung -> XRechnung (CII syntax)
            XRechnungUbl -> XRechnung (UBL syntax)
            EbInterface -> ebInterface (for federal e-invoice Austria)
          enum:
          - UsePresetFromSettings
          - None
          - Zugferd10
          - Zugferd21
          - Zugferd2Extended
          - XRechnung
          - XRechnungUbl
          - EbInferface
          example: XRechnung
          nullable: true
          type: string
        BuyerReference:
          description: |
            Käuferreferenz für ZUGFeRD 2.x und XRechnung (z.B. Leitweg-ID)

            **English version:**
            Buyer reference for ZUGFeRD 2.x and XRechnung (e.g. routing ID)
          example: X12345
          nullable: true
          type: string
        UsePeppol:
          deprecated: true
          description: |
            Veraltete Property. Ab Version 3.0.0 der XRechnung ist diese Angabe obligatorisch.
            Gibt an, ob bei XRechnung die Geschäftsprozessinformationen für PEPPOL eingetragen werden sollen.

            **English version:**
            Deprecated property. From version 3.0.0 of XRechnung, this specification is mandatory.
            Specifies whether business process information for PEPPOL should be entered for XRechnung.
          nullable: true
          type: boolean
        ElectronicAddressType:
          description: |
            Wert, der als elektronische Adresse des Käufers für ZUGFeRD 2.x und XRechnung verwendet werden soll.

            **English version:**
            Value to be used as the buyer's electronic address for ZUGFeRD 2.x and XRechnung.
          enum:
          - None
          - Gln
          - VatId
          - EMail
          - BuyerReference
          example: VatId
          nullable: true
          type: string
        CreditTransferHousebankSettings:
          description: |
            Gibt an, wie eine Hausbankverbindung für Überweisungen vorbesetzt werden soll.
            - Keine Hausbankverbindung verwenden
            - Hausbankverbindung aus den Einstellungen der Firma verwenden
            - Individuelle Hausbankverbindung verwenden

            **English version:**
            Specifies how a house bank connection should be preset for credit transfers.
            - Do not use house bank connection
            - Use house bank connection from company settings
            - Use individual house bank connection
          enum:
          - None
