            Veraltete Property. Ab Version 3.0.0 der XRechnung ist diese Angabe obligatorisch.
            Gibt an, ob bei XRechnung die Geschäftsprozessinformationen für PEPPOL eingetragen
            werden sollen.

            **English version:**
