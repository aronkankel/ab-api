    PeriodicalPurchaseDocumentTemplateTypeExtendedProperties:
      description: |
        Zusätzliche Properties einer wiederkehrenden Belegart Einkauf.

        **English version:**
        Additional properties of a periodical purchase document type.
      properties:
        TargetDocumentTypeId:
          description: |
            Id (technischer Schlüssel) der Zielbelegart.

            **English version:**
            Id (technical key) of the target document type.
          nullable: true
          type: integer
