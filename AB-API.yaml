paths:
  /v1/token:
    post:
      description: |
        Neues Access-Token zur OAuth2-Authentifizierung unter Angabe von UserName und Password oder eines RefreshTokens generieren.

        **English version:**
        Generate a new access token for OAuth2 authentication by providing username and password or a refresh token.
      operationId: createToken
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/createToken_request'
      responses:
        "200":
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: |
            Token erfolgreich angelegt.

            **English version:**
            Token successfully created.
        "400":
          description: |
            Es liegt ein fehlerhafter Clientaufruf vor. Eine mögliche Ursache kann
            sein, dass ein fehlerhafter Wert übergeben wurde. Weitere Informationen
            sind in der Response-Nachricht als HttpError enthalten.

            **English version:**
            There is a faulty client call. One possible cause could be
            that an incorrect value was passed. Further information
            is contained in the response message as HttpError.
      security:
      - BasicAuth: []
      - OAuth2: []
      summary: |
        Erzeugung eines Bearer Tokens zur OAuth2-Authentifizierung

        **English version:**
        Generation of a Bearer Token for OAuth2 authentication
      tags:
      - Authentification
  /appinfo:
    get:
      description: |
        Prüfen, ob der Webservice erreichbar ist.
        Liefert Informationen zum laufenden Webservice: Bezeichnung, Version der Anwendung und verbundene Datenbank.

        **English version:**
        Check if the webservice is reachable.
        Returns information about the running webservice: name, application version and connected database.
      responses:
        "200":
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/AppInfoResponse'
          description: |
            Erfolgreicher Abruf der Ressource.

            **English version:**
            Successful retrieval of the resource.
        "403":
          description: |
            Es fehlt die Berechtigung zum Zugriff auf die Ressource.

            **English version:**
            Permission to access the resource is missing.
      summary: |
        Allgemeine Informationen abrufen

        **English version:**
        Retrieve general information
      tags:
      - AppInfo
  /appinfo/authenticated:
    get:
      description: |
        Prüfen, ob der Webservice erreichbar ist (mit Authentifizierung).
        Liefert Informationen zum laufenden Webservice: Bezeichnung, Version der Anwendung und verbundene Datenbank.

        **English version:**
        Check if the webservice is reachable (with authentication).
        Returns information about the running webservice: name, application version and connected database.
      responses:
        "200":
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/AppInfoResponse'
          description: |
            Erfolgreicher Abruf der Ressource.

            **English version:**
            Successful retrieval of the resource.
        "401":
          description: |
            Die Authentifizierungs-Information fehlt oder ist ungültig. Weitere
            Informationen sind in der Response-Nachricht als HttpError enthalten.

            **English version:**
            The authentication information is missing or invalid. Further
            information is contained in the response message as HttpError.
          headers:
            WWW_Authenticate:
              schema:
                type: string
        "403":
          description: |
            Es fehlt die Berechtigung zum Zugriff auf die Ressource.

            **English version:**
            Permission to access the resource is missing.
      security:
      - BasicAuth: []
      - OAuth2: []
      summary: |
        Allgemeine Informationen abrufen

        **English version:**
        Retrieve general information
      tags:
      - AppInfo
  /appinfo/authenticated/api-key:
    get:
      description: |
        Prüfen, ob der Webservice erreichbar ist (mit Authentifizierung und API-Key).
        Liefert Informationen zum laufenden Webservice: Bezeichnung, Version der Anwendung und verbundene Datenbank.

        **English version:**
        Check if the webservice is reachable (with authentication and API key).
        Returns information about the running webservice: name, application version and connected database.
      responses:
        "200":
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/AppInfoResponse'
          description: |
            Erfolgreicher Abruf der Ressource.

            **English version:**
            Successful retrieval of the resource.
        "401":
          description: |
            Die Authentifizierungs-Information fehlt oder ist ungültig. Weitere
            Informationen sind in der Response-Nachricht als HttpError enthalten.

            **English version:**
            The authentication information is missing or invalid. Further
            information is contained in the response message as HttpError.
          headers:
            WWW_Authenticate:
              schema:
                type: string
        "403":
          description: |
            Es fehlt die Berechtigung zum Zugriff auf die Ressource.

            **English version:**
            Permission to access the resource is missing.
      security:
      - BasicAuth: []
        ApiKeyAuth: []
      - OAuth2: []
        ApiKeyAuth: []
      summary: |
        Allgemeine Informationen abrufen

        **English version:**
        Retrieve general information
      tags:
      - AppInfo
