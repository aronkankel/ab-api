            **English version:**
            Type of condition (amount, percentage, net weight or
            calculation field condition)
          enum:
          - Amount
          - Percentage
          - AmountPerNetWeight
          - CalculationField
          type: string
        ChargeType:
          description: |
            Handelt es sich bei der Kondition um einen Zuschlag oder Abschlag?

            **English version:**
            Is the condition a surcharge or deduction?
          enum:
          - Surcharge
          - Deduction
          nullable: true
          readOnly: true
          type: string
        ReferringTo:
          description: |
            Liste der Schlüssel (LineItem.Key) der Belegpositionen, auf die sich
            diese Konditionsposition bezieht.
            Verwendet für Betragskonditionen mit Umlage, Prozent-, Nettogewicht- und Rechenfeldkonditionen.

            **English version:**
            List of keys (LineItem.Key) of the document line items to which
            this condition line item refers.
            Used for amount conditions with allocation, percentage, net weight and calculation field conditions.
          items:
            type: integer
          nullable: true
          type: array
        Percentage:
          description: |
            Prozentwert einer Prozentkondition.

            **English version:**
            Percentage value of a percentage condition.
          nullable: true
          type: number
        ReferencedAmount:
          description: |
            Bezugsbetrag einer Prozentkondition (read-only).

            **English version:**
            Reference amount of a percentage condition (read-only).
          nullable: true
          type: number
        Amount:
          description: |
            Betrag einer Kondition. Kann nur bei Betragskonditionen verändert werden.
            Für Prozent-, Nettogewicht- oder Rechenfeldkonditionen ist das Feld read-only.
            Der Betrag wird umsatzgerecht angegeben, d.h.
            In einer Rechnung hat eine Zuschlagskondition einen positiven Betrag (z.B. Porto erhöht
            den Gesamtbetrag des Belegs) und eine Abschlagskondition einen negativen Betrag (z.B.
            ein Bonus verringert den Gesamtbetrag). Bei einer Gutschrift ist es umgekehrt, da eine
            Gutschrift einen negativen Betrag hat.

            **English version:**
            Amount of a condition. Can only be changed for amount conditions.
            For percentage, net weight or calculation field conditions, this field is read-only.
            The amount is specified as revenue-appropriate, i.e.
            In an invoice, a surcharge condition has a positive amount (e.g. postage increases
            the total amount of the document) and a deduction condition has a negative amount (e.g.
            a bonus reduces the total amount). For a credit note, it is reversed because a
            credit note has a negative amount.
          nullable: true
          type: number
        AmountAlreadyProcessed:
          description: |
            Bereits verarbeitend abgerufener Betrag (z.B. nach Teilabruf).

            **English version:**
            Amount already processed during call-off (e.g. after partial call-off).
          nullable: true
          readOnly: true
          type: number
        AmountToProcess:
          description: |
            Noch abzurufender Betrag (z.B. nach Teilabruf).

            **English version:**
            Amount still to be called off (e.g. after partial call-off).
          nullable: true
          readOnly: true
          type: number
        Accounting:
          $ref: '#/components/schemas/Accounting'
        CalculationFieldNumber:
          description: |
            Nummer des Rechenfelds, auf das sich die Rechenfeldkondition bezieht.

            **English version:**
            Number of the calculation field to which the calculation field condition refers.
          nullable: true
          type: integer
        CalculationFieldConditionType:
          description: |
