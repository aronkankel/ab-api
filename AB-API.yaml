            **English version:**
            Successful request.
      summary: |
        Prüfen, ob der Webservice erreichbar ist.

        **English version:**
        Check if the webservice is reachable.
      tags:
      - AppInfo
  /system-status:
    get:
      description: |
        Prüfen, ob der Webservice und alle Subsysteme erreichbar sind.
