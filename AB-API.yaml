        ElectronicInvoiceFormat:
          description: |
            Format der E-Rechnung
            None -> Kein Format
            Zugferd10 -> ZUGFeRD 1.0
            Zugferd21 -> Alle ZUGFeRD 2.x-Versionen (EN16931 (COMFORT)) (aus Rückwärtskompatibilität
              bleibt die enum-Ausprägung auf Zugferd21)
            Zugferd2Extended -> ZUGFeRD 2.x EXTENDED
            XRechnung -> XRechnung (CII-Syntax)
            XRechnungUbl -> XRechnung (UBL-Syntax)
            EbInterface -> ebInterface (für E-Rechnung Bund Österreich)

            **English version:**
            Format of the e-invoice
            None -> No format
            Zugferd10 -> ZUGFeRD 1.0
            Zugferd21 -> All ZUGFeRD 2.x versions (EN16931 (COMFORT)) (for backwards compatibility
              the enum value remains Zugferd21)
            Zugferd2Extended -> ZUGFeRD 2.x EXTENDED
            XRechnung -> XRechnung (CII syntax)
            XRechnungUbl -> XRechnung (UBL syntax)
            EbInterface -> ebInterface (for e-invoice federal government Austria)
          enum:
          - None
          - Zugferd10
          - Zugferd21
          - Zugferd2Extended
          - XRechnung
          - XRechnungUbl
          - EbInferface
          nullable: true
          type: string
