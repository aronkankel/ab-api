            Specifies whether the business process information for PEPPOL should be entered
            for XRechnung.
          nullable: true
          type: boolean
        DeliverOnlyIfAllProductsInStock:
          description: |
            Beleg nur liefern, wenn der Bestand für alle überwachten Positionen vollständig ausreicht.
            Nur für nicht bestandsändernde Verkaufsbelege. Steuert das Verhalten beim Abruf des
            Belegs in einen bestandsändernden Verkaufsbeleg.

            **English version:**
            Only deliver the document if the stock is fully sufficient for all monitored line items.
            Only for non-stock-changing sales documents. Controls the behavior when processing
            the document into a stock-changing sales document.
          nullable: true
          type: boolean
        ConsiderForPackagingLaw:
          description: |
            Lieferung fließt in die Auswertung für das Verpackungsgesetz ein.

            **English version:**
            Delivery is included in the evaluation for the Packaging Act.
          nullable: true
          type: boolean
        BusinessTransaction:
          description: |
            Geschäftsvorfall
            - DomesticSalesWithVat -> Verkauf Inland mit Umsatzsteuer
            - ReverseCharge -> Leistungserbringung mit Übergang der Steuerschuld auf den
              Leistungsempfänger (§ 13b UStG)
            - DeliveryAsFirstPurchaserInIntraUnionTriangualarTransaction -> Lieferung als erster
              Abnehmer in einem innergemeinschaftlichen Dreiecksgeschäft (§ 25b Abs. 2 UStG)
            - DeliveryOfGoodsOrServicesToEuCustomer -> Innergemeinschaftliche Lieferung oder
              sonstige Leistungen an EU-Kunden
            - DistanceSaleOfGoodsWithinEuToCustomerWithoutVatId -> Fernverkauf an EU-Kunden
              ohne USt-IdNr.
            - SaleWithoutVat -> Verkauf ohne Steuer

            **English version:**
            Business transaction
            - DomesticSalesWithVat -> Domestic sales with VAT
            - ReverseCharge -> Supply of services with transfer of tax liability to the
              service recipient (§ 13b UStG)
            - DeliveryAsFirstPurchaserInIntraUnionTriangualarTransaction -> Delivery as first
              purchaser in an intra-union triangular transaction (§ 25b para. 2 UStG)
            - DeliveryOfGoodsOrServicesToEuCustomer -> Intra-community delivery or other
              services to EU customers
            - DistanceSaleOfGoodsWithinEuToCustomerWithoutVatId -> Distance sale to EU customers
              without VAT ID
            - SaleWithoutVat -> Sale without tax
          enum:
          - DomesticSalesWithVat
          - ReverseCharge
          - DeliveryAsFirstPurchaserInIntraUnionTriangualarTransaction
          - DeliveryOfGoodsOrServicesToEuCustomer
          - DistanceSaleOfGoodsWithinEuToCustomerWithoutVatId
          - SaleWithoutVat
          nullable: true
          type: string
        IsLockedForDunningOrDirectDebit:
          description: |
            Legt fest, ob der Beleg für Mahnung/Lastschrift gesperrt ist. Steht nur bei
            angeschlossenem DATEV-Rechnungswesen zur Verfügung.

            **English version:**
            Specifies whether the document is locked for dunning/direct debit. Only available
            when DATEV financial accounting is connected.
          nullable: true
          type: boolean
