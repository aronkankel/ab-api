            **English version:**
            Tax key (classification term)
          nullable: true
          type: string
      title: Accounting
      type: object
    createToken_request:
      properties:
        grant_type:
          description: |
            Art und Umfang der Angaben, die zur Vergabe eines Access-Tokens erforderlich sind.
            Bei der ersten Token-Erzeugung mit UserName und Password muss der Wert "password" sein.
            Bei erneuter Erzeugung mit RefreshToken muss der Wert "refresh_token" sein.

            **English version:**
            Type and scope of information required for issuing an access token.
            For initial token generation with username and password, the value must be "password".
            For regeneration with refresh token, the value must be "refresh_token".
          enum:
          - password
          - refresh_token
          nullable: false
          type: string
        username:
          description: |
            Name des AB-Benutzers, für den das Token erzeugt werden soll.
            Der Wert muss bei grant_type "password" besetzt sein.

            **English version:**
            Name of the AB user for whom the token should be generated.
            The value must be set when grant_type is "password".
          nullable: false
          type: string
        password:
          description: |
            Kennwort des AB-Benutzers, für den das Token erzeugt werden soll.
            Der Wert muss bei grant_type "password" besetzt sein.

            **English version:**
            Password of the AB user for whom the token should be generated.
            The value must be set when grant_type is "password".
          nullable: false
          type: string
        scope:
          description: |
            Bereich von Requests, für die das Token gültig sein soll.
            (wird z.Zt. nicht ausgewertet, kann Leerstring sein).
            Der Wert muss bei grant_type "password" besetzt sein.

            **English version:**
            Scope of requests for which the token should be valid.
            (currently not evaluated, can be an empty string).
            The value must be set when grant_type is "password".
          nullable: false
          type: string
        refresh_token:
          description: |
            Refresh Token aus der zuletzt erhaltenen TokenResponse.
            Der Wert muss bei grant_type "refresh_token" besetzt sein.

            **English version:**
            Refresh token from the last received TokenResponse.
            The value must be set when grant_type is "refresh_token".
          format: guid
          nullable: false
          type: string
      required:
      - grant_type
      type: object
    postProductDmsDocument_request:
      properties:
        file:
          description: |
            Dokument, das ins DMS importiert werden soll.

            **English version:**
            Document that should be imported into DMS.
          format: binary
          nullable: false
          type: string
        documentType:
          description: |
            Dokumentenart des Dokuments im DMS

            **English version:**
            Document type of the document in DMS
          nullable: false
          type: string
        keywords:
          description: "Schlagwortliste als JSON-String\nz.B. [{\"Name\": \"NameSchlagwort1\"\
            , \"Value\": \"WertSchlagwort1\"},{\"Name\": \"NameSchlagwort2\", \"Value\"\
            : \"WertSchlagwort2\"}]\nWichtig dabei sind die eckigen Klammern für die\
            \ Liste und die geschweiften Klammern für jedes Element.\nEin Element\
            \ besteht immer aus dem Namen und dem Wert des Schlagworts.\nSollten die\
            \ Werte Datums- oder Zahlenangaben sein, werden diese international formatiert:\
            \ Datum YYYY-MM-DD, Zahlen: 12345.67. <br>\nExample:\n  ```json\n  [\n\
            \    {\n      \"Name\": \"Belegdatum\",\n      \"Value\": \"2021-02-02\"\
            \n    },\n    {\n      \"Name\": \"Endbetrag\", \n      \"Value\": \"\
            234567.89\"\n    }\n  ]\n  ```\n\n**English version:**\nKeyword list as\
            \ JSON string\ne.g. [{\"Name\": \"NameKeyword1\", \"Value\": \"ValueKeyword1\"\
            },{\"Name\": \"NameKeyword2\", \"Value\": \"ValueKeyword2\"}]\nImportant\
            \ are the square brackets for the list and the curly brackets for each\
            \ element.\nAn element always consists of the name and value of the keyword.\n\
            If the values are date or number specifications, they are formatted internationally:\
            \ Date YYYY-MM-DD, Numbers: 12345.67. <br>\nExample:\n  ```json\n  [\n\
            \    {\n      \"Name\": \"DocumentDate\",\n      \"Value\": \"2021-02-02\"\
            \n    },\n    {\n      \"Name\": \"FinalAmount\", \n      \"Value\": \"\
            234567.89\"\n    }\n  ]\n  ```\n"
          nullable: false
          type: string
        filename:
          description: |
            Dateiname (inkl. Dateiendung), den das Dokument im DMS erhalten soll.
            Wird kein Wert oder ein Leerstring übermittelt, wird der Dateiname der
            Dokumentenart verwendet.

            **English version:**
            Filename (including file extension) that the document should receive in DMS.
            If no value or an empty string is provided, the filename of the
            document type is used.
          nullable: true
          type: string
      required:
      - documentType
      - file
      type: object
