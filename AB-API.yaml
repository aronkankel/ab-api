        style: form
      - description: |
          Spezieller Filter-Parameter für das Einschränken auf Werte von benutzerdefinierten Feldern.<br>
          Die Syntax für die Filter orientiert sich an der Filter-Syntax von OData.<br>
          Es kann nur anhand des Bereichs und der Nummer des benutzerdefinierten Felds gefiltert werden.<br>
          Der Bezeichner für den Bereich muss UserDefinedFieldDefinition/Area entsprechen. Die Nummer ist 1-basiert.<br>
          Folgende Vergleichsoperatoren stehen zur Verfügung: eq (gleich), ne (ungleich), lt (kleiner als), gt (größer als), le (kleiner gleich), ge (größer gleich)<br>
          Beispiel: ...userDefinedFieldFilter=SalesDocument/Field1 eq 'SADLER'...<br>
          Mehrere Filter können durch "and" getrennt werden. <br>
          Beispiel: ...userDefinedFieldFilter=SalesDocument/Field1 eq 'SADLER' and Customer/Field1 eq 'DE'...<br>
          Es ist möglich, auf NULL oder NOT NULL zu prüfen. Dafür steht das Schlüsselwort "null" für die Operatoren "eq" und "ne" bereit.<br>
          Beispiel: ...userDefinedFieldFilter=SalesDocument/Field1 eq null...<br>
          Beispiel: ...userDefinedFieldFilter=SalesDocument/Field1 ne null...<br>
          Strings müssen in einfache Hochkommata eingeschlossen werden, wenn sie ein Minus, Schrägstrich, Komma Punkt oder Leerzeichen enthalten.<br>
          Wenn im Suchstring ein Hochkomma enthalten ist, muss dieses verdoppelt werden.<br>
          Beispiel: ...userDefinedFieldFilter=SalesDocument/Field1 eq 'Bsp. mit Leerzeichen'...<br>
          Beispiel: ...userDefinedFieldFilter=SalesDocument/Field1 eq 'Bsp. mit ''Quote'''...<br>
          Datumsangaben (Tagesdatum) müssen im internationalen Format YYYY-MM-DD angegeben werden.<br>
          Beispiel: ...userDefinedFieldFilter=SalesDocument/Field3 eq 2025-04-08...<br>
          Wird ein ungültiger Filter-String übermittelt, wird der Request mit StatusCode 400 abgewiesen.<br>

          **English version:**
          Special filter parameter for restricting to values of user-defined fields.<br>
          The syntax for filters is based on the OData filter syntax.<br>
          Filtering can only be done by area and number of the user-defined field.<br>
          The identifier for the area must correspond to UserDefinedFieldDefinition/Area. The number is 1-based.<br>
          The following comparison operators are available: eq (equals), ne (not equals), lt (less than), gt (greater than), le (less than or equal), ge (greater than or equal)<br>
          Example: ...userDefinedFieldFilter=SalesDocument/Field1 eq 'SADLER'...<br>
          Multiple filters can be separated by "and". <br>
          Example: ...userDefinedFieldFilter=SalesDocument/Field1 eq 'SADLER' and Customer/Field1 eq 'DE'...<br>
          It is possible to check for NULL or NOT NULL. The keyword "null" is available for the operators "eq" and "ne".<br>
          Example: ...userDefinedFieldFilter=SalesDocument/Field1 eq null...<br>
          Example: ...userDefinedFieldFilter=SalesDocument/Field1 ne null...<br>
          Strings must be enclosed in single quotes if they contain a minus, slash, comma, period or space.<br>
          If the search string contains a quote, it must be doubled.<br>
          Example: ...userDefinedFieldFilter=SalesDocument/Field1 eq 'Bsp. mit Leerzeichen'...<br>
          Example: ...userDefinedFieldFilter=SalesDocument/Field1 eq 'Bsp. mit ''Quote'''...<br>
          Date specifications (calendar date) must be specified in international format YYYY-MM-DD.<br>
          Example: ...userDefinedFieldFilter=SalesDocument/Field3 eq 2025-04-08...<br>
          If an invalid filter string is transmitted, the request will be rejected with StatusCode 400.<br>
        examples:
          filterSimple:
            summary: |
