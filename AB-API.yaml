  /v1/e-invoicing/common-schema:
    post:
      description: |
        Erzeugt eine Aufgabe, um aus der hochgeladenen E-Rechnung (ZUGFeRD 2 PDF-Datei /
        XML-Datei in Syntax CII oder UBL)
        ein vereinheitlichtes Schema zu generieren.
        Die Aufgabe wird asynchron verarbeitet.

        Das Common Schema dient als interne, formatunabhängige Repräsentation der Rechnungsdaten
        und kann als Grundlage für weitere Verarbeitungsschritte verwendet werden.

        Der Fortschritt bzw. Status der Aufgabe kann über den Endpunkt
        `/v1/e-invoicing/common-schema/queue/{queueItemId}` abgefragt werden.
        Die konkrete URL mit der `queueItemId` wird im Location-Header der Antwort zurückgegeben.

        Die Definition des Common Schemas als XSD-Datei kann über den Endpunkt
        `/v1/e-invoicing/common-schema.xsd` heruntergeladen werden.

        **Hinweis:** Für die Verwendung des Endpunktes ist eine Internetverbindung erforderlich.

        **English version:**
        Creates a task to generate a unified schema from the uploaded e-invoice (ZUGFeRD 2 PDF file /
        XML file in CII or UBL syntax).
        The task is processed asynchronously.

        The Common Schema serves as an internal, format-independent representation of the invoice data
        and can be used as a basis for further processing steps.

        The progress or status of the task can be queried via the endpoint
        `/v1/e-invoicing/common-schema/queue/{queueItemId}`.
        The specific URL with the `queueItemId` is returned in the Location header of the response.

        The definition of the Common Schema as an XSD file can be downloaded via the endpoint
        `/v1/e-invoicing/common-schema.xsd`.

        **Note:** An internet connection is required to use this endpoint.
      operationId: postEInvoiceCommonSchema
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/postEInvoiceCommonSchema_request'
      responses:
        "202":
          description: |
            Die Aufgabe zur Erstellung des Common Schemas wurde erfolgreich angelegt.
            Die URL zur Statusabfrage wird im Location-Header der Antwort zurückgegeben,
            z. B. `/v1/e-invoicing/common-schema/queue/1001`

            **English version:**
            The task to create the Common Schema has been successfully created.
            The URL for status query is returned in the Location header of the response,
            e.g. `/v1/e-invoicing/common-schema/queue/1001`
        "400":
          description: |
            Es liegt ein fehlerhafter Clientaufruf vor. Eine mögliche Ursache kann
            sein, dass ein fehlerhafter Wert übergeben wurde. Weitere Informationen
            sind in der Response-Nachricht als HttpError enthalten.

            **English version:**
            There is a faulty client call. One possible cause could be
            that an incorrect value was passed. Further information
            is contained in the response message as HttpError.
        "401":
          description: |
            Die Authentifizierungs-Information fehlt oder ist ungültig. Weitere
            Informationen sind in der Response-Nachricht als HttpError enthalten.

            **English version:**
            The authentication information is missing or invalid. Further
            information is contained in the response message as HttpError.
          headers:
            WWW_Authenticate:
              schema:
                type: string
        "403":
          description: |
            Es fehlt die Berechtigung zum Zugriff auf die Ressource.

            **English version:**
            Permission to access the resource is missing.
        "404":
          description: |
            Die angeforderte Ressource ist dauerhaft oder temporär nicht verfügbar.
            Eine mögliche Ursache kann sein, dass die URI fehlerhaft ist.

            **English version:**
            The requested resource is permanently or temporarily unavailable.
            One possible cause could be that the URI is incorrect.
        "423":
          description: |
            Die Ressource ist aufgrund einer exklusiven Verarbeitung temporär gesperrt.

            **English version:**
            The resource is temporarily locked due to exclusive processing.
      security:
      - BasicAuth: []
        ApiKeyAuth: []
      - OAuth2: []
        ApiKeyAuth: []
      summary: |
        Für eine ZUGFeRD 2 PDF-Datei oder XML-Datei als E-Rechnung (CII oder UBL) ein Common Schema
        generieren lassen.

        **English version:**
        Generate a Common Schema for a ZUGFeRD 2 PDF file or XML file as e-invoice (CII or UBL).
      tags:
      - E-Rechnung
