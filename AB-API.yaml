    TaxKey:
      description: |
        Enthält die Daten eines Steuerschlüssels.

        **English version:**
        Contains the data of a tax key.
      example:
        Id: 3
        Key: A19
        Description: USt b. Leist.empfänger 19 %
        PrintText: UStLE 19 %
        TaxType: ReverseCharge
        Percentage: 19
        IsTaxLiableInOtherEuMemberState: false
        LastModified: 2024-08-01T11:03:58.80434+01:00
        LastModifiedBy: ab
      properties:
        Id:
          description: |
            Id (technischer Schlüssel) des Steuerschlüssels.

            **English version:**
            Id (technical key) of the tax key.
          nullable: true
          type: integer
        Key:
          description: |
            Ordnungsbegriff des Steuerschlüssels.

            **English version:**
            Key (classification term) of the tax key.
          nullable: true
          type: string
        Description:
          description: |
            Bezeichnung des Steuerschlüssels.

            **English version:**
            Description of the tax key.
          nullable: true
          type: string
        PrintText:
          description: |
            Text des Steuerschlüssels für den Druck.

            **English version:**
            Text of the tax key for printing.
          nullable: true
          type: string
        TaxType:
          description: |
            Gibt die Steuerart des Steuerschlüssels an.

            Mögliche Ausprägungen:
            - **OutputTax** -> Mehrwertsteuer
            - **InputTax** -> Vorsteuer
            - **ReverseCharge** -> USt. beim Leistungsempfänger
            - **IntraCommunitySupplyOrTransfer** -> EU-Lieferung/Verbringung
            - **IntraCommunityService** -> EU sonstige Leistung

            **English version:**
            Indicates the tax type of the tax key.

            Possible values:
            - **OutputTax** -> Output tax (VAT)
            - **InputTax** -> Input tax
            - **ReverseCharge** -> VAT due by the recipient (reverse charge)
            - **IntraCommunitySupplyOrTransfer** -> Intra-community supply/transfer
            - **IntraCommunityService** -> Intra-community service
          enum:
          - OutputTax
          - InputTax
          - ReverseCharge
          - IntraCommunitySupplyOrTransfer
          - IntraCommunityService
          nullable: true
          type: string
        Percentage:
          description: |
            Prozentwert des Steuerschlüssels.

            **English version:**
            Percentage value of the tax key.
          maximum: 99.99
          minimum: 0
          multipleOf: 0.01
          nullable: true
          type: number
        IsTaxLiableInOtherEuMemberState:
          description: |
            Gibt an, ob die Steuerpflicht für diesen Steuerschlüssel in einem anderen EU-Mitgliedstaat besteht.
            Gilt nur für die Steuerarten 'Mehrwertsteuer' und 'Vorsteuer'.

            **English version:**
            Indicates whether the tax liability for this tax key exists in another EU member state.
            Applies only to the tax types 'OutputTax' and 'InputTax'.
          nullable: true
          type: boolean
        LastModified:
          description: |
            Datum der letzten Änderung.

            **English version:**
            Date of last modification.
          format: date-time
          nullable: true
          type: string
        LastModifiedBy:
          description: |
            Benutzer, der den Steuerschlüssel zuletzt geändert hat (Ordnungsbegriff)

            **English version:**
            User who last modified the tax key (classification term)
          nullable: true
          readOnly: true
          type: string
      title: TaxKey
      type: object
    TermOfPayment:
      description: |
        Enthält die Daten einer Zahlungsbedingung

