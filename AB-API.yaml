            Beispiel (1 Artikel): Gerät, Manntag, Tüte

            **English version:**
            Description of the delivery unit for sales (singular)
            Example (1 product): Device, man-day, bag
          nullable: true
          type: string
        SalesDeliveryUnitPlural:
          description: |
            Bezeichnung der Liefereinheiten für den Verkauf (Mehrzahl)
            Beispiel (2 oder mehrere Artikel): Geräte, Manntage, Tüten

            **English version:**
            Description of the delivery units for sales (plural)
            Example (2 or more products): Devices, man-days, bags
          nullable: true
          type: string
        PurchaseDeliveryUnit:
          description: |
            Bezeichnung der Liefereinheit für den Einkauf (Einzahl)
            Beispiel (1 Artikel): Gerät, Manntag, Palette

            **English version:**
            Description of the delivery unit for purchase (singular)
            Example (1 product): Device, man-day, pallet
          nullable: true
          type: string
        PurchaseDeliveryUnitPlural:
          description: |
            Bezeichnung der Liefereinheit für den Einkauf (Mehrzahl)
            Beispiel (2 oder mehrere Artikel): Geräte, Manntage, Paletten

            **English version:**
            Description of the delivery unit for purchase (plural)
            Example (2 or more products): Devices, man-days, pallets
          nullable: true
          type: string
        PriceUnit:
          description: |
            Bezeichnung der Preiseinheit des Artikels (Einzahl)
            Beispiel (1 Artikel): Gerät, Stunde, Kilogramm

            **English version:**
            Description of the price unit of the product (singular)
            Example (1 product): Device, hour, kilogram
          nullable: true
          type: string
        PriceUnitPlural:
          description: |
            Bezeichnung der Preiseinheiten des Artikels (Mehrzahl)
            Beispiel (2 oder mehrere Artikel): Geräte, Stunden, Kilogramm

            **English version:**
            Description of the price units of the product (plural)
            Example (2 or more products): Devices, hours, kilograms
          nullable: true
          type: string
        SerialOrLotNumberUsage:
          description: |
            Serien-/Chargennummern-Verwaltung?
            None - Der Artikel hat weder Serien- noch Chargennummern.
            SerialNumbers - Der Artikel hat Seriennummernverwaltung ohne Pflichtangabe.
            SerialNumbersRequiredForSale - Der Artikel hat Seriennummernverwaltung mit Pflichtangabe in Verkaufsbelegen.
            SerialNumbersTraceable - Der Artikel hat strenge Seriennummernverwaltung (Eingabe in Bestandszu- und -abgängen ist Pflicht).
            LotNumbers - Der Artikel hat Chargennummernverwaltung ohne Pflichtangabe.
            LotNumbersRequiredForSale - Der Artikel hat Chargennummernverwaltung mit Pflichtangabe in Verkaufsbelegen.
            LotNumbersTraceable - Der Artikel hat strenge Chargennummernverwaltung (Eingabe in Bestandszu- und -abgängen ist Pflicht).

            **English version:**
            Serial/lot number management?
            None - The product has neither serial nor lot numbers.
            SerialNumbers - The product has serial number management without mandatory entry.
            SerialNumbersRequiredForSale - The product has serial number management with mandatory entry in sales documents.
            SerialNumbersTraceable - The product has strict serial number management (entry in stock additions and withdrawals is mandatory).
            LotNumbers - The product has lot number management without mandatory entry.
            LotNumbersRequiredForSale - The product has lot number management with mandatory entry in sales documents.
            LotNumbersTraceable - The product has strict lot number management (entry in stock additions and withdrawals is mandatory).
          enum:
          - None
          - SerialNumbers
          - SerialNumbersRequiredForSale
          - SerialNumbersTraceable
          - LotNumbers
          - LotNumbersRequiredForSale
          - LotNumbersTraceable
          nullable: true
          type: string
        SerialOrLotNumberInputFormat:
          description: |
            Eingabeformat für die Erfassung der Serien-/Chargennummern

            **English version:**
            Input format for capturing serial/lot numbers
          nullable: true
          type: string
        IsDateOfManufactureRequiredForSerialOrLotNumber:
          description: |
            Ist das Herstelldatum eine Pflichtangabe

            **English version:**
            Is the manufacturing date a mandatory field
          nullable: true
          type: boolean
        IsDateOfExpiryRequiredForSerialOrLotNumber:
          description: |
            Ist das Ablaufdatum eine Pflichtangabe

            **English version:**
            Is the expiry date a mandatory field
          nullable: true
          type: boolean
        PriceQuantity:
          description: |
            Preis per Angabe, d.h. auf diese Menge (in Preiseinheiten)
