          description: |
            Letztes Änderungsdatum des Belegs (inhaltliche Änderung)

            **English version:**
            Last modification date of the document (content change)
          format: date-time
          nullable: true
          readOnly: true
          type: string
        ChangedBy:
          description: |
            Benutzer, der den Beleg zuletzt inhaltlich geändert hat

            **English version:**
            User who last changed the document content
          nullable: true
          readOnly: true
          type: string
