    PdfCreationData:
      description: |
        Enthält Informationen zum Erzeugen einer PDF-Datei für einen Datensatz.

        **English version:**
        Contains information for generating a PDF file for a record.
      example:
        MarkAsPublished: true
        DataType: SalesDocument
        FormatSettings:
          TemplateType: UseCustomTemplate
          CustomTemplateId: 3
          CustomLayoutPath: null
        Id: 12345
        Settings: Create
      properties:
        DataType:
          description: |
            Typ des Datensatzes, für den eine PDF-Datei erzeugt werden soll.

            **English version:**
            Type of the record for which a PDF file should be generated.
          enum:
          - SalesDocument
          - PurchaseDocument
          - ManufactureDocument
          type: string
        Id:
          description: |
            ID des Datensatzes, für den eine PDF-Datei erzeugt werden soll.

            **English version:**
            ID of the record for which a PDF file should be generated.
          type: integer
        Settings:
          description: |
            Angaben zum Erzeugen der PDF-Datei.
            Ist diese Property nicht gesetzt, wird eine neue PDF-Datei erzeugt und die Datei nicht
            archiviert.
            - Create: Eine neue PDF-Datei wird erzeugt und zum Abrufen bereitgestellt.
            - CreateAndArchive: Eine neue PDF-Datei wird erzeugt und archiviert und zum Abrufen bereitgestellt.
            - UseFileFromArchive: Eine im Belegarchiv vorhandene PDF-Datei wird bereitgestellt. Es gibt einen Fehler, wenn im Belegarchiv keine PDF-Datei vorhanden ist oder FormatSettings besetzt sind.

            **English version:**
            Specifications for generating the PDF file.
            If this property is not set, a new PDF file is generated and the file is not
            archived.
            - Create: A new PDF file is generated and provided for retrieval.
            - CreateAndArchive: A new PDF file is generated and archived and provided for retrieval.
            - UseFileFromArchive: A PDF file existing in the document archive is provided. An error occurs if no PDF file is available in the document archive or FormatSettings are set.
          enum:
          - Create
          - CreateAndArchive
          - UseFileFromArchive
          nullable: true
          type: string
        MarkAsPublished:
          description: |
            Angabe, ob der Datensatz als ausgegeben gekennzeichnet werden soll.
            Wird dieses Flag nicht angegeben, wird der Datensatz nicht als ausgegeben gekennzeichnet.

            **English version:**
            Specification whether the record should be marked as published.
            If this flag is not specified, the record is not marked as published.
          nullable: true
          type: boolean
        FormatSettings:
          $ref: '#/components/schemas/DocumentFormatSettings'
      required:
      - DataType
      - Id
      title: PdfCreationData
      type: object
    DocumentFormatSettings:
      description: |
        Enthält Einstellungen zum Ausgabeformat für ein Dokument.

        **English version:**
        Contains settings for the output format for a document.
      example:
        TemplateType: UseCustomTemplate
        CustomTemplateId: 3
        CustomLayoutPath: null
      properties:
        TemplateType:
          description: "Gibt an, welches Druckvorlage verwendet werden soll.\nUseTemplateForPrint:\
            \ Druckvorlage zum Drucken verwenden (z.B. aus Belegart).\nUseTemplateForMail:\
            \ Druckvorlage zum E-Mail-Versand verwenden (z.B. aus Belegart).\nUseCustomTemplate:\
            \ Eigene Druckvorlage verwenden. \nUseCustomLayout: Druck ohne Druckvorlagen\
            \ mit eigener Layout-Datei (*.rpt).\n\n**English version:**\nSpecifies\
            \ which print template should be used.\nUseTemplateForPrint: Use print\
            \ template for printing (e.g. from document type).\nUseTemplateForMail:\
            \ Use print template for e-mail sending (e.g. from document type).\nUseCustomTemplate:\
            \ Use custom print template.\nUseCustomLayout: Print without print templates\
            \ with custom layout file (*.rpt).\n"
          enum:
          - UseTemplateForPrint
          - UseTemplateForMail
          - UseCustomTemplate
          - UseCustomLayout
          nullable: true
