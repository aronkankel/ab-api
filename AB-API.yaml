        BusinessTransaction:
          description: |
            Geschäftsvorfall
            - DomesticSalesWithVat -> Verkauf Inland mit Umsatzsteuer
            - ReverseCharge -> Leistungserbringung mit Übergang der Steuerschuld auf den Leistungsempfänger (§ 13b UStG)
            - DeliveryAsFirstPurchaserInIntraUnionTriangualarTransaction -> Lieferung als erster Abnehmer in einem innergemeinschaftlichen Dreiecksgeschäft (§ 25b Abs. 2 UStG)
            - DeliveryOfGoodsOrServicesToEuCustomer -> Innergemeinschaftliche Lieferung oder sonstige Leistungen an EU-Kunden
            - DistanceSaleOfGoodsWithinEuToCustomerWithoutVatId -> Fernverkauf an EU-Kunden ohne USt-IdNr.
            - SaleWithoutVat -> Verkauf ohne Steuer

            **English version:**
            Business transaction
            - DomesticSalesWithVat -> Domestic sale with VAT
            - ReverseCharge -> Service provision with transfer of tax liability to the service recipient (§ 13b UStG)
            - DeliveryAsFirstPurchaserInIntraUnionTriangualarTransaction -> Delivery as first purchaser in an intra-community triangular transaction (§ 25b para. 2 UStG)
            - DeliveryOfGoodsOrServicesToEuCustomer -> Intra-community delivery or other services to EU customers
            - DistanceSaleOfGoodsWithinEuToCustomerWithoutVatId -> Distance sale to EU customers without VAT ID
            - SaleWithoutVat -> Sale without tax
          enum:
          - DomesticSalesWithVat
          - ReverseCharge
          - DeliveryAsFirstPurchaserInIntraUnionTriangualarTransaction
          - DeliveryOfGoodsOrServicesToEuCustomer
          - DistanceSaleOfGoodsWithinEuToCustomerWithoutVatId
          - SaleWithoutVat
          nullable: true
          type: string
        IsLockedForDunningOrDirectDebit:
          description: |
            Legt fest, ob der Beleg für Mahnung/Lastschrift gesperrt ist. Steht nur bei angeschlossenem DATEV-Rechnungswesen zur Verfügung.

