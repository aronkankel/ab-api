  /v1/purchase-documents/{purchaseDocumentId}/common-schema:
    post:
      description: |
        Erzeugt eine Aufgabe, die aus den Daten des Einkaufsbelegs ein einheitliches
        Common Schema für eine E-Rechnung generiert.

        Voraussetzung ist, dass der Beleg als E-Rechnung gekennzeichnet ist.

        Das Common Schema dient als interne, formatunabhängige Repräsentation der Rechnungsdaten
        und kann als Grundlage für weitere Verarbeitungsschritte verwendet werden.

        Die Aufgabe wird asynchron ausgeführt.
        Der Fortschritt bzw. Status der Aufgabe kann über den Endpunkt
        `/v1/e-invoicing/common-schema/queue/{queueItemId}` abgefragt werden.

        Die Definition des Common Schemas als XSD-Datei kann unter dem Endpunkt
        `/v1/e-invoicing/common-schema.xsd` heruntergeladen werden.

        **Hinweis:** Für die Verwendung des Endpunktes ist eine Internetverbindung erforderlich.

        **English version:**
        Creates a task that generates a unified Common Schema for an e-invoice
        from the purchase document data.

        Prerequisite is that the document is marked as e-invoice.

        The Common Schema serves as an internal, format-independent representation of the invoice data
        and can be used as a basis for further processing steps.

        The task is executed asynchronously.
        The progress or status of the task can be queried via the endpoint
        `/v1/e-invoicing/common-schema/queue/{queueItemId}`.

        The definition of the Common Schema as XSD file can be downloaded at the endpoint
        `/v1/e-invoicing/common-schema.xsd`.

        **Note:** An internet connection is required to use this endpoint.
      operationId: postPurchaseDocumentCommonSchema
      parameters:
      - description: |
          Id eines Einkaufsbelegs (technischer Schlüssel)

          **English version:**
          ID of a purchase document (technical key)
        in: path
        name: purchaseDocumentId
        required: true
        schema:
          type: integer
      responses:
        "202":
          description: |
            Die Aufgabe zur Erstellung des Common Schemas wurde erfolgreich angelegt.
            Die URL zur Statusabfrage wird im Location-Header der Antwort zurückgegeben,
            z. B. `/v1/e-invoicing/common-schema/queue/1001`

            **English version:**
            The task for creating the Common Schema was successfully created.
            The URL for status query is returned in the Location header of the response,
            e.g. `/v1/e-invoicing/common-schema/queue/1001`
        "400":
          description: |
            Es liegt ein fehlerhafter Clientaufruf vor. Eine mögliche Ursache kann
