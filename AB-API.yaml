          Identity: Identity
          HsErrorId: HsErrorId
        - Message: Message
          MessageDetail: MessageDetail
          Identity: Identity
          HsErrorId: HsErrorId
        CommonSchema: CommonSchema
      title: EInvoiceCommonSchemaStatus
      type: object
    EInvoiceCommonSchemaResult:
      description: |
        Enthält das Ergebnis (XML) nach erfolgreicher Verarbeitung der Aufgabe zur Generierung des
        einheitlichen Schemas.VisualizationStatus

        **English version:**
        Contains the result (XML) after successful processing of the task to generate the
        unified schema.VisualizationStatus
      properties:
        CommonSchema:
          description: |
            Enthält das angeforderte XML im Common Schema Format.
            Das Common Schema ist ein seperates Format, in dem die Felder der Norm EN16931
            einheitlich abgebildet werden.
            Die Daten einer E-Rechnung in Syntax UBL oder CII sind in das einheitliche Schema
            transformiert.

            **English version:**
            Contains the requested XML in Common Schema format.
            The Common Schema is a separate format in which the fields of the EN16931 standard
            are uniformly mapped.
            The data of an e-invoice in UBL or CII syntax is transformed into the unified schema.
          nullable: true
          type: string
      title: EInvoiceCommonSchemaResult
      type: object
    EInvoiceValidationStatus:
      allOf:
      - $ref: '#/components/schemas/QueueItemStatus'
      - $ref: '#/components/schemas/EInvoiceValidationResult'
      description: |
        Status eines Elements in der Warteschlange für die Visualisierung

        **English version:**
        Status of an item in the queue for validation
      example:
        Status: Pending
        Errors:
        - Message: Message
          MessageDetail: MessageDetail
          Identity: Identity
          HsErrorId: HsErrorId
        - Message: Message
          MessageDetail: MessageDetail
          Identity: Identity
          HsErrorId: HsErrorId
        ValidationStatus: Valid
        ValidationReport: ValidationReport
      title: EInvoiceValidationStatus
      type: object
    EInvoiceValidationResult:
      description: |
        Enthält das Ergebnis (Prüfbericht und Status) nach erfolgreicher Verarbeitung der Aufgabe
        zur Validierung.

        **English version:**
        Contains the result (validation report and status) after successful processing of the task
        for validation.
      properties:
        ValidationReport:
          description: |
            Enthält den angeforderten Prüfbericht der E-Rechnung als HTML.

            **English version:**
            Contains the requested validation report of the e-invoice as HTML.
          nullable: true
          type: string
        ValidationStatus:
          description: |
            Enthält den Status der Validierung der E-Rechnung.

            Ausprägungen:
            - **Valid** -> Die E-Rechnung ist valide und entspricht den Spezifikationen.
            - **Warning** -> Die E-Rechnung ist valide, es wurden jedoch Warnungen festgestellt.
            - **Invalid** -> Die E-Rechnung ist nicht valide und entspricht nicht den Spezifikationen.

            **English version:**
            Contains the validation status of the e-invoice.

            Values:
            - **Valid** -> The e-invoice is valid and complies with the specifications.
            - **Warning** -> The e-invoice is valid, but warnings were found.
            - **Invalid** -> The e-invoice is not valid and does not comply with the specifications.
          enum:
          - Valid
          - Invalid
          - Warning
          nullable: true
          type: string
      title: EInvoiceValidationResult
      type: object
    EInvoiceVisualizationStatus:
      allOf:
      - $ref: '#/components/schemas/QueueItemStatus'
      - $ref: '#/components/schemas/EInvoiceVisualizationResult'
      description: |
        Status eines Elements in der Warteschlange für die Visualisierung

        **English version:**
        Status of an item in the queue for visualization
      example:
        Status: Pending
        Errors:
        - Message: Message
          MessageDetail: MessageDetail
          Identity: Identity
          HsErrorId: HsErrorId
        - Message: Message
          MessageDetail: MessageDetail
          Identity: Identity
          HsErrorId: HsErrorId
        Visualization: Visualization
      title: EInvoiceVisualizationStatus
      type: object
    EInvoiceVisualizationResult:
      description: |
        Enthält das Ergebnis (HTML-Visualisierung) nach erfolgreicher Verarbeitung der Aufgabe zur
        Visualisierung.

        **English version:**
        Contains the result (HTML visualization) after successful processing of the task
        for visualization.
      properties:
        Visualization:
          description: |
            Enthält die generierte Visualisierung der E-Rechnung als HTML.

            **English version:**
            Contains the generated visualization of the e-invoice as HTML.
          nullable: true
          type: string
      title: EInvoiceVisualizationResult
      type: object
    DocumentClosingSettings:
      description: |
        Einstellungen für den Belegabschluss

        **English version:**
        Settings for document closing
      example:
        DocumentsForClosing:
        - Id: 123456
        - Id: 123457
      properties:
        DocumentsForClosing:
          description: |
            Optionale Liste der für den Belegabschluss zu berücksichtigenden Belege. Falls die Liste
            nicht angegeben wird, werden alle relevanten Belege für den Belegabschluss berücksichtigt.
            Relevant sind alle Belege der Belegarten, bei denen die Eigenschaft für die Festschreibung
            gemäß GoBD auf "true" gesetzt ist. Sie müssen außerdem vollständig gespeichert und
            ausgegeben worden sein, z.B. gedruckt oder per E-Mail versendet. Falls die Liste angegeben wird,
            muss sie mindestens einen Eintrag enthalten und darf keine Duplikate enthalten.

            **English version:**
            Optional list of documents to be considered for document closing. If the list
            is not specified, all relevant documents are considered for document closing.
            Relevant are all documents of the document types for which the property for closing
            according to GoBD is set to "true". They must also have been completely saved and output,
            e.g. printed or sent by email. If the list is specified, it must contain at least one
            entry and must not contain duplicates.
          items:
            $ref: '#/components/schemas/DocumentForClosing'
          minItems: 1
          nullable: true
          type: array
          uniqueItems: true
      title: DocumentClosingSettings
      type: object
    DocumentForClosing:
      description: |
        Angaben zu einem für den Belegabschluss zu berücksichtigenden Beleg

        **English version:**
        Information about a document to be considered for document closing
      example:
        Id: 123456
      properties:
        Id:
          description: |
            ID eines für den Belegabschluss zu berücksichtigenden Belegs

            **English version:**
            ID of a document to be considered for document closing
          nullable: false
          type: integer
      required:
      - Id
      title: DocumentForClosing
      type: object
    ClosingQueueItemStatus:
      allOf:
      - $ref: '#/components/schemas/QueueItemStatus'
      - $ref: '#/components/schemas/ClosingQueueItemStatusExtendedProperties'
      description: |
        Enthält alle Informationen zum Status eines Elements in der Warteschlange
        für eine Verarbeitung im Belegabschluss.

        **English version:**
        Contains all information about the status of an item in the queue
        for a document closing process.
      example:
        Status: Finished
        DocumentClosingResults:
        - DocumentResultStatus: Success
          DocumentId: 123456
        - DocumentResultStatus: Error
          DocumentId: 123457
          Error:
            Message: "Der Beleg kann nicht festgeschrieben werden, da er von einem\
              \ anderen Benutzer gesperrt ist."
            MessageDetail: null
            Identity: 123457
            HsErrorId: 70818
      title: ClosingQueueItemStatus
    ClosingQueueItemStatusExtendedProperties:
      description: |
        Enthält die zusätzlichen Status-Informationen eines Elements in der Warteschlange
        für eine Verarbeitung im Belegabschluss.

        **English version:**
        Contains the additional status information of an item in the queue
        for a document closing process.
      properties:
        DocumentClosingResults:
          description: |
            Liste der für den Belegabschluss berücksichtigten Belege mit Statusinformationen zur
            durchgeführten Verarbeitung.

            **English version:**
            List of documents that were considered for document closing with status information
            about the processing that was performed.
          items:
            $ref: '#/components/schemas/DocumentForClosingResult'
          nullable: true
          type: array
      title: ClosingQueueItemStatusExtendedProperties
    DocumentForClosingResult:
      properties:
        DocumentId:
          description: |
            ID eines im Belegabschluss verarbeiteten Belegs.

            **English version:**
            ID of a document processed in the document closing.
          nullable: false
          type: integer
        DocumentResultStatus:
          description: |
            Status eines im Belegabschluss verarbeiteten Belegs.
            Success --> Der Beleg wurde erfolgreich im Belegabschluss verarbeitet.
            Error   --> Es gab einen Fehler bei der Verarbeitung des Belegs im Belegabschluss.

            **English version:**
            Status of a document processed in the document closing.
            Success --> The document was successfully processed in the document closing.
            Error   --> There was an error processing the document in the document closing.
          enum:
          - Success
          - Error
          nullable: false
          type: string
        Error:
          $ref: '#/components/schemas/ErrorMessage'
      type: object
    OpenItem:
      description: |
        Enthält die Daten eines Offenen Postens (Listeneintrag).

        **English version:**
        Contains the data of an open item (list entry).
      example:
        Discount1Amount: 23.59
        Discount2Amount: 23.59
        OpenItemNumber: 4004923
        OutstandingAmount: 23.59
        NetDate: 2025-10-27
        Discount1Date: 2000-01-23
        CurrencyIso: CurrencyIso
        CustomerNumber: 10042
        IsCleared: false
        NetAmount: 123.59
        Id: 0
        CustomerName: Fiete Strobel
        Discount2Date: 2000-01-23
        DocumentDate: 2025-08-28
      properties:
        Id:
          description: |
            Id des Offenen Postens (technischer Schlüssel, eindeutig).

            **English version:**
            Id of the open item (technical key).
          readOnly: true
          type: integer
        OpenItemNumber:
          description: |
            Nummer des Offenen Postens

            **English version:**
            Number of the open item
          example: 4004923
          readOnly: true
          type: number
        CustomerNumber:
          description: |
            Kundennummer des Debitors.

            **English version:**
            Customer number of the debtor.
          example: 10042
          nullable: true
          readOnly: true
          type: number
        CustomerName:
          description: |
            Name des Kunden.

            **English version:**
            Name of the customer.
          example: Fiete Strobel
          nullable: true
          readOnly: true
          type: string
        DocumentDate:
          description: |
            Belegdatum des Offenen Postens.

            **English version:**
            Document date of the open item.
          example: 2025-08-28
          format: date
          nullable: true
          readOnly: true
          type: string
        NetAmount:
          description: |
            Ursprünglicher Betrag in Belegwährung

            **English version:**
            Original amount in document currency.
          example: 123.59
          nullable: true
          type: number
        CurrencyIso:
          description: |
            ISO-Code der Währung (ISO 4217 alphanumerisch) des Belegs (z.B. "USD")

            **English version:**
            ISO 4217 currency code of the document currency (e.g. "USD").
          nullable: true
          type: string
          example: null
        OutstandingAmount:
          description: |
            Aktuell offene Forderung in Belegwährung (OP-Betrag abzüglich bereits
            geleisteter Zahlungen).

            **English version:**
            Currently outstanding amount in document currency (NetAmount minus payments already made).
          example: 23.59
          nullable: true
          type: number
        NetDate:
          description: |
            Nettofälligkeitsdatum des Offenen Postens.

            **English version:**
            Net due date of the open item.
          example: 2025-10-27
          format: date
          nullable: true
          type: string
        Discount1Amount:
          description: |
            Skonto-1-Betrag in Belegwährung.

            **English version:**
            Discount 1 amount in document currency.
          example: 23.59
          nullable: true
          type: number
        Discount1Date:
          description: |
            Datum bis zu dem Skonto 1 gewährt werden kann.

            **English version:**
            Date until which discount 1 can be granted.
          format: date
          nullable: true
          type: string
          example: null
        Discount2Amount:
          description: |
            Skonto-2-Betrag in Belegwährung.

            **English version:**
            Discount 2 amount in document currency.
          example: 23.59
          nullable: true
          type: number
        Discount2Date:
          description: |
            Datum bis zu dem Skonto 2 gewährt werden kann.

            **English version:**
            Date until which discount 2 can be granted.
          format: date
          nullable: true
          type: string
          example: null
        IsCleared:
          description: |
            Gibt an, ob der Offene Posten ausgeglichen ist.

            **English version:**
            Indicates whether the open item is cleared.
          example: false
          nullable: true
          type: boolean
      title: OpenItem
      type: object
