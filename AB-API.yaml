            **English version:**
            Specification of an individual house bank connection number for credit transfers in invoices.
          nullable: true
          type: integer
        IsReverseCharge:
          description: |
            Kunde kann Leistungen gemäß § 13b UStG empfangen (Steuerschuldnerschaft des Leistungsempfängers/Reverse Charge)

            **English version:**
            Customer can receive services according to § 13b UStG (tax liability of the service recipient/reverse charge)
          example: false
          nullable: true
          type: boolean
      title: Customer
      type: object
    DateDependentPriceListInfo:
