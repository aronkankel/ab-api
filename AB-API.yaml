          description: |
            Wert, der als elektronische Adresse des Käufers für ZUGFeRD 2.x und XRechnung
            verwendet werden soll.

            **English version:**
            Value to be used as the electronic address of the buyer for ZUGFeRD 2.x and XRechnung.
          enum:
