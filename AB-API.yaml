  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
    ApiKeyAuth:
      description: |
        Der API-Key wird von HS vergeben und muss bei jedem Request übermittelt werden, der mit
        ApiKeyAuth ausgezeichnet ist.
        Für Tests steht in Beispieldaten und Schulungsversion folgender API-Key zur Verfügung:
        45E7F261-602E-4776-82B5-B682584C3DE1

        **English version:**
        The API-Key is assigned by HS and must be transmitted with every request that is
        marked with ApiKeyAuth.
        For tests, the following API-Key is available in sample data and training version:
        45E7F261-602E-4776-82B5-B682584C3DE1
      in: header
      name: X-API-KEY
      type: apiKey
    OAuth2:
      flows:
        authorizationCode:
          authorizationUrl: https://example.com/ab-api/v1/authorize
          scopes:
            read: Grants read access
            write: Grants write access
          tokenUrl: https://example.com/ab-api/v1/token
      type: oauth2
