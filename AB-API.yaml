        **English version:**
        Additional properties of an inventory relocation document type.
      properties:
        SourceStockId:
          description: |
            Id des Lagers (technischer Schlüssel), von dem umgebucht wird (Lagerabgang).
            Das Lager wird im Beleg vorbesetzt.

            **English version:**
            ID of the stock (technical key) from which the relocation is made (stock outbound).
            The stock is preset in the document.
          nullable: true
          type: integer
        SourceStockNumber:
          description: |
            Nummer des Lagers (Ordnungsbegriff), von dem umgebucht wird (Lagerabgang).
            Das Lager wird im Beleg vorbesetzt.

            **English version:**
            Number of the stock (classification term) from which the relocation is made (stock outbound).
            The stock is preset in the document.
          nullable: true
          type: integer
        DestinationStockId:
          description: |
            Id des Lagers (technischer Schlüssel), auf das umgebucht wird (Umbuchung auf Lager).
            Das Lager wird im Beleg vorbesetzt.

            **English version:**
            ID of the stock (technical key) to which the relocation is made (relocation to stock).
            The stock is preset in the document.
          nullable: true
          type: integer
        DestinationStockNumber:
          description: |
            Nummer des Lagers (Ordnungsbegriff), auf das umgebucht wird (Umbuchung auf Lager).
