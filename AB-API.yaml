      properties:
        Id:
          description: |
            Id des Fertigungsbelegs (technischer Schlüssel)

            **English version:**
            ID of the manufacture document (technical key)
          nullable: true
          type: integer
        DocumentNumber:
          description: |
            Belegnummer

            **English version:**
            Document number
          nullable: true
          type: number
        DocumentTypeId:
          description: |
            Id der Belegart (technischer Schlüssel)

            **English version:**
            ID of the document type (technical key)
          nullable: true
          type: integer
        DocumentType:
          description: |
            Belegart (Ordnungsbegriff)

            **English version:**
            Document type (classification term)
          nullable: true
          type: string
        DocumentKind:
          description: |
            Gibt die Art des Fertigungsbelegs an.
            Read-only. Wird durch DocumentType bestimmt.
            ManufacturingOrder -> Fertigungsauftrag
            StockWithdrawal -> Materialentnahme
            CompletionReport -> Fertigmeldung

            **English version:**
            Specifies the kind of the manufacture document.
            Read-only. Determined by DocumentType.
            ManufacturingOrder -> Production order
            StockWithdrawal -> Material withdrawal
            CompletionReport -> Completion report
          enum:
          - ManufacturingOrder
          - StockWithdrawal
          - CompletionReport
          nullable: true
          type: string
        ManufacturingOrderId:
          description: |
            Id (technischer Schlüssel) des zugehörigen Fertigungsauftrags.
            Read-only.
            Nur für Materialentnahmen und Fertigmeldungen.

            **English version:**
            ID (technical key) of the associated production order.
            Read-only.
            Only for material withdrawals and completion reports.
          nullable: true
          type: integer
        CreationDate:
          description: |
            Erfassungsdatum des Belegs

            **English version:**
            Creation date of the document
          format: date-time
          nullable: true
          readOnly: true
          type: string
        CreatedBy:
          description: |
            Benutzer, der den Beleg angelegt hat (Ordnungsbegriff)

            **English version:**
            User who created the document (classification term)
          nullable: true
          readOnly: true
          type: string
        ChangingDate:
          description: |
            Letztes Änderungsdatum des Belegs (inhaltliche Änderung)

            **English version:**
            Last modification date of the document (content change)
          format: date-time
          nullable: true
          readOnly: true
          type: string
        ChangedBy:
          description: |
            Benutzer, der den Beleg zuletzt inhaltlich geändert hat

            **English version:**
            User who last changed the document content
          nullable: true
          readOnly: true
          type: string
        LastModified:
          description: |
            Letztes Änderungsdatum des Belegs (technische Änderung, z.B. beim Druck)

            **English version:**
            Last modification date of the document (technical change, e.g. during print)
          format: date-time
          nullable: true
          type: string
        StatusContinuation:
          description: |
            Abrufstatus des Belegs

            **English version:**
            Call-off status of the document
          enum:
          - NotContinued
          - PartiallyContinued
          - CompletelyContinued
          nullable: true
          type: string
        IsPrinted:
          description: |
            Wurde der Beleg bereits gedruckt oder gesendet? (read-only)

            **English version:**
            Has the document already been printed or sent? (read-only)
          nullable: true
          type: boolean
        DocumentDate:
          description: |
            Belegdatum

            **English version:**
            Document date
          format: date
          nullable: true
          type: string
        InspectionDate:
          description: "Kontrolldatum im Format YYYY-MM-DD. \nZum Löschen des Datums\
            \ muss ein Leerstring übermittelt werden.\n\n**English version:**\nInspection\
            \ date in format YYYY-MM-DD.\nTo delete the date, an empty string must\
            \ be provided.\n"
          nullable: true
          type: string
        StockWithdrawalDate:
          description: "Materialentnahmedatum im Format YYYY-MM-DD. \nZum Löschen\
            \ des Datums muss ein Leerstring übermittelt werden.\n\n**English version:**\n\
            Material withdrawal date in format YYYY-MM-DD.\nTo delete the date, an\
            \ empty string must be provided.\n"
          nullable: true
          type: string
        StartDate:
          description: "Fertigungsbeginn im Format YYYY-MM-DD. \nZum Löschen des Datums\
            \ muss ein Leerstring übermittelt werden.\n\n**English version:**\nProduction\
            \ start in format YYYY-MM-DD.\nTo delete the date, an empty string must\
            \ be provided.\n"
          nullable: true
          type: string
        ScheduledEndDate:
          description: "Fertigungsende Soll im Format YYYY-MM-DD. \nZum Löschen des\
            \ Datums muss ein Leerstring übermittelt werden.\n\n**English version:**\n\
            Target production end in format YYYY-MM-DD.\nTo delete the date, an empty\
            \ string must be provided.\n"
          nullable: true
          type: string
        RealEndDate:
          description: "Fertigungsende Ist im Format YYYY-MM-DD. \nZum Löschen des\
            \ Datums muss ein Leerstring übermittelt werden.\n\n**English version:**\n\
            Actual production end in format YYYY-MM-DD.\nTo delete the date, an empty\
            \ string must be provided.\n"
          nullable: true
          type: string
        OrderNumber:
          description: |
            Auftragsnummer

            **English version:**
            Order number
          nullable: true
          type: string
        OrderDate:
          description: "Auftragsdatum im Format YYYY-MM-DD. \nZum Löschen des Datums\
            \ muss ein Leerstring übermittelt werden.\n\n**English version:**\nOrder\
            \ date in format YYYY-MM-DD.\nTo delete the date, an empty string must\
            \ be provided.\n"
          nullable: true
          type: string
        ManufactureLevel:
          description: |
            Fertigungsebene

            **English version:**
            Production level
          nullable: true
          type: integer
        IsExternalManufactured:
          description: |
            Fremdfertigung. Gibt an, ob dieser Auftrag extern gefertigt wird.

            **English version:**
            External manufacturing. Specifies whether this order is manufactured externally.
          nullable: true
          type: boolean
        ExternalManufacturerId:
          description: |
            Id des Fremdfertigers (Lieferanten-Id) bei Fremdfertigung
            (technischer Schlüssel)

            **English version:**
            ID of the external manufacturer (supplier ID) for external manufacturing
            (technical key)
          nullable: true
          type: integer
        ExternalManufacturerNumber:
          description: |
            Nummer des Fremdfertigers (Lieferantennummer) bei Fremdfertigung

            **English version:**
            Number of the external manufacturer (supplier number) for external manufacturing
          nullable: true
          type: number
        LanguageId:
          description: |
            Id der Sprache (technischer Schlüssel)

            **English version:**
            ID of the language (technical key)
          nullable: true
          type: integer
        Language:
          description: |
            Sprache (Ordnungsbegriff)

            **English version:**
            Language (classification term)
          nullable: true
          type: string
        AdditionalText:
          description: |
            Zusätzlicher Text

            **English version:**
            Additional text
          nullable: true
          type: string
        Notes:
          description: |
            Notizen

            **English version:**
            Notes
          nullable: true
          type: string
        ShowNotesOnChange:
          description: |
            Notiz automatisch bei Belegbearbeitung anzeigen

